<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出库执行 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '出库执行',
    currentPath: '/warehouse/outbound',
    breadcrumb: [{ label: '出库作业', path: '/warehouse/outbound' }, '出库执行'],
    content: `
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6 text-sm text-amber-800">
        <div class="font-medium mb-1">⚠ 出库规则（v1.7 按甲方 drawio v3）</div>
        <div>出库是<strong>独立流程</strong>（§4.7），与解押（§4.5）分开。仓库方只有在收到<strong>监管方的出库指令</strong>（解押审核全部通过后）才能放行。</div>
        <div class="text-xs text-amber-700 mt-2">📋 审核顺序：货主方盖章 → 担保方审核 → 监管方审核 → 仓库方出库</div>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">待出库（已收指令）</div>
          <div class="text-3xl font-bold text-orange-600 mt-1">${MockData.warehouseOutboundList.filter(o => o.status === 'pending').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">本月已出库</div>
          <div class="text-3xl font-bold text-emerald-600 mt-1">${MockData.warehouseOutboundList.filter(o => o.status === 'completed').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">仓库利用率</div>
          <div class="text-3xl font-bold text-slate-800 mt-1 num-focus">${MockData.warehouseStats.utilizationRate}%</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200">
          <h3 class="font-semibold text-slate-800">出库任务清单（${MockData.warehouseOutboundList.length}）</h3>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">出库单号</th>
              <th class="text-left px-4 py-3">货主/货品</th>
              <th class="text-left px-4 py-3">车辆/司机</th>
              <th class="text-right px-3 py-3">件数</th>
              <th class="text-right px-3 py-3">重量(kg)</th>
              <th class="text-left px-3 py-3">仓库</th>
              <th class="text-center px-3 py-3">计划时间</th>
              <th class="text-center px-3 py-3">监管方指令</th>
              <th class="text-center px-3 py-3">状态</th>
              <th class="text-center px-3 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.warehouseOutboundList.map(o => `
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3 font-mono text-xs">${o.orderNo}</td>
                <td class="px-4 py-3">
                  <div class="font-medium text-xs">${o.applicant}</div>
                  <div class="text-xs text-slate-500">${o.product}</div>
                </td>
                <td class="px-4 py-3">
                  <div class="font-mono text-xs">${o.vehicleNo}</div>
                  <div class="text-xs text-slate-500">${o.driver}</div>
                </td>
                <td class="px-3 py-3 text-right num-focus">${Utils.fmtNum(o.pieces)}</td>
                <td class="px-3 py-3 text-right num-focus">${Utils.fmtNum(o.weight)}</td>
                <td class="px-3 py-3 text-xs">${o.warehouse}</td>
                <td class="px-3 py-3 text-center text-xs">${o.plannedTime}</td>
                <td class="px-3 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs bg-green-100 text-green-700">${o.instruction ? '✓ 已收到' : '—'}</span></td>
                <td class="px-3 py-3 text-center">${Components.badge(o.status)}</td>
                <td class="px-3 py-3 text-center">
                  ${o.status === 'pending' ? `<button onclick="executeOutbound('${o.id}')" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs rounded">执行出库</button>` : `<button onclick="viewOutbound('${o.id}')" class="text-blue-600 hover:underline text-xs">查看</button>`}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div id="outboundModal"></div>
    `
  });

  function executeOutbound(id) {
    const o = MockData.warehouseOutboundList.find(x => x.id === id);
    if (!o) return;
    document.getElementById('outboundModal').innerHTML = `
      <div class="modal-backdrop" onclick="this.remove()">
        <div class="bg-white rounded-xl w-[700px] shadow-2xl" onclick="event.stopPropagation()">
          <div class="px-6 py-4 border-b border-slate-200">
            <h3 class="font-bold text-slate-800 text-lg">执行出库 - ${o.orderNo}</h3>
          </div>
          <div class="p-6 space-y-4">
            <div class="bg-green-50 border border-green-200 rounded-lg p-4 text-sm">
              <div class="font-medium text-green-800 mb-2">✓ 监管方出库指令</div>
              <div class="text-green-700">${o.instruction || '客户已还款，同意出库'}</div>
            </div>

            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm">
              <div class="grid grid-cols-2 gap-3">
                <div><span class="text-slate-500">货主：</span>${o.applicant}</div>
                <div><span class="text-slate-500">车牌：</span><span class="font-mono">${o.vehicleNo}</span></div>
                <div><span class="text-slate-500">计划件数：</span>${Utils.fmtNum(o.pieces)}</div>
                <div><span class="text-slate-500">计划重量：</span>${Utils.fmtNum(o.weight)} kg</div>
              </div>
            </div>

            <h4 class="text-sm font-semibold text-slate-700 border-b pb-1">实际出库数据</h4>
            <div class="grid grid-cols-2 gap-3">
              <div><label class="text-xs text-slate-600 mb-1">实际出库时间</label><input type="datetime-local" value="2026-07-08T14:00" class="w-full px-3 py-2 border border-slate-300 rounded text-sm"></div>
              <div><label class="text-xs text-slate-600 mb-1">实际件数</label><input type="number" value="${o.pieces}" class="w-full px-3 py-2 border border-slate-300 rounded text-sm num-focus"></div>
              <div><label class="text-xs text-slate-600 mb-1">实际重量 (kg)</label><input type="number" value="${o.weight}" class="w-full px-3 py-2 border border-slate-300 rounded text-sm num-focus"></div>
              <div><label class="text-xs text-slate-600 mb-1">提货人身份证</label><input type="text" value="410***********1234" class="w-full px-3 py-2 border border-slate-300 rounded text-sm font-mono text-xs"></div>
            </div>

            <div class="border-2 border-dashed border-slate-300 rounded-lg p-4 text-center">
              <div class="text-sm text-slate-600">📷 出库照片 + PDA 扫码验证</div>
              <div class="text-xs text-slate-400 mt-1">扫描货物条码自动核验数量</div>
            </div>
          </div>
          <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
            <button onclick="this.closest('.modal-backdrop').remove()" class="px-4 py-2 border border-slate-300 rounded text-sm">取消</button>
            <button onclick="Utils.toast('✓ 出库执行完成，已回传给监管方','success'); this.closest('.modal-backdrop').remove(); setTimeout(()=>location.reload(),800)" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded text-sm font-medium">确认出库并回传</button>
          </div>
        </div>
      </div>
    `;
  }

  function viewOutbound(id) { Utils.toast('查看出库记录', 'info'); }
</script>
</body>
</html>
