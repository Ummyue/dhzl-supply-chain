<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质押货物台账 - 担保方</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // 担保方台账：所有在保的质押货物
  const ledger = MockData.pledgeLedger;
  const totalValue = ledger.reduce((s, l) => s + l.evaluateValue, 0);
  const totalDebt = ledger.reduce((s, l) => s + l.remainingDebt, 0);
  const warningCount = ledger.filter(l => l.status === 'warning' || l.status === 'danger').length;
  const overdueCount = ledger.filter(l => l.isOverdue).length;

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '质押货物台账（担保方视图）',
    currentPath: '/guarantor/pledge-ledger',
    breadcrumb: [{ label: '质押管理', path: '/guarantor/pledge-ledger' }, '质押货物台账'],
    content: `
      <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-amber-50 rounded-xl p-4 border border-amber-200">
          <div class="text-xs text-amber-700">在保质押货值</div>
          <div class="text-2xl font-bold text-amber-700 mt-1 num-focus">${Utils.fmtMoney(totalValue)}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">在保债权</div>
          <div class="text-2xl font-bold text-slate-800 mt-1 num-focus">${Utils.fmtMoney(totalDebt)}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">预警质押</div>
          <div class="text-2xl font-bold text-orange-600 mt-1">${warningCount}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">逾期质押</div>
          <div class="text-2xl font-bold text-rose-600 mt-1">${overdueCount}</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
          <h3 class="font-semibold text-slate-800">质押货物明细（${ledger.length} 笔）</h3>
          <div class="flex gap-2 text-xs">
            <button onclick="exportLedger()" class="px-3 py-1 border border-slate-300 hover:bg-slate-50 rounded">📥 导出</button>
            <button class="px-3 py-1 border border-slate-300 hover:bg-slate-50 rounded">🖨️ 打印</button>
          </div>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">业务编号</th>
              <th class="text-left px-4 py-3">客户/货品</th>
              <th class="text-left px-4 py-3">仓库</th>
              <th class="text-right px-3 py-3">件数</th>
              <th class="text-right px-3 py-3">重量(kg)</th>
              <th class="text-right px-3 py-3">评估单价</th>
              <th class="text-right px-3 py-3">评估货值</th>
              <th class="text-right px-3 py-3">担保金额</th>
              <th class="text-right px-3 py-3">剩余债权</th>
              <th class="text-right px-3 py-3">最新价</th>
              <th class="text-right px-3 py-3">变化率</th>
              <th class="text-center px-3 py-3">状态</th>
              <th class="text-center px-3 py-3">签章</th>
              <th class="text-center px-3 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${ledger.map(l => `
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3 font-mono text-xs">${l.bizNo}</td>
                <td class="px-4 py-3">
                  <div class="font-medium text-xs">${l.customer}</div>
                  <div class="text-xs text-slate-500">${l.product}</div>
                </td>
                <td class="px-4 py-3 text-xs">${l.warehouse}</td>
                <td class="px-3 py-3 text-right num-focus">${Utils.fmtNum(l.pieces)}</td>
                <td class="px-3 py-3 text-right num-focus">${Utils.fmtNum(l.weight)}</td>
                <td class="px-3 py-3 text-right num-focus">¥${l.evaluatePrice.toFixed(2)}</td>
                <td class="px-3 py-3 text-right num-focus font-medium">${Utils.fmtMoney(l.evaluateValue)}</td>
                <td class="px-3 py-3 text-right num-focus text-amber-700 font-bold">${Utils.fmtMoney(l.loanAmount * 1.2)}</td>
                <td class="px-3 py-3 text-right num-focus ${l.remainingDebt > 0 ? 'text-orange-600' : 'text-emerald-600'} font-medium">${Utils.fmtMoney(l.remainingDebt)}</td>
                <td class="px-3 py-3 text-right num-focus">¥${l.currentPrice.toFixed(2)}</td>
                <td class="px-3 py-3 text-right num-focus font-bold ${Math.abs(l.priceChangeRate) > 10 ? 'text-rose-600' : Math.abs(l.priceChangeRate) > 5 ? 'text-orange-600' : 'text-slate-600'}">${l.priceChangeRate > 0 ? '+' : ''}${l.priceChangeRate.toFixed(2)}%</td>
                <td class="px-3 py-3 text-center">${Components.badge(l.status)}</td>
                <td class="px-3 py-3 text-center"><span class="text-xs ${l.signStatus === 'completed' ? 'text-green-600' : 'text-yellow-600'}">${l.signStatus === 'completed' ? '✓ 已签' : '待签'}</span></td>
                <td class="px-3 py-3 text-center">
                  <button onclick="viewDetail('${l.bizNo}')" class="text-blue-600 hover:underline text-xs">详情</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
          <tfoot>
            <tr class="bg-slate-100 font-bold">
              <td colspan="6" class="px-4 py-3 text-right">合计：</td>
              <td class="px-3 py-3 text-right num-focus text-amber-700">${Utils.fmtMoney(totalValue)}</td>
              <td class="px-3 py-3 text-right num-focus text-amber-700">${Utils.fmtMoney(ledger.reduce((s, l) => s + l.loanAmount * 1.2, 0))}</td>
              <td class="px-3 py-3 text-right num-focus text-orange-700">${Utils.fmtMoney(totalDebt)}</td>
              <td colspan="5"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    `
  });

  function viewDetail(bizNo) { Utils.toast('查看质押详情：' + bizNo, 'info'); }
  function exportLedger() { Utils.toast('导出 Excel...', 'info'); }
</script>
</body>
</html>
