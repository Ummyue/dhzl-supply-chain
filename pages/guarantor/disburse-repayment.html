<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>放还款详情 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    /* 状态机 tab */
    .dr-tab { position: relative; padding: 10px 16px; cursor: pointer; color: #475569; font-size: 13px; white-space: nowrap; transition: color .15s; border-bottom: 2px solid transparent; display: inline-flex; align-items: center; gap: 4px; }
    .dr-tab:hover { color: #2563eb; }
    .dr-tab.active { color: #2563eb; font-weight: 600; border-bottom-color: #2563eb; }
    .dr-tab .count { color: #94a3b8; font-weight: 400; }
    .dr-tab.active .count { color: #2563eb; }
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.24 放还款详情（按用户截图） ============
  // 7 筛选器 / 4 状态 tab / 14 列（数据列 12 + 状态 + 操作）/ 数据导出 / 400 条
  // 行操作 [查看] → /customer/pledge-detail?id={pledgeId}

  const filters = {
    financingNo:  '',      // 融资申请编号
    pledgeNo:     '',      // 存贷资产编号
    bankDraftNo:  '',      // 原柜号/提单号
    product:      '',      // 金融产品（select）
    bank:         '',      // 金融机构（select）
    loanDateStart:'',      // 融资放款日起
    loanDateEnd:  '',      // 融资放款日止
    repayDateStart:'',     // 融资还款日起
    repayDateEnd: '',      // 融资还款日止
  };
  let activeTab = 'all';

  const STATUS_LABEL = {
    disbursed: '已放款',
    partial:   '部分还款',
    cleared:   '已结清',
    overdue:   '逾期',
  };
  const STATUS_CLASS = {
    disbursed: 'bg-blue-100 text-blue-700',
    partial:   'bg-amber-100 text-amber-700',
    cleared:   'bg-emerald-100 text-emerald-700',
    overdue:   'bg-rose-100 text-rose-700',
  };
  const TAB_ORDER = ['all','disbursed','partial','cleared'];

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '放还款详情',
    subtitle: '担保方视角 - 本公司担保客户的放还款详情',
    currentPath: '/guarantor/disburse-repayment',
    breadcrumb: [
      { label: '解押出库管理', path: '/guarantor/disburse-repayment' },
      { label: '放还款详情', path: '/guarantor/disburse-repayment' },
    ],
    extra: ``,
    content: render(),
  });

  function render() {
    return `
      
      <!-- v1.7.53 担保方角色化提示条 -->
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-xs text-blue-800">
        <span class="font-medium">担保方视图：</span>您正在查看<strong>放还款详情</strong>，作为担保方可核对放款记录、还款凭证与放还款状态。
      </div>
            ${Components.filterBar({
        filters: filters,
        fields: [
          { label: '融资申请编号', key: 'financingNo', type: 'text', placeholder: '请输入融资申请编号' },
          { label: '存贷资产编号', key: 'pledgeNo', type: 'text', placeholder: '请输入存贷资产编号' },
          { label: '原柜号/提单号', key: 'bankDraftNo', type: 'text', placeholder: '请输入原柜号/提单号' },
          { label: '金融产品', key: 'product', type: 'select', placeholder: '金融产品', options: [
            { value: '', label: '请选择' },
            ...[...new Set((MockData.disbursementList || []).map(d => d.product).filter(Boolean))].map(p => ({ value: p, label: p })),
          ] },
          { label: '放款日期', key: 'loanDate', type: 'dateRange', placeholder: '放款日期', fromKey: 'loanDateStart', toKey: 'loanDateEnd' },
          { label: '还款日期', key: 'repayDate', type: 'dateRange', placeholder: '还款日期', fromKey: 'repayDateStart', toKey: 'repayDateEnd' },
          { label: '金融机构', key: 'bank', type: 'select', placeholder: '金融机构', options: [
            { value: '', label: '请选择' },
            ...[...new Set((MockData.disbursementList || []).map(d => d.bank).filter(Boolean))].map(b => ({ value: b, label: b })),
          ] },
        ],
        dataSource: MockData.disbursementList,
        onChange: 'refresh',
        hasExport: true,
        exportCSV: 'exportDisbursementCSV',
      })}

    <!-- 状态机 tab 行 + 数据导出按钮（右上） -->
      <div class="bg-white border border-slate-200 rounded-t-xl flex items-center justify-between" style="border-bottom: 0;">
        <div class="flex items-center overflow-x-auto">
          ${renderTabs()}
        </div>
        <button onclick="exportData()" class="px-4 py-1.5 mx-5 my-2 text-xs text-slate-600 hover:text-blue-600 hover:bg-slate-50 border border-slate-200 rounded flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          数据导出
        </button>
      </div>

      <!-- 12 数据列 + 状态 + 操作 -->
      <div class="bg-white border border-slate-200 rounded-b-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[1500px]">
            <thead class="bg-slate-50 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-3 whitespace-nowrap">融资申请编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">金融产品</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">金融机构</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">放款金额（元）</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">当前货值（元）</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">融资放款日</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">融资还款日</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">已还本金（元）</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">已还利息（元）</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">未还本金（元）</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">存贷资产编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">原柜号/提单号</th>
                <th class="text-center px-3 py-3 whitespace-nowrap">状态</th>
                <th class="text-center px-3 py-3 whitespace-nowrap">操作</th>
              </tr>
            </thead>
            <tbody>${renderRows(applyFilters())}</tbody>
          </table>
        </div>
        ${renderPagination(applyFilters().length)}
      </div>
    `;
  }

  function uniqueValues(field) {
    const set = new Set();
    (MockData.disburseRepaymentList || []).forEach(p => p[field] && set.add(p[field]));
    return Array.from(set);
  }

  function applyFilters() {
    let list = (MockData.disburseRepaymentList || []);
    if (activeTab !== 'all') list = list.filter(p => p.status === activeTab);
    if (filters.financingNo)    list = list.filter(p => (p.financingNo || '').includes(filters.financingNo));
    if (filters.pledgeNo)       list = list.filter(p => (p.pledgeNo || '').includes(filters.pledgeNo));
    if (filters.bankDraftNo)    list = list.filter(p => (p.bankDraftNo || '').includes(filters.bankDraftNo));
    if (filters.product)        list = list.filter(p => p.product === filters.product);
    if (filters.bank)           list = list.filter(p => p.bank === filters.bank);
    if (filters.loanDateStart)  list = list.filter(p => p.loanDate >= filters.loanDateStart);
    if (filters.loanDateEnd)    list = list.filter(p => p.loanDate <= filters.loanDateEnd);
    if (filters.repayDateStart) list = list.filter(p => p.repayDate >= filters.repayDateStart);
    if (filters.repayDateEnd)   list = list.filter(p => p.repayDate <= filters.repayDateEnd);
    return list;
  }

  function tabCounts() {
    const all = MockData.disburseRepaymentList || [];
    const c = { all: all.length };
    Object.keys(STATUS_LABEL).forEach(k => c[k] = all.filter(p => p.status === k).length);
    return c;
  }

  function renderTabs() {
    const counts = tabCounts();
    return TAB_ORDER.map(k => {
      const label = k === 'all' ? '全部' : STATUS_LABEL[k];
      const isActive = k === activeTab;
      return `
        <div class="dr-tab ${isActive ? 'active' : ''}" onclick="switchTab('${k}')">
          <span>${label}</span><span class="count">(${counts[k] || 0})</span>
        </div>
      `;
    }).join('');
  }

  function renderRows(list) {
    if (!list.length) return `<tr><td colspan="14" class="py-12 text-center text-slate-400 text-sm">📭 当前筛选条件下无放还款记录</td></tr>`;
    return list.map(p => `
      <tr class="border-t border-slate-100 hover:bg-blue-50/30">
        <td class="px-3 py-3 text-blue-600 font-mono text-xs whitespace-nowrap hover:underline">${p.financingNo}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.product}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.bank}</td>
        <td class="px-3 py-3 text-right num-focus text-slate-700 text-xs whitespace-nowrap">${p.loanAmount.toLocaleString()}.0000</td>
        <td class="px-3 py-3 text-right num-focus text-slate-700 text-xs whitespace-nowrap">${p.currentValue.toLocaleString()}.0000</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap font-mono">${p.loanDate}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap font-mono">${p.repayDate}</td>
        <td class="px-3 py-3 text-right num-focus text-slate-700 text-xs whitespace-nowrap">${p.repaidPrincipal.toLocaleString()}.0000</td>
        <td class="px-3 py-3 text-right num-focus text-slate-700 text-xs whitespace-nowrap">${p.repaidInterest}.0000</td>
        <td class="px-3 py-3 text-right num-focus text-slate-700 text-xs whitespace-nowrap">${p.remainingPrincipal.toLocaleString()}.0000</td>
        <td class="px-3 py-3 text-blue-600 font-mono text-xs whitespace-nowrap hover:underline cursor-pointer" onclick="goPledge('${p.pledgeId}'); event.stopPropagation();">${p.pledgeNo}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.bankDraftNo}</td>
        <td class="px-3 py-3 text-center whitespace-nowrap"><span class="inline-block px-2 py-0.5 text-xs rounded ${STATUS_CLASS[p.status] || 'bg-slate-100 text-slate-700'}">${STATUS_LABEL[p.status]}</span></td>
        <td class="px-3 py-3 text-center whitespace-nowrap">
          <button onclick="goPledge('${p.pledgeId}'); event.stopPropagation();" class="text-blue-600 hover:text-blue-700 hover:underline text-xs">查看</button>
        </td>
      </tr>
    `).join('');
  }

  function renderPagination(total) {
    return Components.pagination({ total: total || 0, page: 1, pageSize: 10, onChange: 'window.__noop', onPageSize: 'window.__noop', onJump: 'window.__noop' });
  }

  // ============ Events ============
  window.updateFilter = (k, v) => { filters[k] = v; };
  window.switchTab   = (k) => { activeTab = k; refresh(); };
  window.removeTag   = (k) => {
    if (k === '_loanDate')  { filters.loanDateStart = ''; filters.loanDateEnd = ''; }
    else if (k === '_repayDate') { filters.repayDateStart = ''; filters.repayDateEnd = ''; }
    else filters[k] = '';
    refresh();
  };
  window.resetAllFilters = () => { Object.keys(filters).forEach(k => filters[k] = ''); document.querySelectorAll('[id^="filterInput_"]').forEach(i => i.value = ''); refresh(); };
  window.exportData = () => Utils.toast('已导出当前筛选数据（占位）', 'success');

  // 关键路由：行操作"查看" + 存贷资产编号超链 → 跳对应质押资产详情
  window.goPledge = (pledgeId) => {
    window.location.href = `${Utils.nav('/guarantor/pledge-detail')}?id=${pledgeId}`;
  };

  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '放还款详情',
    subtitle: '担保方视角 - 本公司担保客户的放还款详情',
      currentPath: '/guarantor/disburse-repayment',
      breadcrumb: [
        { label: '解押出库管理', path: '/guarantor/disburse-repayment' },
        { label: '放还款详情', path: '/guarantor/disburse-repayment' },
      ],
      extra: '',
      content: render(),
    });
  }
</script>
</body>
</html>
