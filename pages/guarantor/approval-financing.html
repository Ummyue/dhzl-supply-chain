<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>融资审核 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '融资审核 / 担保函出具',
    currentPath: '/guarantor/approval-financing',
    breadcrumb: [{ label: '融资审核', path: '/guarantor/approval-financing' }, '担保审核'],
    content: `
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-xs text-blue-800">
        <span class="font-medium">v1.7 流程：</span>本页面是<strong>3 级审核的第 2 步</strong>（监管方已通过 → <strong>您（担保方）</strong> → 资金方）。审核通过后，货主方需再次盖章②。
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="bg-amber-50 rounded-xl p-4 border border-amber-200">
          <div class="text-xs text-amber-700">在保余额</div>
          <div class="text-2xl font-bold text-amber-700 num-focus mt-1">¥5.2亿</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">担保总额度</div>
          <div class="text-2xl font-bold text-slate-800 num-focus mt-1">¥8.5亿</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">敞口占用</div>
          <div class="text-2xl font-bold text-orange-600 num-focus mt-1">61.2%</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">本月代偿率</div>
          <div class="text-2xl font-bold text-emerald-600 num-focus mt-1">0.00%</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
          <h3 class="font-semibold text-slate-800">待审核融资申请</h3>
          <div class="text-xs text-slate-500">共 ${MockData.financingList.length} 笔待审</div>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">融资编号</th>
              <th class="text-left px-4 py-3">客户</th>
              <th class="text-left px-4 py-3">货品</th>
              <th class="text-right px-4 py-3">融资金额</th>
              <th class="text-right px-4 py-3">担保金额</th>
              <th class="text-right px-4 py-3">担保费率</th>
              <th class="text-center px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.financingList.map(f => `
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3 font-mono text-xs">${f.bizNo}</td>
                <td class="px-4 py-3">${f.applicant}</td>
                <td class="px-4 py-3">${f.products[0]?.name || '-'}</td>
                <td class="px-4 py-3 text-right num-focus font-medium">${Utils.fmtMoney(f.applyAmount)}</td>
                <td class="px-4 py-3 text-right num-focus font-bold text-amber-700">${Utils.fmtMoney(f.applyAmount * 1.2)}</td>
                <td class="px-4 py-3 text-right">1.5%/年</td>
                <td class="px-4 py-3 text-center">
                  <button onclick="issueGuarantee('${f.id}')" class="px-3 py-1 bg-amber-600 hover:bg-amber-700 text-white text-xs rounded">出具担保函</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `
  });

  function issueGuarantee(id) {
    const f = MockData.financingList.find(x => x.id === id) || MockData.financingList[0];
    const modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.innerHTML = `
      <div class="bg-white rounded-xl w-[700px] max-h-[90vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
        <div class="px-6 py-4 border-b border-slate-200 sticky top-0 bg-white">
          <h3 class="font-bold text-slate-800 text-lg">出具担保函 - ${f.bizNo}</h3>
        </div>
        <div class="p-6 space-y-4">
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
            <div class="text-xs text-amber-700 mb-1">⚠ 待核保内容</div>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div><span class="text-slate-600">融资客户：</span>${f.applicant}</div>
              <div><span class="text-slate-600">融资金额：</span><span class="num-focus font-bold">${Utils.fmtMoney(f.applyAmount)}</span></div>
              <div><span class="text-slate-600">担保金额：</span><span class="num-focus font-bold text-amber-700">${Utils.fmtMoney(f.applyAmount * 1.2)}</span></div>
              <div><span class="text-slate-600">担保期限：</span>${f.duration} 天</div>
              <div><span class="text-slate-600">担保费率：</span>1.5%/年</div>
              <div><span class="text-slate-600">担保费收入：</span><span class="num-focus">${Utils.fmtMoney(f.applyAmount * 0.015 / 365 * f.duration)}</span></div>
            </div>
          </div>

          <div class="text-sm space-y-2">
            <div class="flex justify-between"><span class="text-slate-500">核保材料：</span><span class="text-green-600">✓ 营业执照 ✓ 财报 ✓ 征信报告 ✓ 质押物清单</span></div>
            <div class="flex justify-between"><span class="text-slate-500">反担保措施：</span><span class="text-slate-700">动产质押 + 第三方担保</span></div>
            <div class="flex justify-between"><span class="text-slate-500">代偿能力评估：</span><span class="text-green-600 font-medium">良好</span></div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-2">核保意见</label>
            <textarea rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm">核保通过，同意为该笔融资出具担保函。融资客户资质良好，质押物充足，反担保措施到位。</textarea>
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2 sticky bottom-0 bg-white">
          <button onclick="this.closest('.modal-backdrop').remove()" class="px-4 py-2 border border-slate-300 rounded-md text-sm hover:bg-slate-50">取消</button>
          <button onclick="Utils.toast('担保函已出具，已推送银行','success'); this.closest('.modal-backdrop').remove()" class="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-md text-sm font-medium">出具担保函并推送银行</button>
        </div>
      </div>
    `;
    // v1.7.8 表单类弹窗：屏蔽点击外面关闭
    modal.onclick = () => {};
    document.body.appendChild(modal);
  }
</script>
</body>
</html>
