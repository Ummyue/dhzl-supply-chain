<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增入库记录 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    /* 底部固定操作栏 */
    .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: #fff; border-top: 1px solid #e2e8f0; padding: 14px 0; box-shadow: 0 -2px 8px rgba(0,0,0,0.04); }
    .footer-spacer { height: 80px; }
    /* 必填星号 */
    .req { color: #ef4444; margin-right: 2px; }
    /* 浅紫色可编辑高亮 */
    .editable { background: #f5f3ff; border-color: #c4b5fd; }
    .editable:focus { background: #fff; border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    /* 紫色虚线只读框 */
    .readonly-zone { background: #f0fdf4; border: 1px dashed #a78bfa; padding: 0; }
    /* v1.7.93 行尾固定列(实收数量/重量) — 前方表格内滚动 */
    .sticky-right-2 { position: sticky; right: 96px; z-index: 5; background: #fff; box-shadow: -1px 0 0 #e2e8f0; }
    .sticky-right-1 { position: sticky; right: 0; z-index: 6; background: #fff; box-shadow: -2px 0 4px rgba(0,0,0,0.06); }
    .sticky-right-head-2 { position: sticky; right: 96px; z-index: 7; background: #f8fafc; box-shadow: -1px 0 0 #e2e8f0; }
    .sticky-right-head-1 { position: sticky; right: 0; z-index: 8; background: #f8fafc; box-shadow: -2px 0 4px rgba(0,0,0,0.06); }
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>

<!-- v1.7.92 监管方【新增入库】- 实际入库环节录入：入库申请信息(只读) + 入库信息(可编辑) + 货物明细(前 12 列只读 + 实收可编辑) + 附件 -->

<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // 取一条入库申请数据（默认第一条 in_001）
  const urlParams = new URLSearchParams(window.location.search);
  const urlId = urlParams.get('id') || 'in_001';
  const f = MockData.inboundList.find(x => x.id === urlId) || MockData.inboundList[0];

  // 货物明细：把 inbound 申请里的产品展开 4 行
  const productRows = (f.products || []).flatMap(p => {
    // 一行 product = 4 行（每个 1/4 件）
    const totalPieces = p.pieces || 0;
    const totalWeight = p.weight || 0;
    const perRowPieces = Math.ceil(totalPieces / 4);
    const perRowWeight = Math.ceil(totalWeight / 4);
    return [1,2,3,4].map(i => ({
      no: i,
      productName: p.name || '保乐肩',
      country: '巴西',
      factoryNo: '巴西',
      qty: perRowPieces,
      qtyUnit: '箱',
      weight: perRowWeight,
      weightUnit: '千克',
      plannedDate: '2026-01-01',
      produceDate: '2026-01-01',
      batchNo: '2026-01-01',
      contractNo: '2026-01-01',
      waybill: '2026-01-01',
      cabinet: '2026-01-01',
      // v1.7.92 新增：实收数量 / 实收重量(可编辑,行尾固定,v1.7.93 行尾固定)
      receivedQty: '',
      receivedWeight: '',
    }));
  });

  // 表单状态(v1.7.93: 去掉毛重/皮重,保留净重,仓房&货位改非必填)
  const form = {
    recordNo: '',          // 入库单号
    recordTime: '',        // 入库时间
    warehouse: '',         // 仓库名称
    location: '',          // 仓房&货位(v1.7.93 非必填)
    netWeight: '',         // 净重总量
    netUnit: '千克',
    remark: '',            // 备注
  };

  // 附件状态
  const attach = {
    inboundDoc: null,      // 入库单
    weighbridgeDetail: null,// 磅单明细
    operationTrace: [],    // 入库作业留痕（多张）
  };

  function render() {
    return `
      <!-- 返回链接 -->
      <div class="flex items-center justify-between mb-4">
        <a href="${Utils.nav('/platform/approval-in-out-detail')}" class="flex items-center gap-1 text-slate-600 hover:text-blue-600 text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          返回出/入库详情
        </a>
      </div>

      <form id="inboundForm" class="bg-white border border-slate-200 rounded-xl space-y-5">
        <!-- 1. 入库申请信息(只读) -->
        <div class="px-6 pt-5 pb-2">
          <div class="text-sm font-bold text-slate-800 border-l-4 border-blue-600 pl-3">入库申请信息</div>
        </div>
        <div class="px-6 pb-2">
          <div class="border border-slate-200 rounded-lg overflow-hidden">
            <table class="w-full text-sm">
              <tbody>
                <tr class="border-b border-slate-200">
                  <td class="bg-slate-50 px-4 py-3 text-slate-600 w-32">入库申请编号</td>
                  <td class="px-4 py-3 text-blue-700 font-mono">
                    <a href="${Utils.nav('/customer/inbound-detail?id=' + f.id)}" class="hover:underline">PREIN${f.bizNo.replace('IN_', '')}<span class="ml-1">✏️</span></a>
                  </td>
                  <td class="bg-slate-50 px-4 py-3 text-slate-600 w-32">出质方</td>
                  <td class="px-4 py-3 text-slate-800">${f.applicant}</td>
                </tr>
                <tr class="border-b border-slate-200">
                  <td class="bg-slate-50 px-4 py-3 text-slate-600">金融产品</td>
                  <td class="px-4 py-3 text-slate-800">${f.productName || '中原e货'}</td>
                  <td class="bg-slate-50 px-4 py-3 text-slate-600">质权方</td>
                  <td class="px-4 py-3 text-slate-800">${f.guarantor || '郑州农业融资担保股份有限公司'}</td>
                </tr>
                <tr>
                  <td class="bg-slate-50 px-4 py-3 text-slate-600">联系人</td>
                  <td class="px-4 py-3 text-slate-800">${f.contact || '张三-13323828889'}</td>
                  <td class="bg-slate-50 px-4 py-3 text-slate-600">监管企业</td>
                  <td class="px-4 py-3 text-slate-800">${f.supervisor || '大河智链物流（郑州）有限公司'}</td>
                </tr>
                <tr>
                  <td class="bg-slate-50 px-4 py-3 text-slate-600">申请日期</td>
                  <td class="px-4 py-3 text-slate-800" colspan="3">${f.applyDate || '2026-06-20'}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 2. 入库信息(可编辑,浅紫色高亮) -->
        <div class="px-6 pt-4 pb-2">
          <div class="text-sm font-bold text-slate-800 border-l-4 border-blue-600 pl-3">入库信息</div>
        </div>
        <div class="px-6 pb-2">
          <div class="border-2 border-indigo-300 rounded-lg p-5 bg-indigo-50/30 space-y-4">
            <div class="grid grid-cols-3 gap-5">
              <div>
                <label class="block text-xs text-slate-700 mb-1.5"><span class="req">*</span>入库单号</label>
                <input id="recordNo" type="text" value="${form.recordNo}" placeholder="请输入入库单号"
                  class="editable w-full px-3 py-2 border border-indigo-300 rounded text-sm text-slate-800" required>
              </div>
              <div>
                <label class="block text-xs text-slate-700 mb-1.5"><span class="req">*</span>入库时间</label>
                <input id="recordTime" type="date" value="${form.recordTime}"
                  class="editable w-full px-3 py-2 border border-indigo-300 rounded text-sm text-slate-800" required>
              </div>
              <div>
                <label class="block text-xs text-slate-700 mb-1.5"><span class="req">*</span>仓库名称</label>
                <select id="warehouse" class="editable w-full px-3 py-2 border border-indigo-300 rounded text-sm text-slate-800">
                  <option value="">请选择仓库</option>
                  <option value="物流港二期大河智链监管库">物流港二期大河智链监管库</option>
                  <option value="郑州冷链中心库">郑州冷链中心库</option>
                </select>
              </div>
            </div>
            <div class="grid grid-cols-3 gap-5">
              <div>
                <label class="block text-xs text-slate-700 mb-1.5">仓房&货位<span class="text-xs text-slate-400 ml-1">(非必填)</span></label>
                <select id="location" class="editable w-full px-3 py-2 border border-indigo-300 rounded text-sm text-slate-800">
                  <option value="">请选择仓房信息</option>
                  <option value="1号仓-A区-01">1号仓-A区-01</option>
                  <option value="1号仓-A区-02">1号仓-A区-02</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-slate-700 mb-1.5"><span class="req">*</span>货主名称</label>
                <input type="text" value="${f.applicant}" disabled
                  class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded text-sm text-slate-700">
              </div>
              <div>
                <label class="block text-xs text-slate-700 mb-1.5"><span class="req">*</span>净重总量</label>
                <div class="flex items-stretch">
                  <input id="netWeight" type="text" value="${form.netWeight}" placeholder="请输入净重总量"
                    class="editable flex-1 min-w-0 px-3 py-2 border border-indigo-300 rounded-l text-sm text-slate-800 num-focus" required>
                  <select class="editable w-20 px-2 py-2 border border-l-0 border-indigo-300 rounded-r text-sm text-slate-700">
                    <option>千克</option><option>吨</option>
                  </select>
                </div>
              </div>
            </div>
            <div>
              <label class="block text-xs text-slate-700 mb-1.5">备注</label>
              <textarea id="remark" rows="3" maxlength="200" placeholder="请输入备注，上限200字"
                class="editable w-full px-3 py-2 border border-indigo-300 rounded text-sm text-slate-800">${form.remark}</textarea>
            </div>
          </div>
        </div>

        <!-- 3. 货物明细 -->
        <div class="px-6 pt-4 pb-2">
          <div class="text-sm font-bold text-slate-800 border-l-4 border-blue-600 pl-3">货物明细</div>
        </div>
        <div class="px-6 pb-2">
          <div class="overflow-x-auto">
            <table class="w-full text-sm min-w-[1500px] border border-slate-200">
              <thead>
                <tr class="bg-slate-50 text-slate-600 text-xs">
                  <th class="px-3 py-2.5 text-center font-medium w-12">序号</th>
                  <th class="px-3 py-2.5 text-left font-medium">货品名称</th>
                  <th class="px-3 py-2.5 text-left font-medium">国家</th>
                  <th class="px-3 py-2.5 text-left font-medium">厂号</th>
                  <th class="px-3 py-2.5 text-right font-medium">入库数量</th>
                  <th class="px-3 py-2.5 text-center font-medium w-16">数量单位</th>
                  <th class="px-3 py-2.5 text-right font-medium">入库重量</th>
                  <th class="px-3 py-2.5 text-center font-medium w-16">重量单位</th>
                  <th class="px-3 py-2.5 text-center font-medium w-28">计划入库时间</th>
                  <th class="px-3 py-2.5 text-center font-medium w-28">生产日期</th>
                  <th class="px-3 py-2.5 text-center font-medium w-28">生产批号</th>
                  <th class="px-3 py-2.5 text-center font-medium w-28">合同号</th>
                  <th class="px-3 py-2.5 text-center font-medium w-28">提/运单号</th>
                  <th class="px-3 py-2.5 text-center font-medium w-24">柜号</th>
                  <th class="sticky-right-head-2 px-3 py-2.5 text-right font-medium w-24 bg-indigo-50">实收数量</th>
                  <th class="sticky-right-head-1 px-3 py-2.5 text-right font-medium w-24 bg-indigo-50">实收重量</th>
                </tr>
              </thead>
              <tbody>
                ${productRows.map(r => `
                  <tr class="border-t border-slate-200 hover:bg-slate-50/30">
                    <td class="px-3 py-2 text-center text-slate-700">${r.no}</td>
                    <td class="px-3 py-2 text-slate-700">${r.productName}</td>
                    <td class="px-3 py-2 text-slate-700">${r.country}</td>
                    <td class="px-3 py-2 text-slate-700">${r.factoryNo}</td>
                    <td class="px-3 py-2 text-right text-slate-700 num-focus">${r.qty}</td>
                    <td class="px-3 py-2 text-center text-slate-500 text-xs">${r.qtyUnit}</td>
                    <td class="px-3 py-2 text-right text-slate-700 num-focus">${r.weight.toLocaleString()}</td>
                    <td class="px-3 py-2 text-center text-slate-500 text-xs">${r.weightUnit}</td>
                    <td class="px-3 py-2 text-center text-slate-700 text-xs">${r.plannedDate}</td>
                    <td class="px-3 py-2 text-center text-slate-700 text-xs">${r.produceDate}</td>
                    <td class="px-3 py-2 text-center text-slate-700 text-xs">${r.batchNo}</td>
                    <td class="px-3 py-2 text-center text-slate-700 text-xs">${r.contractNo}</td>
                    <td class="px-3 py-2 text-center text-slate-700 text-xs">${r.waybill}</td>
                    <td class="px-3 py-2 text-center text-slate-700 text-xs">${r.cabinet}</td>
                    <td class="sticky-right-2 px-3 py-2">
                      <div class="flex items-stretch">
                        <input type="text" data-row="${r.no}" data-field="qty" value="${r.receivedQty}" placeholder="请输入"
                          class="editable flex-1 min-w-0 px-2 py-1 border border-indigo-300 rounded-l text-xs num-focus" oninput="onReceivedChange(${r.no}, 'qty', this.value)">
                        <span class="px-2 py-1 border border-l-0 border-indigo-300 bg-indigo-50/30 rounded-r text-xs text-slate-500 flex items-center">${r.qtyUnit}</span>
                      </div>
                    </td>
                    <td class="sticky-right-1 px-3 py-2">
                      <div class="flex items-stretch">
                        <input type="text" data-row="${r.no}" data-field="weight" value="${r.receivedWeight}" placeholder="请输入"
                          class="editable flex-1 min-w-0 px-2 py-1 border border-indigo-300 rounded-l text-xs num-focus" oninput="onReceivedChange(${r.no}, 'weight', this.value)">
                        <span class="px-2 py-1 border border-l-0 border-indigo-300 bg-indigo-50/30 rounded-r text-xs text-slate-500 flex items-center">${r.weightUnit}</span>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- 4. 附件 -->
        <div class="px-6 pt-4 pb-2">
          <div class="text-sm font-bold text-slate-800 border-l-4 border-blue-600 pl-3">附件</div>
        </div>
        <div class="px-6 pb-6">
          <div class="bg-indigo-50/60 text-slate-600 text-xs rounded-md px-3 py-2.5 mb-4">
            可支持格式为jpg，jpeg，png，pdf的附件，支持多张，单个附件大小不得超过100M的文件。
          </div>
          <div class="border border-slate-200 rounded-lg overflow-hidden">
            <table class="w-full text-sm">
              <thead>
                <tr class="bg-slate-50 text-slate-600 text-xs">
                  <th class="px-4 py-2.5 text-center font-medium w-32">单据类型</th>
                  <th class="px-4 py-2.5 text-center font-medium w-32">操作</th>
                  <th class="px-4 py-2.5 text-center font-medium w-44">上传时间</th>
                  <th class="px-4 py-2.5 text-left font-medium">文件名</th>
                </tr>
              </thead>
              <tbody>
                ${renderAttachRow('inboundDoc', '入库单', true)}
                ${renderAttachRow('weighbridgeDetail', '磅单明细', true)}
                ${renderAttachRow('operationTrace', '入库作业留痕', false)}
              </tbody>
            </table>
          </div>
        </div>

        <!-- 底部占位 -->
        <div class="footer-spacer"></div>
      </form>

      <!-- 5. 底部固定按钮 -->
      <div class="footer-actions">
        <div class="max-w-7xl mx-auto px-6 flex justify-end gap-3">
          <button type="button" onclick="location.href = Utils.nav('/platform/approval-in-out-detail')"
            class="px-5 py-2 border border-slate-300 hover:border-slate-400 text-slate-700 rounded text-sm font-medium">
            取消
          </button>
          <button type="button" onclick="submitForm()" title="Ctrl+Enter 快捷提交"
            class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
            <span>提交</span>
          </button>
        </div>
      </div>
    `;
  }

  function renderAttachRow(key, label, required) {
    const req = required ? '<span class="req">*</span>' : '';
    return `
      <tr class="border-t border-slate-200">
        <td class="px-4 py-3 text-center text-slate-700">${req}${label}</td>
        <td class="px-4 py-3 text-center">
          <label class="inline-flex items-center px-3 py-1 border border-indigo-300 text-indigo-700 rounded text-xs hover:bg-indigo-50 cursor-pointer">
            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span>上传</span>
            <input type="file" class="hidden" multiple onchange="onAttach('${key}', this)" accept=".jpg,.jpeg,.png,.pdf">
          </label>
        </td>
        <td class="px-4 py-3 text-center text-slate-500 text-xs" id="attach-time-${key}">—</td>
        <td class="px-4 py-3 text-slate-700 text-xs" id="attach-name-${key}">—</td>
      </tr>
    `;
  }

  function onReceivedChange(rowNo, field, value) {
    const row = productRows.find(r => r.no === rowNo);
    if (row) row[field === 'qty' ? 'receivedQty' : 'receivedWeight'] = value;
  }

  function onAttach(key, input) {
    if (!input.files || input.files.length === 0) return;
    if (key === 'operationTrace') {
      attach.operationTrace = [...(attach.operationTrace || []), ...Array.from(input.files)];
    } else {
      attach[key] = input.files[0];
    }
    const now = new Date();
    const time = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');
    document.getElementById('attach-time-' + key).textContent = time;
    const files = key === 'operationTrace' ? attach.operationTrace : [attach[key]];
    document.getElementById('attach-name-' + key).innerHTML = `
      <div class="flex items-center gap-1.5 flex-wrap">
        ${files.map((f, i) => `
          <span class="inline-flex items-center gap-1.5 px-2 py-1 bg-blue-50 rounded text-xs">
            <span class="text-blue-700">${f.name}</span>
            <button type="button" onclick="removeAttach('${key}', ${i})" class="text-slate-400 hover:text-rose-500">×</button>
          </span>
        `).join('')}
      </div>
    `;
  }

  function removeAttach(key, idx) {
    if (key === 'operationTrace') {
      attach.operationTrace.splice(idx, 1);
    } else {
      attach[key] = null;
    }
    if (key === 'operationTrace' && attach.operationTrace.length > 0) {
      onAttach('operationTrace', { files: attach.operationTrace });
    } else {
      document.getElementById('attach-time-' + key).textContent = '—';
      document.getElementById('attach-name-' + key).textContent = '—';
    }
  }

  function submitForm() {
    form.recordNo = document.getElementById('recordNo').value.trim();
    form.recordTime = document.getElementById('recordTime').value;
    form.warehouse = document.getElementById('warehouse').value;
    form.location = document.getElementById('location').value;  // v1.7.93 非必填
    form.netWeight = document.getElementById('netWeight').value.trim();
    form.remark = document.getElementById('remark').value.trim();

    // 校验(v1.7.93: 去掉毛重/皮重,仓房&货位改非必填)
    if (!form.recordNo) return Utils.toast('请填写入库单号', 'warning');
    if (!form.recordTime) return Utils.toast('请选择入库时间', 'warning');
    if (!form.warehouse) return Utils.toast('请选择仓库名称', 'warning');
    if (!form.netWeight || parseFloat(form.netWeight) <= 0) return Utils.toast('请填写净重总量（> 0）', 'warning');
    // 校验货物明细实收
    const emptyReceived = productRows.find(r => !r.receivedQty || !r.receivedWeight);
    if (emptyReceived) return Utils.toast(`第 ${emptyReceived.no} 行实收数量 / 重量未填`, 'warning');
    // 校验附件
    if (!attach.inboundDoc) return Utils.toast('请上传入库单', 'warning');
    if (!attach.weighbridgeDetail) return Utils.toast('请上传磅单明细', 'warning');

    const totalReceivedQty = productRows.reduce((s, r) => s + parseInt(r.receivedQty || 0), 0);
    const totalReceivedWeight = productRows.reduce((s, r) => s + parseFloat(r.receivedWeight || 0), 0);
    Utils.toast(`入库登记成功：单号 ${form.recordNo}，实收 ${totalReceivedQty} 件 / ${totalReceivedWeight.toLocaleString()} 千克`, 'success');
    setTimeout(() => location.href = Utils.nav('/platform/approval-in-out-detail'), 1200);
  }

  // Ctrl+Enter 快捷提交
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      submitForm();
    }
  });

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '新增入库记录',
    subtitle: '监管方视角 - 实际入库实收录入',
    currentPath: '/platform/approval-in-out-detail',
    breadcrumb: [
      { label: '货物管理', path: '/platform/approval-inbound' },
      { label: '出/入库详情', path: '/platform/approval-in-out-detail' },
      { label: '新增入库', path: '/platform/inbound-record-create' },
    ],
    extra: ``,
    content: render(),
  });
</script>
</body>
</html>
