<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>准入审批 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.28.5 准入审批列表（按 user 2026-07-10 18:00 截图）============
  // 归属：供应链金融 / 准入审批（平台方/监管方视角）
  // 4 筛选 inline：企业名称 / 统一信用代码 / 申请日期范围 / 申请结果
  // 6 状态 tab：全部 / 基础材料收集 / 资质审核 / 现场考察 / 风险评估 / 办结
  // 7 列表格：企业名称 / 统一信用代码 / 法人 / 当前进度 / 申请日期 / 申请结果 / 操作
  // 12 行 mock + 400/80 分页

  // 切到 finance 子产品，保证 sidebar 正确显示「客户准入 / 融资管理 / ...」组
  if (Utils.getProductLine() !== 'finance') {
    Utils.setProductLine('finance');
  }

  // ============ 状态 ============
  const PAGE_SIZE = 10;
  const TOTAL = 400;          // 模拟总数
  const TOTAL_PAGES = 80;     // 模拟总页数
  let currentPage = 1;
  let currentTab = 'all';     // 6 个 progress tab key
  const filters = { name: '', creditCode: '', dateStart: '', dateEnd: '', applyResult: '' };
  const dict = MockData.admissionApprovalDict;
  const progressMap = dict.progressMap;

  // ============ 工具：⚡ 黄色提示图标（v1.7.28.2 已统一 SVG 渲染）============
  function urgentBadge(title = '此 tab 有待办/紧急任务') {
    return `<span class="inline-flex items-center justify-center w-4 h-4 bg-yellow-300 rounded-sm align-middle" title="${title}">
              <svg class="w-2.5 h-2.5 text-yellow-900" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7v8l10-12h-7V2z"/></svg>
            </span>`;
  }

  // ============ 渲染：筛选区 ============
  function renderFilters() {
    return `
      <div class="flex items-center gap-3 mb-3">
        <input id="f-name" type="text" placeholder="输入企业名称" class="flex-1 px-3 py-2 border border-slate-200 rounded text-sm bg-white text-slate-700 placeholder-slate-300 focus:outline-none focus:border-blue-400" />
        <input id="f-credit" type="text" placeholder="输入社会统一信用代码" class="flex-1 px-3 py-2 border border-slate-200 rounded text-sm bg-white text-slate-700 placeholder-slate-300 focus:outline-none focus:border-blue-400" />
        <div class="relative flex-1">
          <input id="f-date" type="text" placeholder="选择申请日期范围" readonly class="w-full px-3 py-2 pr-9 border border-slate-200 rounded text-sm bg-white text-slate-400 focus:outline-none focus:border-blue-400 cursor-pointer" onclick="Utils.toast('日期范围选择器（待开发）', 'info')" />
          <span class="absolute right-2 top-1/2 -translate-y-1/2 inline-flex items-center justify-center w-5 h-5 text-slate-300 border border-slate-200 rounded text-[10px] font-medium">?</span>
        </div>
        <div class="relative flex-1">
          <select id="f-result" class="w-full appearance-none px-3 py-2 pr-9 border border-slate-200 rounded text-sm bg-white text-slate-400 focus:outline-none focus:border-blue-400 focus:text-slate-700">
            <option value="">通过</option>
            ${dict.applyResults.map(r => `<option value="${r.value}">${r.label}</option>`).join('')}
          </select>
          <span class="absolute right-2 top-1/2 -translate-y-1/2 inline-flex items-center justify-center w-5 h-5 text-slate-300 border border-slate-200 rounded text-[10px] font-medium">?</span>
        </div>
        <button id="btn-search" class="inline-flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
          <span>查询</span>
        </button>
        <button id="btn-reset" class="inline-flex items-center gap-1.5 px-4 py-2 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 rounded text-sm font-medium">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          <span>重置</span>
        </button>
      </div>
    `;
  }

  // ============ 渲染：6 状态 tab ============
  function renderTabs() {
    return `
      <div class="flex items-end gap-1 border-b border-slate-200 mb-3 pl-1">
        ${dict.progressTabs.map(t => `
          <button onclick="switchTab('${t.key}')" class="flex items-center gap-1.5 px-4 py-2.5 text-sm transition border-b-2 -mb-px ${
            t.key === currentTab
              ? 'border-blue-600 text-blue-600 font-medium'
              : 'border-transparent text-slate-600 hover:text-slate-800'
          }">
            <span>${t.label}</span>
            <span class="${t.key === currentTab ? 'text-blue-600' : 'text-slate-400'}">(${t.count})</span>
            ${t.urgent ? urgentBadge() : ''}
          </button>
        `).join('')}
      </div>
    `;
  }

  // ============ 渲染：表格 ============
  function renderTable() {
    let data = (MockData.admissionApprovalList || []);
    // 按 tab 过滤
    if (currentTab !== 'all' && progressMap[currentTab]) {
      data = data.filter(d => d.currentProgress === progressMap[currentTab]);
    }
    // 按筛选过滤
    if (filters.name)        data = data.filter(d => d.name.includes(filters.name));
    if (filters.creditCode)  data = data.filter(d => d.creditCode.includes(filters.creditCode));
    if (filters.applyResult) {
      const label = (dict.applyResults.find(r => r.value === filters.applyResult) || {}).label;
      if (label) data = data.filter(d => d.applyResult === label);
    }

    const rows = data.map(d => `
      <tr class="border-b border-slate-100 hover:bg-blue-50/30 transition">
        <td class="px-4 py-3 text-sm text-slate-700">${d.name}</td>
        <td class="px-4 py-3 text-sm text-slate-500 font-mono">${d.creditCode}</td>
        <td class="px-4 py-3 text-sm text-slate-700">${d.legalPerson}</td>
        <td class="px-4 py-3 text-sm text-slate-700">${d.currentProgress}</td>
        <td class="px-4 py-3 text-sm text-slate-700">${d.applyDate}</td>
        <td class="px-4 py-3 text-sm text-slate-700">${d.applyResult}</td>
        <td class="px-4 py-3 text-sm">
          <div class="flex items-center gap-2 flex-wrap">
            <a href="${Utils.nav('/platform/admission-approval')}?id=${d.id}" class="text-xs text-blue-600 hover:text-blue-800">详情</a>
            ${urgentBadge('此申请有加急/特殊处理')}
          </div>
        </td>
      </tr>
    `).join('');

    const emptyRow = `<tr><td colspan="7" class="px-4 py-12 text-center text-slate-400 text-sm">该状态下暂无数据</td></tr>`;

    return `
      <div class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-3">
        <table class="w-full">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">企业名称</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">社会统一信用代码</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">企业法人</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">当前进度</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">申请日期</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">申请结果</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">操作</th>
            </tr>
          </thead>
          <tbody>${rows || emptyRow}</tbody>
        </table>
      </div>
    `;
  }

  // ============ 渲染：分页 ============
  function renderPagination(total) {
    return Components.pagination({ total: total || 0, page: 1, pageSize: 10, onChange: 'window.__noop', onPageSize: 'window.__noop', onJump: 'window.__noop' });
  }

  // ============ 行为 ============
  window.switchTab = function(key) {
    currentTab = key;
    currentPage = 1;
    render();
  };
  window.goPage = function(p) {
    if (p < 1 || p > TOTAL_PAGES) return;
    currentPage = p;
    render();
  };
  function applyFilters() {
    filters.name       = document.getElementById('f-name').value.trim();
    filters.creditCode = document.getElementById('f-credit').value.trim();
    filters.applyResult = document.getElementById('f-result').value;
    currentPage = 1;
    Utils.toast('查询条件已应用（共 ' + TOTAL + ' 条记录）', 'success');
    render();
  }
  function resetFilters() {
    document.getElementById('f-name').value = '';
    document.getElementById('f-credit').value = '';
    document.getElementById('f-date').value = '';
    document.getElementById('f-result').value = '';
    Object.keys(filters).forEach(k => filters[k] = '');
    currentPage = 1;
    Utils.toast('已重置筛选', 'info');
    render();
  }

  // ============ 主渲染 ============
  function render() {
    document.getElementById('app').innerHTML = `
      ${Components.topbar('')}
      <div class="flex">
        ${Components.sidebar('/platform/approval-admission')}
        <main class="flex-1 overflow-y-auto bg-slate-50">
          <div class="p-6 page-enter">
            ${Components.breadcrumb(['供应链金融', '准入审批'])}
            <div class="mb-4">
              <h1 class="text-xl font-bold text-slate-800">准入审批</h1>
              <p class="text-slate-500 text-sm mt-0.5">企业准入申请审批工作台（基础材料收集 → 资质审核 → 现场考察 → 风险评估 → 办结）</p>
            </div>
            ${renderFilters()}
            ${renderTabs()}
            ${renderTable()}
            ${renderPagination(applyFilters().length)}
          </div>
        </main>
      </div>
    `;
    document.getElementById('btn-search').onclick = applyFilters;
    document.getElementById('btn-reset').onclick  = resetFilters;
    document.getElementById('jump-page').onchange = (e) => goPage(parseInt(e.target.value || 1, 10));
  }

  render();
</script>
</body>
</html>
