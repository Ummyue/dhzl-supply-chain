<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解押/出库审批 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    /* 状态机 tab：按图 1 — 9 个 tab，含计数徽章 */
    .dc-tab { position: relative; padding: 10px 12px; cursor: pointer; color: #475569; font-size: 13px; white-space: nowrap; transition: color .15s; border-bottom: 2px solid transparent; display: inline-flex; align-items: center; gap: 4px; }
    .dc-tab:hover { color: #2563eb; }
    .dc-tab.active { color: #2563eb; font-weight: 600; border-bottom-color: #2563eb; }
    .dc-tab .count { color: #94a3b8; font-weight: 400; }
    .dc-tab.active .count { color: #2563eb; }
    /* 行尾 sticky 3 列预备（详情页用，列表页略） */
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.69 监管方【解押/出库审批】列表 - 复制自货主方解押出库申请 (v1.7.23 列表) ============
  // 9 筛选器 / 9 状态 tab / 11 列 / 数据导出按钮 / 400 条记录 第 1/80 页

  const filters = {
    applyNo: '',                  // 出库申请单编号
    warehouse: '',                // 库点
    position: '',                 // 仓房-货位
    product: '',                  // 金融产品
    pledgeFinancingNo: '',        // 货押融资编号
    inventoryAssetNo: '',         // 存贷资产编号
  };
  let activeTab = 'all';

  const STATUS_LABEL = {
    draft:                 '待提交',
    pending_supervisor:    '待监管方确认',
    pending_supervisor_seal: '待监管方盖章',
    pending_guarantor:     '待担保方确认',    pending_funding:       '待融资方盖章',
    pending_discharge:     '待还款',
    completed:             '已还款',
    rejected:              '驳回',
    invalid:               '作废',
  };
  // 图 1 顺序：全部 / 待提交 / 待监管方确认 / 待担保方确认 / 待融资方盖章(1) / 待监管方盖章 / 待还款 / 已还款 / 驳回 / 作废
  const TAB_ORDER = ['all','pending_supervisor','pending_guarantor','pending_funding','pending_supervisor_seal','pending_discharge','completed','rejected','invalid'];

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '解押/出库审批',
    currentPath: '/platform/approval-outbound',
    breadcrumb: [
      { label: '解押出库管理', path: '/platform/approval-outbound' },
      { label: '解押/出库审批', path: '/platform/approval-outbound' },
    ],
    extra: `
      <a href="${Utils.nav('/platform/approval-outbound-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        新增解押申请
      </a>
    `,
    content: render(),
  });

  function render() {
    return `
      ${Components.filterBar({
        filters: filters,
        fields: [
          { key: 'applyNo', type: 'text', placeholder: '请输入出库申请单编号', suggest: { primaryKey: 'applyNo', secondaryKey: 'warehouse' } },
          { key: 'warehouse', type: 'select', placeholder: '库点', options: [{ value: '', label: '请选择' }, ...uniqueValues('warehouse').map(v => ({ value: v, label: v }))] },
          { key: 'position', type: 'select', placeholder: '仓房-货位', options: [{ value: '', label: '请选择' }, ...uniqueValues('position').map(v => ({ value: v, label: v }))] },
          { key: 'product', type: 'select', placeholder: '金融产品', options: [{ value: '', label: '请选择' }, ...uniqueValues('product').map(v => ({ value: v, label: v }))] },
          { key: 'pledgeFinancingNo', type: 'text', placeholder: '请输入货押融资编号' },
          { key: 'inventoryAssetNo', type: 'text', placeholder: '请输入存贷资产编号' },
        ],
        dataSource: MockData.dischargeList,
        onChange: 'refresh',
        hasExport: true,
        exportCSV: 'exportOutboundCSV',
      })}

          <!-- 状态机 tab 行 -->
      <div class="bg-white border border-slate-200 rounded-t-xl overflow-x-auto" style="border-bottom: 0;">
        <div class="flex items-center">
          ${renderTabs()}
        </div>
      </div>

      <!-- 11 列表格 -->
      <div class="bg-white border border-slate-200 rounded-b-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[1280px]">
            <thead class="bg-slate-50 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-3 whitespace-nowrap">出库申请单编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">库点</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">仓房-货位</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">解押数量</th>
                <th class="text-center px-3 py-3 whitespace-nowrap">数量单位</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">解押重量</th>
                <th class="text-center px-3 py-3 whitespace-nowrap">质量单位</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">解押货值（元）</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">货押融资编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">存贷资产编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">金融产品</th>
              </tr>
            </thead>
            <tbody>${renderRows(applyFilters())}</tbody>
          </table>
        </div>
        ${renderPagination(applyFilters().length)}
      </div>
    `;
  }

  function uniqueValues(field) {
    const set = new Set();
    (MockData.dischargeList || []).forEach(p => p[field] && set.add(p[field]));
    return Array.from(set);
  }

  function applyFilters() {
    let list = (MockData.dischargeList || []);
    if (activeTab !== 'all') list = list.filter(p => p.status === activeTab);
    if (filters.applyNo)           list = list.filter(p => (p.applyNo || '').includes(filters.applyNo));
    if (filters.warehouse)         list = list.filter(p => p.warehouse === filters.warehouse);
    if (filters.position)          list = list.filter(p => p.position === filters.position);
    if (filters.product)           list = list.filter(p => p.product === filters.product);
    if (filters.pledgeFinancingNo) list = list.filter(p => (p.pledgeFinancingNo || '').includes(filters.pledgeFinancingNo));
    if (filters.inventoryAssetNo)  list = list.filter(p => (p.inventoryAssetNo || '').includes(filters.inventoryAssetNo));
    return list;
  }

  function tabCounts() {
    const all = MockData.dischargeList || [];
    const c = { all: all.length };
    Object.keys(STATUS_LABEL).forEach(k => c[k] = all.filter(p => p.status === k).length);
    return c;
  }

  function renderTabs() {
    const counts = tabCounts();
    return TAB_ORDER.map(k => {
      const label = k === 'all' ? '全部' : STATUS_LABEL[k];
      const isActive = k === activeTab;
      return `
        <div class="dc-tab ${isActive ? 'active' : ''}" onclick="switchTab('${k}')">
          <span>${label}</span><span class="count">(${counts[k] || 0})</span>
        </div>
      `;
    }).join('');
  }

  function renderRows(list) {
    if (!list.length) return `<tr><td colspan="11" class="py-12 text-center text-slate-400 text-sm">📭 当前筛选条件下无解押出库申请</td></tr>`;
    return list.map(p => `
      <tr class="border-t border-slate-100 hover:bg-blue-50/30 cursor-pointer" onclick="goDetail('${p.id}')">
        <td class="px-3 py-3 font-mono text-xs text-slate-700 whitespace-nowrap">${p.applyNo}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.warehouse}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.position}</td>
        <td class="px-3 py-3 text-right num-focus text-slate-700 text-xs whitespace-nowrap">${p.releaseQty}</td>
        <td class="px-3 py-3 text-center text-slate-500 text-xs">${p.qtyUnit}</td>
        <td class="px-3 py-3 text-right num-focus text-slate-700 text-xs whitespace-nowrap">${p.releaseWeight.toLocaleString()}</td>
        <td class="px-3 py-3 text-center text-slate-500 text-xs">${p.weightUnit}</td>
        <td class="px-3 py-3 text-right num-focus font-medium text-slate-800 text-xs whitespace-nowrap">${Utils.fmtMoney(p.releaseValue)}</td>
        <td class="px-3 py-3 text-blue-600 font-mono text-xs whitespace-nowrap hover:underline">${p.pledgeFinancingNo}</td>
        <td class="px-3 py-3 text-blue-600 font-mono text-xs whitespace-nowrap hover:underline">${p.inventoryAssetNo}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.product}</td>
      </tr>
    `).join('');
  }

  function renderPagination(total) {
    return Components.pagination({ total: total || 0, page: 1, pageSize: 10, onChange: 'window.__noop', onPageSize: 'window.__noop', onJump: 'window.__noop' });
  }

  // ============ Events ============
  window.updateFilter = (k, v) => { filters[k] = v; };
  window.switchTab   = (k) => { activeTab = k; refresh(); };
  window.removeTag   = (k, isDate) => { if (isDate) { /* */ } else { filters[k] = ''; const i = document.getElementById('filterInput_' + k); if (i) i.value = ''; } refresh(); };
  window.resetAllFilters = () => { Object.keys(filters).forEach(k => filters[k] = ''); document.querySelectorAll('[id^="filterInput_"]').forEach(i => i.value = ''); refresh(); };
  window.goDetail    = (id) => { window.location.href = `${Utils.nav('/platform/approval-outbound-detail')}?id=${id}`; };

  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '解押/出库审批',
      currentPath: '/platform/approval-outbound',
      breadcrumb: [
        { label: '解押出库管理', path: '/platform/approval-outbound' },
        { label: '解押/出库审批', path: '/platform/approval-outbound' },
      ],
      extra: `
        <a href="${Utils.nav('/platform/approval-outbound-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          新增解押申请
        </a>
      `,
      content: render(),
    });
  }
</script>
</body>
</html>
