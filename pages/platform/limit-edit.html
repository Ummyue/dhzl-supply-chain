<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改额度 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    .req::before { content: '*'; color: #ef4444; margin-right: 2px; font-weight: 600; }
    .form-input {
      width: 100%;
      padding: 5px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 13px;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.1); }
    .form-input[readonly] { background: #f1f5f9; color: #64748b; cursor: not-allowed; }
    .form-label { font-size: 13px; color: #475569; text-align: right; padding-right: 12px; line-height: 30px; white-space: nowrap; }
    .form-grid { display: grid; grid-template-columns: 110px 1fr 110px 1fr; gap: 14px 18px; align-items: center; }
    .help-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border: 1px solid #cbd5e1; border-radius: 2px;
      color: #94a3b8; font-size: 10px; font-weight: 600; margin-left: 4px; cursor: help;
    }
    .footer-actions {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 16px 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
    }
    .footer-spacer { height: 80px; }
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.48 监管方【修改额度】- 按甲方截图实现 ============
  // 与 limit-create.html 类似，关键区别：
  // 1) 字段预填（从 creditLimits[id] 读默认值）
  // 2) 企业名称 + 信用代码 disabled（自动带出 + 不可修改）
  // 3) 14 项字段可改
  // 4) 修改检测：任一字段变化 → 提交按钮启用；未发生修改 → 提交禁用
  // 5) 附件可更新上传

  const urlId = new URLSearchParams(window.location.search).get('id') || 'cl_001';
  const record = (MockData.creditLimits || []).find(r => r.id === urlId) || {};

  // 候选数据（与 v1.7.45 limit-create.html 一致）
  const customerOptions = (MockData.admissionList || []).map(a => ({ label: a.customer, creditCode: a.creditCode, id: a.id }));
  const bankOptions = [...new Set((MockData.limitList || []).map(r => r.bank))];
  const productOptions = [...new Set((MockData.limitList || []).map(r => r.productName))];
  const creditTypeOptions = [...new Set((MockData.limitList || []).map(r => r.creditType))];
  const coreCompanyOptions = [...new Set((MockData.limitList || []).map(r => r.coreCompany))];
  const supervisorOptions = ['大河智链', '郑州海关·保税货物监管处', '某省级金融监管局'];
  const warehouseOptions = ['物流港二期大河智链监管库', '郑州融万冷链库', '天津港国际冷链基地'];
  const guarantorOptions = ['中原信用担保有限公司', '某省级农业担保股份有限公司', '中原再担保股份有限公司', '河南农担股份有限公司'];

  // 初始值（用于"修改检测"对比）
  const initial = {
    bank:         record.bank         || '',
    product:      record.product      || '',
    productName:  record.productName  || '',
    creditType:   record.creditType   || '',
    totalAmount:  record.totalLimit   ? String(record.totalLimit) : '',
    frozenAmount: record.frozenAmount != null ? String(record.frozenAmount) : '',
    startDate:    record.startDate    || '',
    maturityDate: record.maturityDate || '',
    circular:     record.circular     ? '是' : '否',
    state:        record.state        || '启用',
    coreCompany:      record.coreCompany      || '',
    supervisorCompany: record.supervisorCompany || '',
    warehouseCompany: record.warehouseCompany || '',
    guarantorCompany: record.guarantorCompany || '',
  };
  let form = { ...initial };

  // 初始附件（深拷贝避免污染源数据）
  const initialAttachments = JSON.parse(JSON.stringify(record.attachments || []));

  // 渲染
  function render() {
    return `
      <div class="flex items-center gap-2 mb-3 text-sm">
        <a href="${Utils.nav('/platform/limit-management')}" class="flex items-center gap-1 text-slate-600 hover:text-blue-600">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          返回额度管理
        </a>
      </div>

      <form id="limitForm" class="space-y-4" onsubmit="event.preventDefault(); submitLimit();">
        <!-- ============ 基本信息 ============ -->
        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
          <div class="px-6 py-3 border-b border-slate-200 flex items-center gap-2">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="font-bold text-slate-800">基本信息</h3>
          </div>
          <div class="px-6 py-5">
            <div class="form-grid">
              <!-- Row 1: 企业名称 disabled + 信用代码 disabled -->
              <label class="form-label req">企业名称</label>
              <div>
                <input class="form-input" value="${record.customer || ''}" readonly>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>
              <label class="form-label">企业社会统一信用代码</label>
              <div>
                <input class="form-input" value="${record.creditCode || ''}" readonly>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>

              <!-- Row 2: 金融机构 + 金融产品 -->
              <label class="form-label req">金融机构</label>
              <div>
                <select id="f-bank" onchange="onField('bank', this.value)" class="form-input">
                  <option value="">选择选项</option>
                  ${bankOptions.map(b => `<option value="${b}" ${form.bank === b ? 'selected' : ''}>${b}</option>`).join('')}
                </select>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>
              <label class="form-label req">金融产品</label>
              <div>
                <select id="f-product" onchange="onField('product', this.value)" class="form-input">
                  <option value="">选择选项</option>
                  ${productOptions.map(p => `<option value="${p}" ${form.product === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>

              <!-- Row 3: 授信产品名称 + 授信类型 -->
              <label class="form-label">授信产品名称</label>
              <input id="f-productName" class="form-input" placeholder="输入内容" value="${form.productName}" oninput="onField('productName', this.value)">
              <label class="form-label req">授信类型</label>
              <div>
                <select id="f-creditType" onchange="onField('creditType', this.value)" class="form-input">
                  <option value="">选择选项</option>
                  ${creditTypeOptions.map(t => `<option value="${t}" ${form.creditType === t ? 'selected' : ''}>${t}</option>`).join('')}
                </select>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>

              <!-- Row 4: 授信额度 + 冻结额度 -->
              <label class="form-label req">授信额度</label>
              <input id="f-totalAmount" class="form-input" placeholder="输入内容" value="${form.totalAmount}" oninput="onField('totalAmount', this.value)">
              <label class="form-label req">冻结额度</label>
              <input id="f-frozenAmount" class="form-input" placeholder="输入内容" value="${form.frozenAmount}" oninput="onField('frozenAmount', this.value)">

              <!-- Row 5: 起始日期 + 终止日期 -->
              <label class="form-label req">起始日期</label>
              <div>
                <input type="date" id="f-startDate" class="form-input" value="${form.startDate}" onchange="onField('startDate', this.value)">
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>
              <label class="form-label req">终止日期</label>
              <div>
                <input type="date" id="f-maturityDate" class="form-input" value="${form.maturityDate}" onchange="onField('maturityDate', this.value)">
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>

              <!-- Row 6: 额度是否循环 + 额度状态 -->
              <label class="form-label req">额度是否循环</label>
              <div class="flex items-center gap-6 text-sm">
                <label class="flex items-center gap-1.5"><input type="radio" name="circular" value="是" ${form.circular === '是' ? 'checked' : ''} onchange="onField('circular', '是')"> 是</label>
                <label class="flex items-center gap-1.5"><input type="radio" name="circular" value="否" ${form.circular === '否' ? 'checked' : ''} onchange="onField('circular', '否')"> 否</label>
              </div>
              <label class="form-label req">额度状态</label>
              <div class="flex items-center gap-6 text-sm">
                <label class="flex items-center gap-1.5"><input type="radio" name="state" value="启用" ${form.state === '启用' ? 'checked' : ''} onchange="onField('state', '启用')"> 启用</label>
                <label class="flex items-center gap-1.5"><input type="radio" name="state" value="停用" ${form.state === '停用' ? 'checked' : ''} onchange="onField('state', '停用')"> 停用</label>
              </div>

              <!-- Row 7: 核心企业 + 监管企业 -->
              <label class="form-label req">核心企业</label>
              <div>
                <select id="f-coreCompany" onchange="onField('coreCompany', this.value)" class="form-input">
                  <option value="">选择选项</option>
                  ${coreCompanyOptions.map(c => `<option value="${c}" ${form.coreCompany === c ? 'selected' : ''}>${c}</option>`).join('')}
                </select>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>
              <label class="form-label req">监管企业</label>
              <div>
                <select id="f-supervisorCompany" onchange="onField('supervisorCompany', this.value)" class="form-input">
                  <option value="">选择选项</option>
                  ${supervisorOptions.map(s => `<option value="${s}" ${form.supervisorCompany === s ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>

              <!-- Row 8: 仓储企业 + 担保企业 -->
              <label class="form-label req">仓储企业</label>
              <div>
                <select id="f-warehouseCompany" onchange="onField('warehouseCompany', this.value)" class="form-input">
                  <option value="">选择选项</option>
                  ${warehouseOptions.map(w => `<option value="${w}" ${form.warehouseCompany === w ? 'selected' : ''}>${w}</option>`).join('')}
                </select>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>
              <label class="form-label req">担保企业</label>
              <div>
                <select id="f-guarantorCompany" onchange="onField('guarantorCompany', this.value)" class="form-input">
                  <option value="">选择选项</option>
                  ${guarantorOptions.map(g => `<option value="${g}" ${form.guarantorCompany === g ? 'selected' : ''}>${g}</option>`).join('')}
                </select>
                <span class="help-icon" style="margin-left:6px;float:right;margin-top:-22px;margin-right:6px;">?</span>
              </div>
            </div>
          </div>
        </div>

        <!-- ============ 合同附件 ============ -->
        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
          <div class="px-6 py-3 border-b border-slate-200 flex items-center gap-2">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="font-bold text-slate-800">合同附件</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600 text-xs">
                <tr>
                  <th class="text-left px-4 py-2.5 w-1/4">附件类型</th>
                  <th class="text-left px-4 py-2.5 w-3/4">文件名称</th>
                </tr>
              </thead>
              <tbody>
                <tr class="border-t border-slate-100">
                  <td class="px-4 py-4 text-slate-700">授权批复材料</td>
                  <td class="px-4 py-4">
                    <div class="flex items-center gap-3">
                      <label class="cursor-pointer px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm font-medium flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                        选择文件
                        <input type="file" class="hidden" onchange="onFileChange('approval', this)">
                      </label>
                      <div id="file-approval" class="flex items-center gap-1.5 text-blue-600 text-sm">
                        <span class="inline-flex w-4 h-4 bg-yellow-400 rounded items-center justify-center text-[10px]">⚡</span>
                        <span>${(initialAttachments[0] && initialAttachments[0].name) || '暂未上传'}</span>
                        ${(initialAttachments[0] && initialAttachments[0].uploadedAt) ? `<span class="text-slate-400 text-xs">📅 ${initialAttachments[0].uploadedAt}</span>` : ''}
                      </div>
                    </div>
                  </td>
                </tr>
                <tr class="border-t border-slate-100">
                  <td class="px-4 py-4 text-slate-700">其他</td>
                  <td class="px-4 py-4">
                    <div class="flex items-center gap-3">
                      <label class="cursor-pointer px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm font-medium flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                        选择文件
                        <input type="file" class="hidden" onchange="onFileChange('other', this)">
                      </label>
                      <div id="file-other" class="flex items-center gap-1.5 text-blue-600 text-sm">
                        <span class="inline-flex w-4 h-4 bg-yellow-400 rounded items-center justify-center text-[10px]">⚡</span>
                        <span>${(initialAttachments[1] && initialAttachments[1].name) || '暂未上传'}</span>
                        ${(initialAttachments[1] && initialAttachments[1].uploadedAt) ? `<span class="text-slate-400 text-xs">📅 ${initialAttachments[1].uploadedAt}</span>` : ''}
                      </div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </form>

      <div class="footer-spacer"></div>
      <div class="footer-actions">
        <div class="max-w-[1280px] mx-auto px-6 flex items-center justify-center gap-4">
          <button id="btn-submit" onclick="submitLimit()" disabled class="px-12 py-2.5 bg-blue-600 text-white rounded text-sm font-medium opacity-50 cursor-not-allowed flex items-center gap-1.5">
            <span class="inline-flex w-4 h-4 bg-yellow-400 rounded items-center justify-center text-[10px]">⚡</span>
            提交
          </button>
          <button onclick="cancelEdit()" class="px-12 py-2.5 border border-blue-500 text-blue-600 hover:bg-blue-50 rounded text-sm font-medium flex items-center gap-1.5">
            <span class="inline-flex w-4 h-4 bg-yellow-400 rounded items-center justify-center text-[10px]">⚡</span>
            取消
          </button>
        </div>
      </div>
    `;
  }

  // ============ 修改检测 ============
  let changed = false;
  function isChanged() {
    // 字段对比（任一字段值变化）
    for (const k of Object.keys(initial)) {
      if ((form[k] || '') !== (initial[k] || '')) return true;
    }
    // 附件对比（文件名对比）
    const cur = JSON.stringify(currentAttachments);
    const orig = JSON.stringify(initialAttachments);
    return cur !== orig;
  }
  // 当前附件（深拷贝）
  let currentAttachments = JSON.parse(JSON.stringify(initialAttachments));

  function updateSubmitBtn() {
    const btn = document.getElementById('btn-submit');
    if (!btn) return;
    if (isChanged()) {
      btn.disabled = false;
      btn.classList.remove('opacity-50', 'cursor-not-allowed');
    } else {
      btn.disabled = true;
      btn.classList.add('opacity-50', 'cursor-not-allowed');
    }
  }

  // ============ 业务事件 ============
  window.onField = function(field, value) {
    form[field] = value;
    updateSubmitBtn();
  };
  window.onFileChange = function(kind, input) {
    if (input.files && input.files[0]) {
      const name = input.files[0].name;
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      // 更新 currentAttachments（按 kind 替换或新增）
      const idx = kind === 'approval' ? 0 : 1;
      const newAtt = { type: kind === 'approval' ? '授权批复材料' : '其他', name, uploadedAt: ts };
      if (currentAttachments[idx]) {
        currentAttachments[idx] = newAtt;
      } else {
        currentAttachments.push(newAtt);
      }
      const el = document.getElementById('file-' + kind);
      if (el) {
        el.querySelector('span:nth-child(2)').textContent = name;
        const dateSpan = el.querySelector('span:nth-child(3)');
        if (dateSpan) {
          dateSpan.textContent = '📅 ' + ts;
        } else {
          const newSpan = document.createElement('span');
          newSpan.className = 'text-slate-400 text-xs';
          newSpan.textContent = '📅 ' + ts;
          el.appendChild(newSpan);
        }
      }
      updateSubmitBtn();
    }
  };

  window.submitLimit = function() {
    if (!isChanged()) {
      Utils.toast('您尚未修改任何字段', 'warning');
      return;
    }
    // 校验必填
    const required = ['bank', 'product', 'creditType', 'totalAmount', 'frozenAmount', 'startDate', 'maturityDate', 'coreCompany', 'supervisorCompany', 'warehouseCompany', 'guarantorCompany'];
    const missing = required.filter(k => !form[k]);
    if (missing.length) {
      Utils.toast('请填写必填项', 'warning');
      return;
    }
    Utils.toast('修改成功！已更新到额度清单（mock）', 'success', 2000);
    setTimeout(() => {
      window.location.href = Utils.nav('/platform/limit-management');
    }, 1200);
  };

  window.cancelEdit = function() {
    if (isChanged() && !confirm('当前有未保存的修改，确定取消？')) {
      return;
    }
    window.location.href = Utils.nav('/platform/limit-management');
  };

  // 初始化
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '修改额度',
    currentPath: '/platform/limit-management',
    breadcrumb: [
      { label: '授信管理', path: '/platform/limit-management' },
      { label: '额度管理', path: '/platform/limit-management' },
      { label: '修改额度', path: '/platform/limit-edit' },
    ],
    extra: '',
    content: render(),
  });
  updateSubmitBtn();
</script>
</body>
</html>
