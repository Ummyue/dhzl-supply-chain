<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>融资审核 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script src="/shared/js/financingList.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '融资审核工作台',
    currentPath: '/platform/approval-financing',
    breadcrumb: [{ label: '工作台', path: '/dashboard' }, { label: '融资管理', path: '/platform/approval-financing' }, '待监管方盖章列表'],
    extra: `<button onclick="window.__FinancingList.exportCSV()" class="px-3 py-2 border border-slate-300 hover:border-emerald-500 hover:text-emerald-600 text-slate-700 rounded-md text-sm font-medium flex items-center gap-1 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        导出
      </button>`,
    content: `
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-xs text-blue-800">
        <span class="font-medium">v1.7 流程：</span>本页面是<strong>3 级审核的第 1 步</strong>（您 → 担保方 → 资金方）。审核通过后，货主方需在《质物清单》和《质押反担保合同》上盖章①。
      </div>

      ${FinancingList.render({
        // v1.7.77：行可点击 → 默认跳监管方评估货值详情页（按钮 stopPropagation 防冒泡）
        onRowClick: (rec) => { window.location.href = Utils.nav('/platform/approval-financing-detail?id=' + rec.id); },
        actionRenderer: (rec) => {
          // 监管方专属：status 涉及待监管方盖章时显示对应动作
          const showEvaluate = rec.status === 'pending_supervisor_eval';
          const showAudit = rec.status === 'pending_supervisor';
          const showDetail = true;
          return `
            ${showDetail ? `<button onclick=\"event.stopPropagation(); window.location.href = Utils.nav('/platform/approval-financing-detail?id=' + '${rec.id}')\" class="text-blue-600 hover:underline text-xs font-medium">详情</button>` : ''}
            ${showEvaluate ? `<button onclick=\"event.stopPropagation(); window.location.href = Utils.nav('/platform/approval-financing-detail?id=' + '${rec.id}')\" class="text-amber-600 hover:underline text-xs font-medium">待监管方评估货值</button>` : ''}
            ${showAudit ? `<button onclick="event.stopPropagation(); alert('即将对 ${rec.bizNo} 进行待监管方盖章（待完善审批内容）')" class="text-blue-600 hover:underline text-xs font-medium">待监管方盖章</button>` : ''}
          `;
        },
        statusLabelMap: {
          'pending_supervisor_eval': { text: '⏳ 待监管方评估货值中（您）', color: 'text-amber-600' },
          'pending_supervisor': { text: '⏳ 待监管方盖章中（您）', color: 'text-blue-600' },
        },
      })}
    `
  });
</script>
</body>
</html>
