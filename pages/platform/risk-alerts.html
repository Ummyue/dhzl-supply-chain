<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风险预警中心 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '风险预警中心',
    currentPath: '/platform/risk-alerts',
    breadcrumb: [{ label: '数据中心', path: '/platform/risk-alerts' }, '风险预警'],
    content: `
      <!-- 预警概览 -->
      <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">待处理预警</div>
          <div class="text-3xl font-bold text-orange-600 mt-1">${MockData.riskAlerts.filter(a => a.status === 'pending').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">处理中</div>
          <div class="text-3xl font-bold text-blue-600 mt-1">${MockData.riskAlerts.filter(a => a.status === 'processing').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">熔断预警</div>
          <div class="text-3xl font-bold text-rose-600 mt-1">${MockData.riskAlerts.filter(a => a.level === 'danger').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">本月已解决</div>
          <div class="text-3xl font-bold text-emerald-600 mt-1">${MockData.riskAlerts.filter(a => a.status === 'resolved').length}</div>
        </div>
      </div>

      <!-- 预警规则说明 -->
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6 text-sm text-blue-800">
        <div class="font-medium mb-1">💡 预警规则</div>
        <div>• <span class="text-amber-700 font-medium">价格提醒</span>：市场价较评估单价变化 <span class="font-bold">±5%</span></div>
        <div>• <span class="text-rose-700 font-medium">价格熔断</span>：市场价较评估单价变化 <span class="font-bold">±10%</span>，必须 3 个工作日内处理</div>
        <div>• 数据来源：RPA 每日 09:30 自动抓取牧集网/肉交所（人工可调整）</div>
      </div>

      <!-- 预警列表 -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
          <h3 class="font-semibold text-slate-800">预警列表（${MockData.riskAlerts.length}）</h3>
          <div class="flex gap-2 text-xs">
            <button class="px-3 py-1 bg-blue-100 text-blue-700 rounded">全部</button>
            <button class="px-3 py-1 text-slate-600 hover:bg-slate-100 rounded">待处理</button>
            <button class="px-3 py-1 text-slate-600 hover:bg-slate-100 rounded">处理中</button>
            <button class="px-3 py-1 text-slate-600 hover:bg-slate-100 rounded">已解决</button>
          </div>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">预警等级</th>
              <th class="text-left px-4 py-3">业务编号/客户/货品</th>
              <th class="text-left px-4 py-3">仓库</th>
              <th class="text-right px-4 py-3">价格变化</th>
              <th class="text-right px-4 py-3">当前价</th>
              <th class="text-right px-4 py-3">剩余债权</th>
              <th class="text-left px-4 py-3">建议操作</th>
              <th class="text-center px-4 py-3">触发时间</th>
              <th class="text-center px-4 py-3">状态</th>
              <th class="text-center px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.riskAlerts.map(a => `
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3">
                  <span class="px-2 py-0.5 rounded text-xs font-medium ${a.level === 'danger' ? 'bg-rose-100 text-rose-700' : 'bg-amber-100 text-amber-700'}">
                    ${a.level === 'danger' ? '🔴 熔断' : '🟡 提醒'}
                  </span>
                </td>
                <td class="px-4 py-3">
                  <div class="font-mono text-xs">${a.bizNo}</div>
                  <div class="text-xs text-slate-700">${a.customer} · ${a.product}</div>
                </td>
                <td class="px-4 py-3 text-xs">${a.warehouse}</td>
                <td class="px-4 py-3 text-right font-bold ${a.priceChange > 0 ? 'text-rose-600' : 'text-emerald-600'} num-focus">${a.priceChange > 0 ? '+' : ''}${a.priceChange.toFixed(2)}%</td>
                <td class="px-4 py-3 text-right num-focus">¥${a.currentPrice.toFixed(2)}</td>
                <td class="px-4 py-3 text-right num-focus font-medium">${Utils.fmtMoney(a.remainingDebt)}</td>
                <td class="px-4 py-3 text-xs text-slate-600">${a.suggestedAction}</td>
                <td class="px-4 py-3 text-center text-xs text-slate-500">${Utils.relativeTime(a.alertTime)}</td>
                <td class="px-4 py-3 text-center">${Components.badge(a.status === 'pending' ? 'pending' : a.status === 'processing' ? 'reviewing' : 'completed')}</td>
                <td class="px-4 py-3 text-center">
                  ${a.status === 'pending' ? `<button onclick="handleAlert('${a.id}')" class="px-3 py-1 bg-rose-600 hover:bg-rose-700 text-white text-xs rounded">立即处理</button>` : `<button onclick="viewAlert('${a.id}')" class="text-blue-600 hover:underline text-xs">查看</button>`}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <!-- 预警处理弹窗 -->
      <div id="alertModal"></div>
    `
  });

  function handleAlert(id) {
    const a = MockData.riskAlerts.find(x => x.id === id);
    if (!a) return;
    document.getElementById('alertModal').innerHTML = `
      <div class="modal-backdrop" onclick="this.remove()">
        <div class="bg-white rounded-xl w-[700px] shadow-2xl" onclick="event.stopPropagation()">
          <div class="px-6 py-4 border-b border-slate-200">
            <h3 class="font-bold text-slate-800 text-lg">处理预警 - ${a.bizNo}</h3>
          </div>
          <div class="p-6 space-y-4">
            <div class="bg-${a.level === 'danger' ? 'rose' : 'amber'}-50 border border-${a.level === 'danger' ? 'rose' : 'amber'}-200 rounded-lg p-4">
              <div class="text-sm font-medium mb-2">预警详情</div>
              <div class="grid grid-cols-2 gap-2 text-xs">
                <div><span class="text-slate-500">货品：</span>${a.product}</div>
                <div><span class="text-slate-500">客户：</span>${a.customer}</div>
                <div><span class="text-slate-500">评估单价：</span>¥${a.evaluatePrice.toFixed(2)}/kg</div>
                <div><span class="text-slate-500">当前价：</span><span class="font-bold">¥${a.currentPrice.toFixed(2)}/kg</span></div>
                <div><span class="text-slate-500">变化率：</span><span class="font-bold ${a.priceChange > 0 ? 'text-rose-600' : 'text-emerald-600'}">${a.priceChange > 0 ? '+' : ''}${a.priceChange.toFixed(2)}%</span></div>
                <div><span class="text-slate-500">剩余债权：</span><span class="font-bold">${Utils.fmtMoney(a.remainingDebt)}</span></div>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">处理方式</label>
              <div class="space-y-2">
                <label class="flex items-center gap-2 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-blue-400">
                  <input type="radio" name="method" value="supplementary" checked>
                  <div>
                    <div class="font-medium">发起追保</div>
                    <div class="text-xs text-slate-500">系统自动计算补保金额并通知客户</div>
                  </div>
                </label>
                <label class="flex items-center gap-2 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-blue-400">
                  <input type="radio" name="method" value="repay">
                  <div>
                    <div class="font-medium">通知提前还款</div>
                    <div class="text-xs text-slate-500">建议客户提前还款，降低敞口</div>
                  </div>
                </label>
                <label class="flex items-center gap-2 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-blue-400">
                  <input type="radio" name="method" value="manual">
                  <div>
                    <div class="font-medium">人工调整价格</div>
                    <div class="text-xs text-slate-500">仅用于价格异常波动场景，需领导审批</div>
                  </div>
                </label>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">处理意见</label>
              <textarea rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm" placeholder="请说明处理理由和后续跟进计划">已确认价格变化属实，已通知客户 3 个工作日内补充质押或提前还款。</textarea>
            </div>
          </div>
          <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
            <button onclick="this.closest('.modal-backdrop').remove()" class="px-4 py-2 border border-slate-300 rounded-md text-sm">取消</button>
            <button onclick="submitAlert('${a.id}')" class="px-4 py-2 bg-${a.level === 'danger' ? 'rose' : 'amber'}-600 hover:bg-${a.level === 'danger' ? 'rose' : 'amber'}-700 text-white rounded-md text-sm font-medium">确认处理</button>
          </div>
        </div>
      </div>
    `;
  }

  function submitAlert(id) {
    document.querySelector('.modal-backdrop')?.remove();
    Utils.toast('✓ 预警已处理，已发起追保流程', 'success');
    setTimeout(() => window.location.href = '/platform/supplementary', 1200);
  }

  function viewAlert(id) { Utils.toast('查看预警详情 ' + id, 'info'); }
</script>
</body>
</html>
