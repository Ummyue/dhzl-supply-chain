<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产管理（数字资产） - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '资产管理（数字资产打包）',
    currentPath: '/platform/asset-management',
    breadcrumb: [{ label: '数据中心', path: '/platform/asset-management' }, '资产管理'],
    content: `
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6 text-sm text-blue-800">
        <div class="font-medium mb-1">💡 数字资产打包</div>
        <div>系统自动归集业务相关单据（合同/运输/入库/库存）形成可信数字资产包，供银行直连放款时使用。包含勾稽关系自动核验。</div>
      </div>

      <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">资产包总数</div>
          <div class="text-2xl font-bold text-slate-800 mt-1">${MockData.assetPackages.length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">已核验</div>
          <div class="text-2xl font-bold text-emerald-600 mt-1">${MockData.assetPackages.filter(p => p.status === 'verified').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">待核验</div>
          <div class="text-2xl font-bold text-orange-600 mt-1">${MockData.assetPackages.filter(p => p.status === 'pending').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">资产包总值</div>
          <div class="text-2xl font-bold text-blue-600 mt-1 num-focus">${Utils.fmtMoney(MockData.assetPackages.reduce((s, p) => s + p.totalValue, 0))}</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200">
          <h3 class="font-semibold text-slate-800">数字资产包列表</h3>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">资产包编号</th>
              <th class="text-left px-4 py-3">客户</th>
              <th class="text-left px-4 py-3">类型</th>
              <th class="text-right px-3 py-3">总货值</th>
              <th class="text-right px-3 py-3">融资金额</th>
              <th class="text-center px-3 py-3">合同</th>
              <th class="text-center px-3 py-3">运输单据</th>
              <th class="text-center px-3 py-3">入库单</th>
              <th class="text-center px-3 py-3">库存</th>
              <th class="text-center px-3 py-3">状态</th>
              <th class="text-center px-3 py-3">核验时间</th>
              <th class="text-center px-3 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.assetPackages.map(p => `
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3 font-mono text-xs">${p.id.toUpperCase()}</td>
                <td class="px-4 py-3">
                  <div class="font-mono text-xs text-slate-500">${p.bizNo}</div>
                  <div class="text-xs">${p.customer}</div>
                </td>
                <td class="px-4 py-3 text-xs">${p.packageType}</td>
                <td class="px-3 py-3 text-right num-focus font-medium">${Utils.fmtMoney(p.totalValue)}</td>
                <td class="px-3 py-3 text-right num-focus text-blue-600">${Utils.fmtMoney(p.loanAmount)}</td>
                <td class="px-3 py-3 text-center num-focus">${p.contractCount}</td>
                <td class="px-3 py-3 text-center num-focus">${p.transportDoc}</td>
                <td class="px-3 py-3 text-center num-focus">${p.inboundDoc}</td>
                <td class="px-3 py-3 text-center num-focus">${p.inventoryDoc}</td>
                <td class="px-3 py-3 text-center">${Components.badge(p.status)}</td>
                <td class="px-3 py-3 text-center text-xs">${p.verifyTime || '—'}</td>
                <td class="px-3 py-3 text-center">
                  ${p.status === 'pending' ? `<button onclick="verifyPackage('${p.id}')" class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded">核验</button>` : `<button onclick="viewPackage('${p.id}')" class="text-blue-600 hover:underline text-xs">查看</button>`}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `
  });

  function verifyPackage(id) { Utils.toast('自动核验中...', 'info'); setTimeout(() => { Utils.toast('✓ 资产包核验通过（勾稽关系已校验）', 'success'); setTimeout(() => location.reload(), 800); }, 1500); }
  function viewPackage(id) { Utils.toast('查看资产包详情', 'info'); }
</script>
</body>
</html>
