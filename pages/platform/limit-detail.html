<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>额度详情 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } </script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    .footer-spacer { height: 80px; }
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.50 监管方【额度详情】- 以客户为主键视图 ============
  // 数据源：MockData.creditLimits（v1.7.44/v1.7.48 已扩展字段）
  // 区别于货主方 limit-detail.html（用 limitList 12 条记录），
  //   监管方/担保方额度管理是"以客户为主键"汇总（3 条 = 3 个客户）。
  // 字段：金融机构/产品/授信类型/产品名称/授信额度/冻结额度/日期/循环/状态/4 个企业/利率/业务数/附件

  const urlId = new URLSearchParams(window.location.search).get('id') || 'cl_001';
  const limit = (MockData.creditLimits || []).find(r => r.id === urlId);

  if (!limit) {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '额度详情',
      currentPath: '/platform/limit-management',
      breadcrumb: [
        { label: '授信管理', path: '/platform/limit-management' },
        { label: '额度管理', path: '/platform/limit-management' },
        { label: '额度详情', path: '/platform/limit-detail' },
      ],
      extra: '',
      content: `
        <div class="bg-white border border-slate-200 rounded-xl p-12 text-center">
          <p class="text-slate-600 mb-2">📭 未找到该额度记录</p>
          <p class="text-xs text-slate-400 mb-4">URL 参数 id 缺失或已失效</p>
          <a href="${Utils.nav('/platform/limit-management')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm">返回额度管理</a>
        </div>
      `,
    });
  } else {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '额度详情',
      currentPath: '/platform/limit-management',
      breadcrumb: [
        { label: '授信管理', path: '/platform/limit-management' },
        { label: '额度管理', path: '/platform/limit-management' },
        { label: '额度详情', path: '/platform/limit-detail' },
      ],
      extra: '',
      content: render(),
    });
  }

  function render() {
    const useRate = limit.totalLimit > 0 ? (limit.usedLimit / limit.totalLimit * 100).toFixed(1) : '0.0';
    return `
      <!-- 顶部 header -->
      <div class="flex items-center justify-between mb-4 bg-white border border-slate-200 rounded-xl px-5 py-3">
        <div class="flex items-center gap-3">
          <a href="${Utils.nav('/platform/limit-management')}" class="flex items-center gap-1 text-slate-600 hover:text-blue-600 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回额度管理
          </a>
          <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-medium">额</div>
          <div>
            <h2 class="text-base font-bold text-slate-800">${limit.bank} · ${limit.product}</h2>
            <p class="text-xs text-slate-500">客户：${limit.customer} · 利率 ${limit.interestRate}</p>
          </div>
          ${limit.state === '启用' ? '<span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 text-xs rounded">启用</span>' : '<span class="px-2 py-0.5 bg-slate-100 text-slate-500 text-xs rounded">停用</span>'}
        </div>
        <div class="text-xs text-slate-500">有效期限：<span class="text-slate-700 font-mono">${limit.startDate || limit.validFrom} ~ ${limit.maturityDate || limit.validTo}</span></div>
      </div>

      <!-- 4 个统计卡 -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-3">
        <div class="bg-violet-50 rounded-xl p-4 border border-violet-200">
          <div class="text-xs text-violet-700">授信总额度</div>
          <div class="text-2xl font-bold text-violet-700 mt-1 num-focus">${Utils.fmtMoney(limit.totalLimit)}</div>
          <div class="text-xs text-violet-600 mt-1">利率 ${limit.interestRate} · 业务数 ${limit.bizCount}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">冻结额度</div>
          <div class="text-2xl font-bold text-slate-800 mt-1 num-focus">${Utils.fmtMoney(limit.frozenAmount || 0)}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">已用敞口</div>
          <div class="text-2xl font-bold text-blue-600 mt-1 num-focus">${Utils.fmtMoney(limit.usedLimit)}</div>
          <div class="text-xs text-slate-500 mt-1">使用率 ${useRate}%</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">可用额度</div>
          <div class="text-2xl font-bold text-emerald-600 mt-1 num-focus">${Utils.fmtMoney(limit.availableLimit)}</div>
        </div>
      </div>

      <!-- 1. 基本信息 -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-3">
        <div class="px-6 py-3 border-b border-slate-200">
          <h3 class="font-bold text-slate-800">基本信息</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <tbody>
              ${renderInfoRow('金融机构', limit.bank, '金融产品', limit.product, '授信类型', limit.creditType)}
              ${renderInfoRow('授信产品名称', limit.productName || '-', '授信额度（元）', Utils.fmtMoney(limit.totalLimit), '冻结额度（元）', Utils.fmtMoney(limit.frozenAmount || 0))}
              ${renderInfoRow('起始日期', limit.startDate || '-', '终止日期', limit.maturityDate || '-', '额度是否循环', limit.circular ? '是' : '否')}
              ${renderInfoRow('额度状态', limit.state, '执行利率', limit.interestRate, '业务数', limit.bizCount + ' 笔')}
              ${renderInfoRow('企业社会统一信用代码', limit.creditCode, '是否在续期', '否', '有效期限', (limit.startDate || limit.validFrom) + ' ~ ' + (limit.maturityDate || limit.validTo))}
            </tbody>
          </table>
        </div>
      </section>

      <!-- 2. 关联企业 -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-3">
        <div class="px-6 py-3 border-b border-slate-200">
          <h3 class="font-bold text-slate-800">关联企业</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <tbody>
              ${renderInfoRow('核心企业', limit.coreCompany, '监管企业', limit.supervisorCompany, '仓储企业', limit.warehouseCompany)}
              <tr class="border-t border-slate-100">
                <td class="px-4 py-3 bg-slate-50 text-sm text-slate-500 font-medium w-32 align-top">担保企业</td>
                <td class="px-4 py-3 text-sm text-slate-800 align-top" colspan="5">${limit.guarantorCompany}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- 3. 合同附件 -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-3">
        <div class="px-6 py-3 border-b border-slate-200 flex items-center justify-between">
          <h3 class="font-bold text-slate-800">合同附件</h3>
          <button onclick="downloadAllAttachments()" class="text-sm text-blue-600 hover:underline">一键下载</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-slate-600 border-b border-slate-200">
                <th class="text-left py-3 px-4 w-40">附件类型</th>
                <th class="text-left py-3 px-4">文件名称</th>
                <th class="text-left py-3 px-4 w-40">操作</th>
              </tr>
            </thead>
            <tbody>
              ${(limit.attachments && limit.attachments.length ? limit.attachments : []).map(a => `
                <tr class="border-t border-slate-100">
                  <td class="py-3 px-4 text-slate-700 align-top">${a.type}</td>
                  <td class="py-3 px-4 align-top">
                    <div class="flex items-center gap-1.5 px-2 py-1 bg-blue-50 rounded text-xs inline-flex">
                      <svg class="w-3 h-3 text-blue-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
                      <a href="javascript:void(0)" onclick="viewFile('${a.name}')" class="text-blue-700 hover:underline">${a.name}</a>
                      ${a.uploadedAt ? `<span class="text-slate-400 text-[11px] whitespace-nowrap">📅 ${a.uploadedAt}</span>` : ''}
                    </div>
                  </td>
                  <td class="py-3 px-4 align-top flex items-center gap-3">
                    <button onclick="viewFile('${a.name}')" class="text-blue-600 hover:underline">查看</button>
                    <button onclick="downloadFile('${a.name}')" class="text-blue-600 hover:underline">下载</button>
                  </td>
                </tr>
              `).join('')}
              ${!(limit.attachments && limit.attachments.length) ? '<tr><td colspan="3" class="py-8 text-center text-slate-400 text-sm">暂无附件</td></tr>' : ''}
            </tbody>
          </table>
        </div>
      </section>

      <!-- 4. 操作（v1.7.50：监管方+担保方 详情页只允许【修改】+【返回】+ 附件下载，无业务变更按钮） -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div class="px-6 py-3 border-b border-slate-200 flex items-center gap-2">
          <span class="w-1 h-4 bg-blue-500 rounded"></span>
          <h3 class="font-bold text-slate-800">操作</h3>
        </div>
        <div class="px-6 py-4 flex items-center gap-6 text-sm">
          <a href="${Utils.nav('/platform/limit-edit')}?id=${limit.id}" class="text-orange-600 hover:underline flex items-center gap-1">
            修改
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </a>
          <a href="${Utils.nav('/platform/limit-management')}" class="text-blue-600 hover:underline flex items-center gap-1">
            返回列表
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </a>
          <span class="text-xs text-slate-400">监管方视图：仅供查看与修改，无业务变更权限</span>
        </div>
      </section>
    `;
  }

  // dt/dd 双列表格行（3 列布局）
  function renderInfoRow(k1, v1, k2, v2, k3, v3) {
    return `
      <tr class="border-t border-slate-100">
        <td class="px-4 py-3 bg-slate-50 text-sm text-slate-500 font-medium w-32 align-top">${k1}</td>
        <td class="px-4 py-3 text-sm text-slate-800 align-top">${v1}</td>
        <td class="px-4 py-3 bg-slate-50 text-sm text-slate-500 font-medium w-32 align-top">${k2}</td>
        <td class="px-4 py-3 text-sm text-slate-800 align-top">${v2}</td>
        <td class="px-4 py-3 bg-slate-50 text-sm text-slate-500 font-medium w-32 align-top">${k3}</td>
        <td class="px-4 py-3 text-sm text-slate-800 align-top">${v3}</td>
      </tr>
    `;
  }

  // ============ 行为 ============
  window.viewFile = (name) => Utils.toast('查看附件：' + name + '（占位）', 'info');
  window.downloadFile = (name) => Utils.toast('下载附件：' + name + '（占位）', 'info');
  window.downloadAllAttachments = () => Utils.toast('一键下载全部附件（占位）', 'info');
</script>
</body>
</html>
