<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>额度管理 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '额度管理',
    currentPath: '/bank/limit-management',
    breadcrumb: [{ label: '贷后管理', path: '/bank/limit-management' }, '额度管理'],
    extra: `<button onclick="Utils.toast('打开授信录入','info')" class="px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-md text-sm font-medium">+ 新增授信客户</button>`,
    content: `
      <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-violet-50 rounded-xl p-4 border border-violet-200">
          <div class="text-xs text-violet-700">授信客户数</div>
          <div class="text-2xl font-bold text-violet-700 mt-1">${MockData.creditLimits.length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">授信总额度</div>
          <div class="text-2xl font-bold text-slate-800 mt-1 num-focus">${(MockData.creditLimits.reduce((s, c) => s + c.totalLimit, 0) / 10000).toFixed(0)}万</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">已用敞口</div>
          <div class="text-2xl font-bold text-blue-600 mt-1 num-focus">${(MockData.creditLimits.reduce((s, c) => s + c.usedLimit, 0) / 10000).toFixed(0)}万</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">可用额度</div>
          <div class="text-2xl font-bold text-emerald-600 mt-1 num-focus">${(MockData.creditLimits.reduce((s, c) => s + c.availableLimit, 0) / 10000).toFixed(0)}万</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200">
          <h3 class="font-semibold text-slate-800">授信额度清单</h3>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">客户</th>
              <th class="text-left px-4 py-3">统一社会信用代码</th>
              <th class="text-right px-3 py-3">总额度</th>
              <th class="text-right px-3 py-3">已用</th>
              <th class="text-right px-3 py-3">可用</th>
              <th class="text-center px-3 py-3">使用率</th>
              <th class="text-center px-3 py-3">利率</th>
              <th class="text-center px-3 py-3">有效期</th>
              <th class="text-center px-3 py-3">业务数</th>
              <th class="text-center px-3 py-3">状态</th>
              <th class="text-center px-3 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.creditLimits.map(c => {
              const usedRate = (c.usedLimit / c.totalLimit * 100).toFixed(1);
              return `
                <tr class="border-t border-slate-100 hover:bg-slate-50">
                  <td class="px-4 py-3 font-medium">${c.customer}</td>
                  <td class="px-4 py-3 font-mono text-xs">${c.creditCode}</td>
                  <td class="px-3 py-3 text-right num-focus font-medium">${Utils.fmtMoney(c.totalLimit)}</td>
                  <td class="px-3 py-3 text-right num-focus text-blue-600">${Utils.fmtMoney(c.usedLimit)}</td>
                  <td class="px-3 py-3 text-right num-focus text-emerald-600">${Utils.fmtMoney(c.availableLimit)}</td>
                  <td class="px-3 py-3 text-center">
                    <div class="flex items-center gap-1 justify-center">
                      <div class="w-16 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-gradient-to-r ${usedRate > 80 ? 'from-rose-500 to-rose-600' : 'from-blue-500 to-blue-600'}" style="width: ${usedRate}%"></div>
                      </div>
                      <span class="text-xs ${usedRate > 80 ? 'text-rose-600' : 'text-slate-500'}">${usedRate}%</span>
                    </div>
                  </td>
                  <td class="px-3 py-3 text-center num-focus">${c.interestRate}</td>
                  <td class="px-3 py-3 text-center text-xs">${c.validFrom}<br>~ ${c.validTo}</td>
                  <td class="px-3 py-3 text-center">${c.bizCount}</td>
                  <td class="px-3 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs bg-emerald-100 text-emerald-700">生效中</span></td>
                  <td class="px-3 py-3 text-center">
                    <button onclick="Utils.toast('查看额度详情','info')" class="text-blue-600 hover:underline text-xs mr-2">详情</button>
                    <button onclick="Utils.toast('调整额度','info')" class="text-orange-600 hover:underline text-xs">调整</button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `
  });
</script>
</body>
</html>
