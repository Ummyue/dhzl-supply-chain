<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>到期预警 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '到期预警',
    currentPath: '/bank/due-alerts',
    breadcrumb: [{ label: '贷后管理', path: '/bank/due-alerts' }, '到期预警'],
    content: `
      <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="bg-rose-50 rounded-xl p-4 border border-rose-200">
          <div class="text-xs text-rose-700">紧急（7天内）</div>
          <div class="text-3xl font-bold text-rose-700 mt-1">${MockData.dueAlerts.filter(a => a.status === 'urgent').length}</div>
          <div class="text-xs text-rose-600 mt-1">需立即催收</div>
        </div>
        <div class="bg-amber-50 rounded-xl p-4 border border-amber-200">
          <div class="text-xs text-amber-700">关注（30天内）</div>
          <div class="text-3xl font-bold text-amber-700 mt-1">${MockData.dueAlerts.filter(a => a.status === 'warning').length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">正常</div>
          <div class="text-3xl font-bold text-slate-800 mt-1">${MockData.dueAlerts.filter(a => a.status === 'normal').length}</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200">
          <h3 class="font-semibold text-slate-800">到期业务预警</h3>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">业务编号</th>
              <th class="text-left px-4 py-3">客户</th>
              <th class="text-right px-3 py-3">放款金额</th>
              <th class="text-center px-3 py-3">到期日</th>
              <th class="text-center px-3 py-3">剩余天数</th>
              <th class="text-center px-3 py-3">预警等级</th>
              <th class="text-center px-3 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.dueAlerts.map(a => `
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3 font-mono text-xs">${a.bizNo}</td>
                <td class="px-4 py-3">${a.customer}</td>
                <td class="px-3 py-3 text-right num-focus font-medium">${Utils.fmtMoney(a.loanAmount)}</td>
                <td class="px-3 py-3 text-center text-xs">${a.dueDate}</td>
                <td class="px-3 py-3 text-center font-bold ${a.daysLeft <= 7 ? 'text-rose-600' : a.daysLeft <= 30 ? 'text-amber-600' : 'text-slate-500'}">${a.daysLeft} 天</td>
                <td class="px-3 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs ${a.status === 'urgent' ? 'bg-rose-100 text-rose-700' : a.status === 'warning' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-700'}">${a.status === 'urgent' ? '🔴 紧急' : a.status === 'warning' ? '🟡 关注' : '正常'}</span></td>
                <td class="px-3 py-3 text-center">
                  <button onclick="urgeRepay('${a.bizNo}')" class="px-3 py-1 ${a.daysLeft <= 7 ? 'bg-rose-600 hover:bg-rose-700' : 'bg-blue-600 hover:bg-blue-700'} text-white text-xs rounded">${a.daysLeft <= 7 ? '立即催收' : '提醒'}</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `
  });

  function urgeRepay(bizNo) { Utils.toast('已通过短信+电话+站内信发送催收通知', 'success'); }
</script>
</body>
</html>
