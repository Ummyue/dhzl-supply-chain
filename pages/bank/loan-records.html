<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>放还款记录 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '放还款记录',
    currentPath: '/bank/loan-records',
    breadcrumb: [{ label: '贷后管理', path: '/bank/loan-records' }, '放还款记录'],
    content: `
      <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-violet-50 rounded-xl p-4 border border-violet-200">
          <div class="text-xs text-violet-700">累计放款额</div>
          <div class="text-2xl font-bold text-violet-700 mt-1 num-focus">¥8.7 亿</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">累计回收本金</div>
          <div class="text-2xl font-bold text-emerald-600 mt-1 num-focus">¥3.5 亿</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">累计利息收入</div>
          <div class="text-2xl font-bold text-slate-800 mt-1 num-focus">¥1,860 万</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">不良率</div>
          <div class="text-2xl font-bold text-emerald-600 mt-1 num-focus">0.32%</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200">
          <h3 class="font-semibold text-slate-800">放还款明细</h3>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">业务编号/借据号</th>
              <th class="text-left px-4 py-3">客户</th>
              <th class="text-left px-4 py-3">类型</th>
              <th class="text-right px-3 py-3">金额</th>
              <th class="text-right px-3 py-3">累计还款</th>
              <th class="text-right px-3 py-3">剩余本金</th>
              <th class="text-center px-3 py-3">日期</th>
              <th class="text-center px-3 py-3">状态</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.repaymentRecords.map(r => `
              <tr class="border-t border-slate-100 hover:bg-slate-50">
                <td class="px-4 py-3">
                  <div class="font-mono text-xs">${r.bizNo}</div>
                  <div class="font-mono text-xs text-slate-400">${r.loanNo}</div>
                </td>
                <td class="px-4 py-3">${r.customer}</td>
                <td class="px-4 py-3 text-xs">
                  <span class="px-2 py-0.5 rounded ${r.repayType.includes('部分') ? 'bg-blue-100 text-blue-700' : 'bg-violet-100 text-violet-700'}">${r.repayType}</span>
                </td>
                <td class="px-3 py-3 text-right num-focus font-medium">${Utils.fmtMoney(r.repayAmount)}</td>
                <td class="px-3 py-3 text-right num-focus text-emerald-600">${Utils.fmtMoney(r.repayAmount)}</td>
                <td class="px-3 py-3 text-right num-focus ${r.remainingDebt > 0 ? 'text-orange-600' : 'text-slate-400'}">${Utils.fmtMoney(r.remainingDebt)}</td>
                <td class="px-3 py-3 text-center text-xs">${r.repayDate}</td>
                <td class="px-3 py-3 text-center">${Components.badge(r.status)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `
  });
</script>
</body>
</html>
