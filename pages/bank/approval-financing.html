<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>融资审核 - 资金方 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script src="/shared/js/financingList.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '融资审核',
    currentPath: '/bank/approval-financing',
    breadcrumb: [{ label: '工作台', path: '/dashboard' }, { label: '融资审核', path: '/bank/approval-financing' }, '列表'],
    extra: `<button onclick="window.__FinancingList.exportCSV()" class="px-3 py-2 border border-slate-300 hover:border-emerald-500 hover:text-emerald-600 text-slate-700 rounded-md text-sm font-medium flex items-center gap-1 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        导出
      </button>`,
    content: `
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-xs text-blue-800">
        <span class="font-medium">v1.7 流程：</span>本页面是 <strong>3 级审核的第 3 步</strong>（监管方✓ → 担保方✓ → <strong>您（资金方）</strong>）。审核通过后，货主方需盖章③，然后进入「待放款」环节（线下打款 + 凭证上传）。
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div class="amount-gradient rounded-xl p-4 shadow-md">
          <div class="text-blue-100 text-xs">在贷余额</div>
          <div class="text-2xl font-bold num-focus mt-1">¥3.6亿</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-slate-500 text-xs">本月放款额</div>
          <div class="text-2xl font-bold text-emerald-600 num-focus mt-1">¥8,200万</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-slate-500 text-xs">不良率</div>
          <div class="text-2xl font-bold text-blue-600 num-focus mt-1">0.13%</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-slate-500 text-xs">本月待审</div>
          <div class="text-2xl font-bold text-violet-600 num-focus mt-1">${MockData.financingList.filter(f => f.status === 'pending_funding').length} 笔</div>
        </div>
      </div>

      ${FinancingList.render({
        actionRenderer: (rec) => {
          // 资金方专属操作按钮（v1.7.8 占位，详细审批内容由用户细化）
          const showApprove = rec.status === 'pending_funding';
          const showDetail = true;
          return `
            ${showDetail ? `<button onclick="alert('查看 ${rec.bizNo} 详情（待完善审批内容）')" class="text-blue-600 hover:underline text-xs font-medium">详情</button>` : ''}
            ${showApprove ? `<button onclick="alert('即将对 ${rec.bizNo} 进行资方审核（待完善审批内容）')" class="text-violet-600 hover:underline text-xs font-medium">资方审核</button>` : ''}
          `;
        },
        statusLabelMap: {
          'pending_funding': { text: '⏳ 资方审核中（您）', color: 'text-violet-600' },
        },
      })}
    `
  });
</script>
</body>
</html>
