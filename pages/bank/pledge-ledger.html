<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质押货物台账 - 资金方</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  const ledger = MockData.pledgeLedger;
  const totalDebt = ledger.reduce((s, l) => s + l.remainingDebt, 0);
  const warningCount = ledger.filter(l => Math.abs(l.priceChangeRate) > 5).length;

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '质押货物台账（资金方视图）',
    currentPath: '/bank/pledge-ledger',
    breadcrumb: [{ label: '贷后管理', path: '/bank/pledge-ledger' }, '质押货物台账'],
    content: `
      <div class="bg-violet-50 border border-violet-200 rounded-lg p-4 mb-6 text-sm text-violet-800">
        资金方台账：实时跟踪在贷业务对应的质押货物状况、风险预警、还款进度，是贷后管理的核心依据。
      </div>

      <div class="grid grid-cols-4 gap-3 mb-6">
        <div class="bg-violet-50 rounded-xl p-4 border border-violet-200">
          <div class="text-xs text-violet-700">在贷余额</div>
          <div class="text-2xl font-bold text-violet-700 mt-1 num-focus">${Utils.fmtMoney(totalDebt)}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">在贷笔数</div>
          <div class="text-2xl font-bold text-slate-800 mt-1">${ledger.length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">预警业务</div>
          <div class="text-2xl font-bold text-orange-600 mt-1">${warningCount}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">质押率（平均）</div>
          <div class="text-2xl font-bold text-blue-600 mt-1">80%</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
          <h3 class="font-semibold text-slate-800">在贷质押货物台账（${ledger.length} 笔）</h3>
          <div class="text-xs text-slate-500">按借据号对应</div>
        </div>
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">业务编号/借据号</th>
              <th class="text-left px-4 py-3">客户/货品</th>
              <th class="text-right px-3 py-3">放款金额</th>
              <th class="text-right px-3 py-3">剩余债权</th>
              <th class="text-right px-3 py-3">利率</th>
              <th class="text-center px-3 py-3">到期日</th>
              <th class="text-right px-3 py-3">最新价</th>
              <th class="text-right px-3 py-3">变化率</th>
              <th class="text-center px-3 py-3">五级分类</th>
              <th class="text-center px-3 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${ledger.map(l => {
              const fiveLevel = Math.abs(l.priceChangeRate) > 10 ? '次级' : Math.abs(l.priceChangeRate) > 5 ? '关注' : l.isOverdue ? '可疑' : '正常';
              return `
                <tr class="border-t border-slate-100 hover:bg-slate-50">
                  <td class="px-4 py-3">
                    <div class="font-mono text-xs">${l.bizNo}</div>
                    <div class="font-mono text-xs text-slate-400">LN30...</div>
                  </td>
                  <td class="px-4 py-3">
                    <div class="font-medium text-xs">${l.customer}</div>
                    <div class="text-xs text-slate-500">${l.product}</div>
                  </td>
                  <td class="px-3 py-3 text-right num-focus">${Utils.fmtMoney(l.loanAmount)}</td>
                  <td class="px-3 py-3 text-right num-focus ${l.remainingDebt > 0 ? 'text-orange-600 font-medium' : 'text-emerald-600'}">${Utils.fmtMoney(l.remainingDebt)}</td>
                  <td class="px-3 py-3 text-right">4.35%</td>
                  <td class="px-3 py-3 text-center text-xs">${Utils.fmtDate(l.dueDate)}</td>
                  <td class="px-3 py-3 text-right num-focus">¥${l.currentPrice.toFixed(2)}</td>
                  <td class="px-3 py-3 text-right num-focus font-bold ${Math.abs(l.priceChangeRate) > 10 ? 'text-rose-600' : Math.abs(l.priceChangeRate) > 5 ? 'text-orange-600' : 'text-slate-600'}">${l.priceChangeRate > 0 ? '+' : ''}${l.priceChangeRate.toFixed(2)}%</td>
                  <td class="px-3 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs ${fiveLevel === '正常' ? 'bg-green-100 text-green-700' : fiveLevel === '关注' ? 'bg-yellow-100 text-yellow-700' : fiveLevel === '次级' ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'}">${fiveLevel}</span></td>
                  <td class="px-3 py-3 text-center"><button onclick="viewDetail('${l.bizNo}')" class="text-blue-600 hover:underline text-xs">详情</button></td>
                </tr>
              `;
            }).join('')}
          </tbody>
          <tfoot>
            <tr class="bg-violet-50 font-bold">
              <td colspan="2" class="px-4 py-3 text-right">合计：</td>
              <td class="px-3 py-3 text-right num-focus">${Utils.fmtMoney(ledger.reduce((s, l) => s + l.loanAmount, 0))}</td>
              <td class="px-3 py-3 text-right num-focus text-violet-700">${Utils.fmtMoney(totalDebt)}</td>
              <td colspan="6"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    `
  });

  function viewDetail(bizNo) { Utils.toast('查看在贷详情：' + bizNo, 'info'); }
</script>
</body>
</html>
