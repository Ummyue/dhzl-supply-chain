<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>还款回单确认 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '还款回单确认',
    currentPath: '/bank/confirm-repayment',
    breadcrumb: [{ label: '授信与放款', path: '/bank/approval-loan' }, '还款回单确认'],
    content: `
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6 text-sm text-amber-800">
        <div class="font-medium mb-1">💡 v1.7 阴需核心：还款回单确认</div>
        <div>货主方在 <code class="bg-amber-100 px-1 rounded">/customer/outbound</code> 完成<strong>阶段A：还款登记</strong>（线下还款+上传回单）后，您（资金方）需在此页面<strong>确认实际收款</strong>。</div>
        <div class="text-xs mt-2">⚠ 系统<strong>无实际扣款能力</strong>，仅做流程化登记。请核对实际银行收款后再确认。</div>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">待确认回单</div>
          <div class="text-3xl font-bold text-amber-600 mt-1">${MockData.repaymentRecords.filter(r => !r.fundingConfirmed).length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">本月已确认</div>
          <div class="text-3xl font-bold text-emerald-600 mt-1">${MockData.repaymentRecords.filter(r => r.fundingConfirmed).length}</div>
        </div>
        <div class="bg-white rounded-xl p-4 border border-slate-200">
          <div class="text-xs text-slate-500">待确认总金额</div>
          <div class="text-2xl font-bold text-orange-600 mt-1 num-focus">${Utils.fmtMoney(MockData.repaymentRecords.filter(r => !r.fundingConfirmed).reduce((s, r) => s + r.offLineAmount, 0))}</div>
        </div>
      </div>

      <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
        <span class="w-1 h-4 bg-amber-500 rounded"></span>
        待确认回单（${MockData.repaymentRecords.filter(r => !r.fundingConfirmed).length}）
      </h3>
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden mb-6">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">登记编号</th>
              <th class="text-left px-4 py-3">业务编号</th>
              <th class="text-left px-4 py-3">货主/货品</th>
              <th class="text-right px-4 py-3">系统试算</th>
              <th class="text-right px-4 py-3">线下实际</th>
              <th class="text-left px-4 py-3">还款方式</th>
              <th class="text-left px-4 py-3">凭证</th>
              <th class="text-center px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.repaymentRecords.filter(r => !r.fundingConfirmed).map(r => `
              <tr class="border-t border-slate-100">
                <td class="px-4 py-3 font-mono text-xs">${r.id}</td>
                <td class="px-4 py-3 font-mono text-xs text-blue-600">${r.bizNo}</td>
                <td class="px-4 py-3">
                  <div class="font-medium text-xs">${r.customer}</div>
                  <div class="text-xs text-slate-500">${r.product}</div>
                </td>
                <td class="px-4 py-3 text-right num-focus text-xs text-slate-500">${Utils.fmtMoney(r.systemEstimate)}</td>
                <td class="px-4 py-3 text-right num-focus font-bold text-blue-600">${Utils.fmtMoney(r.offLineAmount)}</td>
                <td class="px-4 py-3 text-xs">${r.offLineMethod}</td>
                <td class="px-4 py-3 text-xs">
                  <div>${r.voucherFiles.slice(0, 2).map(f => `<div class="text-blue-600 hover:underline cursor-pointer">📎 ${f}</div>`).join('')}</div>
                  ${r.voucherCount > 2 ? `<div class="text-slate-400 text-xs">+${r.voucherCount - 2} 个</div>` : ''}
                </td>
                <td class="px-4 py-3 text-center">
                  <button onclick="confirmRepay('${r.id}')" class="px-3 py-1 bg-emerald-600 hover:bg-emerald-700 text-white text-xs rounded mr-1">✓ 确认收款</button>
                  <button onclick="rejectRepay('${r.id}')" class="px-3 py-1 bg-rose-600 hover:bg-rose-700 text-white text-xs rounded">✗ 驳回</button>
                </td>
              </tr>
            `).join('')}
            ${MockData.repaymentRecords.filter(r => !r.fundingConfirmed).length === 0 ? `
              <tr><td colspan="8" class="px-4 py-12 text-center text-slate-400">📭 暂无待确认回单</td></tr>
            ` : ''}
          </tbody>
        </table>
      </div>

      <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
        <span class="w-1 h-4 bg-emerald-500 rounded"></span>
        已确认记录（${MockData.repaymentRecords.filter(r => r.fundingConfirmed).length}）
      </h3>
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">登记编号</th>
              <th class="text-left px-4 py-3">业务编号</th>
              <th class="text-left px-4 py-3">货主/货品</th>
              <th class="text-right px-4 py-3">实际金额</th>
              <th class="text-left px-4 py-3">登记时间</th>
              <th class="text-left px-4 py-3">确认人/时间</th>
              <th class="text-center px-4 py-3">状态</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.repaymentRecords.filter(r => r.fundingConfirmed).map(r => `
              <tr class="border-t border-slate-100">
                <td class="px-4 py-3 font-mono text-xs">${r.id}</td>
                <td class="px-4 py-3 font-mono text-xs text-blue-600">${r.bizNo}</td>
                <td class="px-4 py-3">
                  <div class="font-medium text-xs">${r.customer}</div>
                  <div class="text-xs text-slate-500">${r.product}</div>
                </td>
                <td class="px-4 py-3 text-right num-focus font-bold text-emerald-600">${Utils.fmtMoney(r.offLineAmount)}</td>
                <td class="px-4 py-3 text-xs text-slate-500">${r.registeredAt} (${r.registeredBy})</td>
                <td class="px-4 py-3 text-xs text-slate-500">${r.confirmedAt || '-'} (${r.confirmedBy || '-'})</td>
                <td class="px-4 py-3 text-center">${Components.badge('confirmed')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `
  });

  function confirmRepay(id) {
    const r = MockData.repaymentRecords.find(x => x.id === id);
    if (!r) return;
    Utils.toast(`✓ 已确认收款 ${Utils.fmtMoney(r.offLineAmount)}，可通知货主发起解押申请`, 'success');
  }

  function rejectRepay(id) {
    const r = MockData.repaymentRecords.find(x => x.id === id);
    if (!r) return;
    const modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.innerHTML = `
      <div class="bg-white rounded-xl w-[500px] shadow-2xl" onclick="event.stopPropagation()">
        <div class="px-6 py-4 border-b border-slate-200">
          <h3 class="font-bold text-slate-800 text-lg">🔴 驳回还款回单</h3>
          <p class="text-xs text-slate-500 mt-1">${r.id} · ${r.customer} · ${Utils.fmtMoney(r.offLineAmount)}</p>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="block text-xs text-slate-600 mb-2">驳回原因 <span class="text-red-500">*</span></label>
            <div class="space-y-2">
              <label class="flex items-center gap-2 p-2 border border-slate-200 rounded cursor-pointer hover:bg-slate-50">
                <input type="radio" name="rejectReason" value="未实际收款">
                <span class="text-sm">未实际收到这笔款项（请重新核对银行流水）</span>
              </label>
              <label class="flex items-center gap-2 p-2 border border-slate-200 rounded cursor-pointer hover:bg-slate-50">
                <input type="radio" name="rejectReason" value="金额不符">
                <span class="text-sm">实际金额 ${Utils.fmtMoney(r.offLineAmount)} 与试算 ${Utils.fmtMoney(r.systemEstimate)} 不符</span>
              </label>
              <label class="flex items-center gap-2 p-2 border border-slate-200 rounded cursor-pointer hover:bg-slate-50">
                <input type="radio" name="rejectReason" value="凭证有疑">
                <span class="text-sm">回单凭证有疑（图片模糊/非银行回单/印章不清）</span>
              </label>
            </div>
            <textarea rows="2" placeholder="补充说明..." class="w-full mt-3 px-3 py-2 border border-slate-300 rounded-md text-sm"></textarea>
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button onclick="this.closest('.modal-backdrop').remove()" class="px-4 py-2 border border-slate-300 rounded-md text-sm">取消</button>
          <button onclick="Utils.toast('已驳回，货主方将收到通知','warning'); this.closest('.modal-backdrop').remove()" class="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-md text-sm font-medium">确认驳回</button>
        </div>
      </div>
    `;
    modal.onclick = () => modal.remove();
    document.body.appendChild(modal);
  }
</script>
</body>
</html>
