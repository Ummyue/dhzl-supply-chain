<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入库申请 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.12 入库申请：9 个状态机 tab + 11 列表格 ============
  // 状态机映射：tab ID → 实际 status 值（兼容现有记录）
  const INBOUND_TABS = [
    { id: 'all', label: '全部' },
    { id: 'pending_submit', label: '待提交', statusMatch: ['draft'] },
    { id: 'pending_owner_seal', label: '待货主盖章', statusMatch: ['pending_owner_seal', 'pending_owner_seal_2', 'pending_owner_seal_3'] },
    { id: 'pending_guarantor_confirm', label: '待担保确认', statusMatch: ['pending_guarantor', 'pending_guarantor_seal'] },
    { id: 'pending_supervisor_confirm', label: '待监管确认', statusMatch: ['reviewing', 'pending_supervisor'] },
    { id: 'pending_inbound', label: '待入库', statusMatch: ['inbound', 'pending_inbound'] },
    { id: 'inbound', label: '已入库', statusMatch: ['inbound_completed'] },
    { id: 'voided', label: '作废', statusMatch: ['voided', 'cancelled'] },
    { id: 'rejected', label: '驳回', statusMatch: ['rejected'] },
  ];

  let currentInboundTab = 'all';

  // ============ 筛选条件 ============
  const inboundFilters = {
    applyNo: '',          // 入库申请编号
    pledgor: '',          // 出质方
    pledgee: '',          // 质权方
    bank: '',             // 金融机构
    productName: '',      // 金融产品
    product: '',          // 货物名称
    dateStart: '',        // 入库时间起
    dateEnd: '',          // 入库时间止
    supervisor: '',       // 监管方
    location: '',        // 货物所在地
    // v1.7.32 移除 state 字段（State1 状态筛选与查看全部状态按钮一起去掉）
  };

  // ============ 工具 ============
  function _unique(field) {
    return [...new Set((MockData.inboundList || []).map(i => i[field]).filter(Boolean))];
  }

  // 推导字段（匹配截图 11 列）
  function deriveFields(r) {
    const stockPieces = (r.products && r.products[0] && r.products[0].pieces) || 0;
    const stockWeight = (r.products && r.products[0] && r.products[0].weight) || 0;
    const productName = (r.products && r.products[0] && r.products[0].name) || '';
    return {
      bizNo: r.bizNo,
      inboundDate: r.inboundDate || r.applyDate,
      productName,
      planPieces: stockPieces,
      planWeight: stockWeight,
      pledgor: r.applicant || '河南军牧原国际贸易有限公司',
      pledgee: '中原再担保股份有限公司',
      productType: '中原e贷',
      bank: r.bank || '中原银行股份有限公司',
      supervisor: '大河智链供应链管理有限公司',
      location: '河南省郑州市',
    };
  }

  // ============ 筛选逻辑 ============
  function applyFilters() {
    const f = inboundFilters;
    const fuzzy = (val, kw) => !kw || (val || '').toLowerCase().includes(kw.toLowerCase().trim());
    return (MockData.inboundList || []).filter(r => {
      const d = deriveFields(r);
      if (!fuzzy(r.bizNo, f.applyNo)) return false;
      if (f.pledgor && r.applicant !== f.pledgor) return false;
      if (f.pledgee && d.pledgee !== f.pledgee) return false;
      if (f.bank && d.bank !== f.bank) return false;
      if (f.productName && d.productType !== f.productName) return false;
      if (f.product && d.productName !== f.product) return false;
      if (f.supervisor && d.supervisor !== f.supervisor) return false;
      if (f.location && d.location !== f.location) return false;
      if (f.dateStart && r.inboundDate < f.dateStart) return false;
      if (f.state && r.status !== f.state) return false;
      return true;
    });
  }

  // tab 过滤（在 filters 后再叠一层）
  function applyTab(list, tabId) {
    if (tabId === 'all') return list;
    const tab = INBOUND_TABS.find(t => t.id === tabId);
    if (!tab || !tab.statusMatch) return list;
    return list.filter(r => tab.statusMatch.includes(r.status));
  }

  // ============ 页面渲染 ============
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '入库申请',
    currentPath: '/customer/inbound',
    breadcrumb: [
      { label: '智慧仓储', path: '/customer/monitoring' },
      { label: '入库管理', path: '/customer/inbound' },
      '入库申请',
    ],
    extra: `<a href="${Utils.nav('/customer/inbound-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-sm font-medium flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      新增入库申请
    </a>`,
    content: renderPage(),
  });

  function renderPage() {
    const filtered = applyFilters();
    const tabFiltered = applyTab(filtered, currentInboundTab);
    // v1.7.82 动态 options
    const pledgorOptions = [{ value: '', label: '请选择' }, ..._unique('applicant').map(v => ({ value: v, label: v }))];
    const productOptions = [{ value: '', label: '请选择' }, ...(MockData.products_market || []).map(p => ({ value: p.name, label: p.name }))];
    return `
      <!-- v1.7.82 筛选区:3×3 网格 + 顶部 tag + 实时刷新 + 抽屉式模糊搜索 + 数据导出 -->
      ${Components.filterBar({
        filters: inboundFilters,
        fields: [
          { label: '入库申请编号', key: 'applyNo', type: 'text', placeholder: '请输入入库申请编号', suggest: { primaryKey: 'bizNo', secondaryKey: 'applicant' } },
          { label: '出质方', key: 'pledgor', type: 'select', placeholder: '出质方', options: pledgorOptions },
          { label: '质权方', key: 'pledgee', type: 'select', placeholder: '质权方', options: [
            { value: '', label: '请选择' },
            { value: '中原再担保股份有限公司', label: '中原再担保股份有限公司' },
          ] },
          { label: '金融机构', key: 'bank', type: 'select', placeholder: '金融机构', options: [
            { value: '', label: '请选择' },
            { value: '中原银行股份有限公司', label: '中原银行股份有限公司' },
            { value: '工商银行郑州分行', label: '工商银行郑州分行' },
          ] },
          { label: '金融产品', key: 'productName', type: 'select', placeholder: '金融产品', options: [
            { value: '', label: '请选择' },
            { value: '中原e贷', label: '中原e贷' },
          ] },
          { label: '货物名称', key: 'product', type: 'select', placeholder: '货物名称', options: productOptions },
          { label: '入库时间', key: 'date', type: 'dateRange', placeholder: '入库时间', fromKey: 'dateStart', toKey: 'dateEnd' },
          { label: '监管方', key: 'supervisor', type: 'select', placeholder: '监管方', options: [
            { value: '', label: '请选择' },
            { value: '大河智链供应链管理有限公司', label: '大河智链供应链管理有限公司' },
          ] },
          { label: '货物所在地', key: 'location', type: 'select', placeholder: '货物所在地', options: [
            { value: '', label: '请选择' },
            { value: '河南省郑州市', label: '河南省郑州市' },
            { value: '天津市', label: '天津市' },
          ] },
        ],
        dataSource: MockData.inboundList,
        onChange: 'refresh',
        hasExport: true,
        exportCSV: 'exportInboundCSV',
      })}
      <!-- 9 个状态机 TAB 条 -->
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="border-b border-slate-200 px-4 bg-slate-50/50 overflow-x-auto">
          <div class="flex items-center gap-1">
            ${renderInboundTabs()}
          </div>
        </div>

        <!-- 11 列表格 -->
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[1600px]">
            <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
              <tr>
                <th class="text-left px-3 py-3 whitespace-nowrap">入库申请编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">最新入库时间</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">货物名称</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">计划入库数量</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">计划入库重量</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">出质方</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">质权方</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">金融产品</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">金融机构</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">监管方</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">货物所在地</th>
              </tr>
            </thead>
            <tbody>${renderRows(tabFiltered)}</tbody>
          </table>
        </div>
        <!-- 简单分页（400 条） -->
        ${renderPagination(tabFiltered.length)}
      </div>
    `;
  }

  function renderInboundTabs() {
    const filtered = applyFilters();
    return INBOUND_TABS.map(t => {
      const count = t.id === 'all'
        ? filtered.length
        : filtered.filter(r => (t.statusMatch || []).includes(r.status)).length;
      const active = t.id === currentInboundTab;
      return `
        <button onclick="switchInboundTab('${t.id}')" class="px-3 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition flex items-center gap-1.5 ${
          active
            ? 'border-blue-600 text-blue-700'
            : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-200'
        }">
          ${t.label}${count > 0 ? `<span class="px-1.5 py-0.5 text-xs rounded ${active ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-500'}">${count}</span>` : ''}
        </button>
      `;
    }).join('');
  }

  function renderRows(items) {
    if (!items.length) {
      return `<tr><td colspan="11" class="py-12 text-center text-slate-400 text-sm">📭 当前筛选/状态下无入库申请</td></tr>`;
    }
    return items.map(r => {
      const d = deriveFields(r);
      return `
        <tr class="border-t border-slate-100 hover:bg-blue-50/30 cursor-pointer" onclick="viewInbound('${r.id}')">
          <td class="px-3 py-2.5 font-mono text-xs text-blue-700 whitespace-nowrap">${d.bizNo}</td>
          <td class="px-3 py-2.5 text-slate-700 whitespace-nowrap text-xs">${d.inboundDate || '-'}</td>
          <td class="px-3 py-2.5 text-slate-700 whitespace-nowrap text-xs">${d.productName || '-'}</td>
          <td class="px-3 py-2.5 text-right num-focus whitespace-nowrap">${Utils.fmtNum(d.planPieces)}</td>
          <td class="px-3 py-2.5 text-right num-focus whitespace-nowrap">${Utils.fmtMoney(d.planWeight, false)}</td>
          <td class="px-3 py-2.5 text-slate-700 text-xs whitespace-nowrap">${d.pledgor}</td>
          <td class="px-3 py-2.5 text-slate-700 text-xs whitespace-nowrap">${d.pledgee}</td>
          <td class="px-3 py-2.5">
            <span class="px-2 py-0.5 text-xs bg-amber-100 text-amber-700 rounded font-medium">${d.productType}</span>
          </td>
          <td class="px-3 py-2.5 text-slate-700 text-xs whitespace-nowrap">${d.bank}</td>
          <td class="px-3 py-2.5 text-slate-700 text-xs whitespace-nowrap">${d.supervisor}</td>
          <td class="px-3 py-2.5 text-slate-700 text-xs whitespace-nowrap">${d.location}</td>
        </tr>
      `;
    }).join('');
  }

  function renderPagination(total) {
    return Components.pagination({ total: total || 0, page: 1, pageSize: 10, onChange: 'window.__noop', onPageSize: 'window.__noop', onJump: 'window.__noop' });
  }

  // ============ Refresh ============
  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '入库申请',
      currentPath: '/customer/inbound',
      breadcrumb: [
        { label: '智慧仓储', path: '/customer/monitoring' },
        { label: '入库管理', path: '/customer/inbound' },
        '入库申请',
      ],
      extra: `<a href="${Utils.nav('/customer/inbound-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-sm font-medium flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        新增入库申请
      </a>`,
      content: renderPage(),
    });
  }

  // ============ 事件 ============
  window.switchInboundTab = function(id) {
    currentInboundTab = id;
    refresh();
  };
  // v1.7.82 通用组件: updateFilter 只更新状态,刷新由通用组件的 onChange 触发
  window.updateFilter = function(key, val) {
    inboundFilters[key] = val;
  };
  window.removeTag = function(key, isDate) {
    if (isDate) {
      inboundFilters.dateStart = '';
      inboundFilters.dateEnd = '';
    } else {
      inboundFilters[key] = '';
      const i = document.getElementById('filterInput_' + key); if (i) i.value = '';
    }
    refresh();
  };
  window.resetAllFilters = function() {
    Object.keys(inboundFilters).forEach(k => inboundFilters[k] = '');
    document.querySelectorAll('[id^="filterInput_"]').forEach(i => i.value = '');
    refresh();
  };
  // 保留旧 resetFilters 别名,避免外部调用残留
  window.resetFilters = window.resetAllFilters;
  // v1.7.32 移除 viewAllInboundStates 函数（State1 状态筛选与查看全部状态按钮一起去掉）
  window.exportInboundCSV = function() {
    const items = applyTab(applyFilters(), currentInboundTab);
    if (!items.length) return Utils.toast('当前无数据可导出', 'warning');
    const headers = ['入库申请编号','最新入库时间','货物名称','计划入库数量','计划入库重量','出质方','质权方','金融产品','金融机构','监管方','货物所在地','状态'];
    const stateLabel = { draft:'草稿', pending_owner_seal:'待货主方盖章', pending_owner_seal_2:'待货主方二次盖章', pending_guarantor:'待担保方审核', pending_platform:'待监管方审核', inbound:'已入库', inbound_completed:'已入库', reviewing:'审核中', rejected:'驳回', voided:'作废' };
    const rows = items.map(r => {
      const d = deriveFields(r);
      return [d.bizNo, d.inboundDate, d.productName, d.planPieces, d.planWeight, d.pledgor, d.pledgee, d.productType, d.bank, d.supervisor, d.location, stateLabel[r.status] || r.status];
    });
    const csv = [headers, ...rows].map(row => row.map(c => {
      const v = String(c == null ? '' : c);
      return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `入库申请_${currentInboundTab}_${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    Utils.toast(`已导出 ${items.length} 条记录`, 'success');
  };

  function viewInbound(id) { window.location.href = Utils.nav('/customer/inbound-detail?id=') + id; }

  // ============ 保留 v1.7.5 的 createInbound() —— 新建入库申请弹窗 ============
  function createInbound() {
    const modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.innerHTML = `
      <div class="bg-white rounded-xl w-[900px] max-h-[90vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
        <div class="px-6 py-4 border-b border-slate-200 sticky top-0 bg-white">
          <h3 class="font-bold text-slate-800 text-lg">新建入库申请</h3>
        </div>
        <div class="p-6 space-y-5">
          <div>
            <h4 class="text-sm font-semibold text-slate-700 mb-3 pb-2 border-b">一、入库基本信息</h4>
            <div class="grid grid-cols-2 gap-4">
              <div><label class="block text-xs text-slate-600 mb-1">入库仓库 <span class="text-red-500">*</span></label>
                <select class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                  ${MockData.warehouses.map(w => `<option value="${w.id}">${w.name} (${w.type})</option>`).join('')}
                </select>
              </div>
              <div><label class="block text-xs text-slate-600 mb-1">入库方式 <span class="text-red-500">*</span></label>
                <select class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                  <option>新货入库</option><option>货权转移入库</option>
                </select>
              </div>
              <div><label class="block text-xs text-slate-600 mb-1">车牌号 <span class="text-red-500">*</span></label><input type="text" placeholder="豫A·XXXXX" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm"></div>
              <div><label class="block text-xs text-slate-600 mb-1">司机姓名/电话</label><input type="text" placeholder="如：张大伟 138 0000 5678" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm"></div>
            </div>
          </div>
          <div>
            <h4 class="text-sm font-semibold text-slate-700 mb-3 pb-2 border-b flex items-center justify-between">
              <span>二、货物明细 <span class="text-red-500">*</span></span>
              <button class="text-xs text-blue-600 hover:underline">+ 添加货品</button>
            </h4>
            <table class="w-full text-sm border border-slate-200 rounded-lg overflow-hidden">
              <thead class="bg-slate-50 text-xs">
                <tr>
                  <th class="text-left px-3 py-2">货品</th>
                  <th class="text-right px-3 py-2">件数</th>
                  <th class="text-right px-3 py-2">净重(kg)</th>
                  <th class="text-right px-3 py-2">评估单价(¥/kg)</th>
                  <th class="text-right px-3 py-2">评估货值</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="px-3 py-2">
                    <select class="w-full px-2 py-1 border border-slate-300 rounded text-sm">
                      ${(MockData.products_market || []).map(p => `<option>${p.id} | ${p.name} (${p.country})</option>`).join('')}
                    </select>
                  </td>
                  <td class="px-3 py-2"><input type="number" value="1190" class="w-24 px-2 py-1 border border-slate-300 rounded text-sm text-right num-focus"></td>
                  <td class="px-3 py-2"><input type="number" value="23800" class="w-28 px-2 py-1 border border-slate-300 rounded text-sm text-right num-focus"></td>
                  <td class="px-3 py-2"><input type="number" value="63.00" class="w-24 px-2 py-1 border border-slate-300 rounded text-sm text-right num-focus"></td>
                  <td class="px-3 py-2 text-right num-focus font-medium">¥1,499,400.00</td>
                </tr>
              </tbody>
              <tfoot>
                <tr class="bg-blue-50">
                  <td colspan="4" class="px-3 py-2 text-right text-sm font-medium">合计评估货值：</td>
                  <td class="px-3 py-2 text-right text-base font-bold text-blue-700 num-focus">¥1,499,400.00</td>
                </tr>
              </tfoot>
            </table>
          </div>
          <div>
            <h4 class="text-sm font-semibold text-slate-700 mb-3 pb-2 border-b">三、随附单据</h4>
            <div class="grid grid-cols-2 gap-3">
              ${['报关单', '检验检疫证', '入境货物检验检疫证明', '货权转移单'].map(d => `
                <div class="flex items-center gap-2 p-2 border border-slate-200 rounded">
                  <svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
                  <span class="text-xs text-slate-700 flex-1">${d}</span>
                  <button class="text-xs text-blue-600 hover:underline">上传</button>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2 sticky bottom-0 bg-white">
          <button onclick="this.closest('.modal-backdrop').remove()" class="px-4 py-2 border border-slate-300 rounded-md text-sm hover:bg-slate-50">取消</button>
          <button onclick="Utils.toast('入库申请已保存为草稿','info'); this.closest('.modal-backdrop').remove(); setTimeout(()=>location.reload(),600)" class="px-4 py-2 border border-slate-300 rounded-md text-sm hover:bg-slate-50">保存草稿</button>
          <button onclick="Utils.toast('已提交，请货主方（盖章人）前往盖章','success'); this.closest('.modal-backdrop').remove(); setTimeout(()=>location.reload(),800)" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-sm font-medium">提交并去盖章 →</button>
        </div>
      </div>
    `;
    // v1.7.8 表单类弹窗：屏蔽点击外面关闭
    modal.onclick = () => {};
    document.body.appendChild(modal);
  }
  window.createInbound = createInbound;
</script>
</body>
</html>
