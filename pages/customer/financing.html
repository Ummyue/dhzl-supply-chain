<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>融资申请 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.8 状态机 TAB ============
  const FINANCING_TABS = [
    { id: 'all', label: '全部' },
    { id: 'pending_supervisor_eval', label: '待监管方评估货值' },
    { id: 'pending_owner_confirm', label: '待融资方确认货值' },
    { id: 'pending_owner_seal_2', label: '待融资方盖章' },
    { id: 'pending_supervisor', label: '待监管方盖章' },
    { id: 'pending_guarantor', label: '待担保方审核' },
    { id: 'pending_guarantor_seal', label: '待担保方盖章' },
    { id: 'pending_funding', label: '待资金方审核' },
    { id: 'pending_disbursement', label: '待放款' },
    { id: 'released', label: '已放款' },
    { id: 'rejected', label: '驳回', separator: true },
    { id: 'voided', label: '作废' },
  ];
  let currentFinancingTab = 'all';

  // ============ v1.7.8 筛选条件（输入即筛，无 Apply 按钮） ============
  // 顺序按金融从业者使用习惯：业务编号 → 客户 → 资方 → 产品 → 担保 → 监管 → 资产 → 时间
  const financingFilters = {
    bizNo: '',          // 融资申请编号（模糊）
    applicant: '',      // 融资方（下拉单选）
    bank: '',           // 金融机构（下拉单选）
    productName: '',    // 金融产品（下拉单选）
    guarantor: '',      // 担保方（下拉单选）
    supervisor: '',     // 监管方（下拉单选）
    pledgeAssetNo: '',  // 货押资产编号（模糊）
    startDate: '',      // 融资期限 起始日
    endDate: '',        // 融资期限 截止日
  };

  // 提取唯一值供下拉框选项（从 financingList 数据中动态抽出）
  function _unique(field) {
    return [...new Set(MockData.financingList.map(f => f[field]).filter(v => v))];
  }

  // 应用筛选条件（在 tab 过滤之后再叠加）
  function applyFilters() {
    const f = financingFilters;
    // 模糊搜索：英文/数字/常规标点都支持，不区分大小写
    const fuzzy = (val, kw) => !kw || (val || '').toLowerCase().includes(kw.toLowerCase().trim());
    // 日期范围：记录起息日在 [start, end] 内即匹配
    const inDateRange = (rec) => {
      if (!f.startDate && !f.endDate) return true;
      if (!rec.startDate) return false;
      if (f.startDate && rec.startDate < f.startDate) return false;
      if (f.endDate && rec.startDate > f.endDate) return false;
      return true;
    };
    return MockData.financingList.filter(rec =>
      fuzzy(rec.bizNo, f.bizNo) &&
      (!f.applicant || rec.applicant === f.applicant) &&
      (!f.bank || rec.bank === f.bank) &&
      (!f.productName || rec.productName === f.productName) &&
      (!f.guarantor || rec.guarantor === f.guarantor) &&
      (!f.supervisor || rec.supervisor === f.supervisor) &&
      fuzzy(rec.pledgeAssetNo, f.pledgeAssetNo) &&
      inDateRange(rec)
    );
  }

  function renderFilterBar() {
    const applicants = _unique('applicant');
    const banks = _unique('bank');
    const products = _unique('productName');
    const guarantors = _unique('guarantor');
    const supervisors = _unique('supervisor');
    const activeCount = Object.values(financingFilters).filter(v => v && v.trim()).length;
    const f = financingFilters;
    return `
      <div class="bg-white rounded-xl border border-slate-200 p-4 mb-3">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2 text-sm font-medium text-slate-700">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
            筛选条件
            ${activeCount > 0 ? `<span class="px-1.5 py-0.5 text-xs rounded bg-blue-100 text-blue-700">${activeCount}</span>` : ''}
          </div>
          <button onclick="resetFilters()" class="text-xs text-slate-500 hover:text-rose-600 flex items-center gap-1 ${activeCount > 0 ? '' : 'opacity-40 cursor-not-allowed'}" ${activeCount === 0 ? 'disabled' : ''}>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            重置筛选
          </button>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
          <!-- 1. 融资申请编号（模糊搜索）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">融资申请编号</label>
            <input type="text" placeholder="模糊搜索" value="${f.bizNo}" oninput="updateFilter('bizNo', this.value)" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
          </div>
          <!-- 2. 融资方（下拉）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">融资方</label>
            <select onchange="updateFilter('applicant', this.value)" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none bg-white">
              <option value="">全部</option>
              ${applicants.map(v => `<option value="${v}" ${f.applicant === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
          </div>
          <!-- 3. 金融机构（下拉）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">金融机构</label>
            <select onchange="updateFilter('bank', this.value)" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none bg-white">
              <option value="">全部</option>
              ${banks.map(v => `<option value="${v}" ${f.bank === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
          </div>
          <!-- 4. 金融产品（下拉）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">金融产品</label>
            <select onchange="updateFilter('productName', this.value)" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none bg-white">
              <option value="">全部</option>
              ${products.map(v => `<option value="${v}" ${f.productName === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
          </div>
          <!-- 5. 担保方（下拉）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">担保方</label>
            <select onchange="updateFilter('guarantor', this.value)" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none bg-white">
              <option value="">全部</option>
              ${guarantors.map(v => `<option value="${v}" ${f.guarantor === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
          </div>
          <!-- 6. 监管方（下拉）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">监管方</label>
            <select onchange="updateFilter('supervisor', this.value)" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none bg-white">
              <option value="">全部</option>
              ${supervisors.map(v => `<option value="${v}" ${f.supervisor === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
          </div>
          <!-- 7. 货押资产编号（模糊搜索）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">货押资产编号</label>
            <input type="text" placeholder="模糊搜索" value="${f.pledgeAssetNo}" oninput="updateFilter('pledgeAssetNo', this.value)" class="w-full px-2 py-1.5 text-sm border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
          </div>
          <!-- 8. 融资期限（起止日期范围）-->
          <div>
            <label class="block text-xs text-slate-500 mb-1">融资期限</label>
            <div class="flex items-center gap-1">
              <input type="date" value="${f.startDate}" onchange="updateFilter('startDate', this.value)" class="w-full px-1.5 py-1.5 text-xs border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
              <span class="text-slate-400 text-xs">~</span>
              <input type="date" value="${f.endDate}" onchange="updateFilter('endDate', this.value)" class="w-full px-1.5 py-1.5 text-xs border border-slate-200 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function updateFilter(key, value) {
    financingFilters[key] = value;
    // 重算 tab 上的数字 + 重渲染表格 + 更新筛选条（重置按钮状态会变）
    document.getElementById('financingTabs').innerHTML = renderFinancingTabs();
    document.getElementById('financingTableBody').innerHTML = renderFinancingRows(currentFinancingTab);
    document.getElementById('financingFilterBar').innerHTML = renderFilterBar();
  }

  function resetFilters() {
    Object.keys(financingFilters).forEach(k => financingFilters[k] = '');
    document.getElementById('financingTabs').innerHTML = renderFinancingTabs();
    document.getElementById('financingTableBody').innerHTML = renderFinancingRows(currentFinancingTab);
    document.getElementById('financingFilterBar').innerHTML = renderFilterBar();
    Utils.toast('已重置筛选条件', 'info');
  }

  function renderFinancingTabs() {
    const filtered = applyFilters();
    return FINANCING_TABS.map(t => {
      const count = t.id === 'all'
        ? filtered.length
        : filtered.filter(f => f.status === t.id).length;
      const active = t.id === currentFinancingTab;
      const sep = t.separator ? '<span class="mx-1 h-4 w-px bg-slate-300"></span>' : '';
      return `
        ${sep}
        <button onclick="switchFinancingTab('${t.id}')" class="px-3 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition flex items-center gap-1.5 ${
          active
            ? 'border-blue-600 text-blue-700'
            : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-200'
        }">
          ${t.label}
          <span class="px-1.5 py-0.5 text-xs rounded ${active ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-500'}">${count}</span>
        </button>
      `;
    }).join('');
  }

  function switchFinancingTab(tabId) {
    currentFinancingTab = tabId;
    document.getElementById('financingTabs').innerHTML = renderFinancingTabs();
    document.getElementById('financingTableBody').innerHTML = renderFinancingRows(tabId);
  }

  function renderFinancingRows(tabId) {
    // 先按 tab 过滤，再叠加筛选条件
    const tabFiltered = tabId === 'all'
      ? applyFilters()
      : applyFilters().filter(f => f.status === tabId);
    const list = tabFiltered;

    if (list.length === 0) {
      return `<tr><td colspan="20" class="py-12 text-center text-slate-400 text-sm">📭 当前状态机下暂无融资记录</td></tr>`;
    }

    // 状态机 → 状态文本映射
    const statusLabel = {
      'pending': { text: '未提交', color: 'text-slate-500' },
      'pending_supervisor_eval': { text: '⏳ 待监管方评估货值', color: 'text-amber-600' },
      'pending_owner_confirm': { text: '⏳ 待融资方确认货值', color: 'text-amber-600' },
      'pending_owner_seal_2': { text: '⏳ 待融资方盖章', color: 'text-amber-600' },
      'pending_supervisor': { text: '⏳ 待监管方盖章', color: 'text-blue-600' },
      'pending_guarantor': { text: '⏳ 待担保方审核', color: 'text-blue-600' },
      'pending_guarantor_seal': { text: '⏳ 待担保方盖章', color: 'text-blue-600' },
      'pending_funding': { text: '⏳ 待资金方审核', color: 'text-blue-600' },
      'pending_disbursement': { text: '⏳ 待放款', color: 'text-violet-600' },
      'released': { text: '✓ 已放款', color: 'text-emerald-600' },
      'rejected': { text: '🔴 驳回', color: 'text-red-600' },
      'voided': { text: '⚫ 作废', color: 'text-slate-500' },
    };
    // 盖章按钮应该出现的状态（v1.7 三次盖章）
    const sealStatusSet = new Set(['pending_supervisor', 'pending_guarantor', 'pending_funding']);

    return list.map(f => {
      const s = statusLabel[f.status] || { text: f.status, color: 'text-slate-500' };
      const showSeal = sealStatusSet.has(f.status);
      const sealLabel = f.status === 'pending_supervisor' ? '盖章①'
                      : f.status === 'pending_guarantor' ? '盖章②'
                      : f.status === 'pending_funding' ? '盖章③' : '盖章';
      return `
        <tr class="border-t border-slate-100 hover:bg-blue-50/30">
          <td class="px-3 py-3 font-mono text-xs text-blue-700 whitespace-nowrap">${f.bizNo}</td>
          <td class="px-3 py-3 whitespace-nowrap">${f.applicant}</td>
          <td class="px-3 py-3 whitespace-nowrap text-slate-700">${f.bank || '-'}</td>
          <td class="px-3 py-3 text-slate-600 text-xs">${f.productName || '-'}</td>
          <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${f.guarantor || '-'}</td>
          <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${f.supervisor || '-'}</td>
          <td class="px-3 py-3 text-right num-focus font-bold text-blue-700 whitespace-nowrap">${Utils.fmtMoney(f.applyAmount)}</td>
          <td class="px-3 py-3 text-right num-focus ${f.disbursedAmount > 0 ? 'text-emerald-700 font-medium' : 'text-slate-300'} whitespace-nowrap">${f.disbursedAmount > 0 ? Utils.fmtMoney(f.disbursedAmount) : '—'}</td>
          <td class="px-3 py-3 text-right num-focus whitespace-nowrap">${f.interestRate ? (f.interestRate * 100).toFixed(2) + '%' : '-'}</td>
          <td class="px-3 py-3 whitespace-nowrap text-slate-700">${f.startDate || '—'}</td>
          <td class="px-3 py-3 whitespace-nowrap text-slate-700">${f.maturityDate || '—'}</td>
          <td class="px-3 py-3 font-mono text-xs whitespace-nowrap">${f.pledgeAssetNo || '—'}</td>
          <td class="px-3 py-3 text-right num-focus whitespace-nowrap">${f.pledgeQty > 0 ? Utils.fmtNum(f.pledgeQty) : '—'}</td>
          <td class="px-3 py-3 whitespace-nowrap text-slate-500 text-xs">${f.pledgeQty > 0 ? f.qtyUnit : ''}</td>
          <td class="px-3 py-3 text-right num-focus whitespace-nowrap">${f.pledgeWeight > 0 ? Utils.fmtNum(f.pledgeWeight) : '—'}</td>
          <td class="px-3 py-3 whitespace-nowrap text-slate-500 text-xs">${f.pledgeWeight > 0 ? f.weightUnit : ''}</td>
          <td class="px-3 py-3 text-right num-focus whitespace-nowrap">${f.unitPrice ? f.unitPrice.toFixed(2) : '-'}</td>
          <td class="px-3 py-3 text-right num-focus whitespace-nowrap">${Utils.fmtMoney(f.pledgeValue)}</td>
          <td class="px-3 py-3 whitespace-nowrap">
            <div class="flex flex-col gap-0.5">
              <span class="text-xs font-medium ${s.color}">${s.text}</span>
              ${f.status === 'rejected' && f.rejectedReason ? `<span class="text-[10px] text-red-500">${f.rejectedBy}：${f.rejectedReason.slice(0, 16)}${f.rejectedReason.length > 16 ? '…' : ''}</span>` : ''}
            </div>
          </td>
          <td class="px-3 py-3 text-center whitespace-nowrap">
            <div class="flex items-center justify-center gap-2">
              <button onclick="viewFinancing('${f.id}')" class="text-blue-600 hover:underline text-xs font-medium">详情</button>
              ${showSeal ? `<button onclick="sealFinancing('${f.id}', '${f.status}')" class="text-amber-600 hover:underline text-xs font-medium">${sealLabel}</button>` : ''}
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  // 盖章按钮处理（占位）
  function sealFinancing(id, status) {
    const sealMap = {
      'pending_supervisor': '盖章①（监管通过后的反担保合同 / 质物清单）',
      'pending_guarantor': '盖章②（担保通过后的补充协议）',
      'pending_funding': '盖章③（资金方通过后的放款承诺函）',
    };
    if (confirm(`即将对融资申请 ${id} 进行货主方电子${sealMap[status] || '签章'}，使用印章「河南某冷链股份有限公司 公章」？\n\n签章后将进入下一阶段审核，过程留痕不可篡改。`)) {
      Utils.toast('签章已生效，系统自动流转到下一阶段', 'success');
    }
  }

  // ============ v1.7.8 CSV 导出 ============
  function exportFinancingCSV() {
    // 1. 筛选条件 + 当前 tab 叠加
    const tabId = currentFinancingTab;
    const tabLabel = FINANCING_TABS.find(t => t.id === tabId)?.label || '全部';
    const filtered = applyFilters();
    const list = tabId === 'all'
      ? filtered
      : filtered.filter(f => f.status === tabId);

    if (list.length === 0) {
      Utils.toast('当前筛选条件下无数据可导出', 'warning');
      return;
    }

    // 2. 表头（18 列）
    const headers = [
      '融资申请编号', '融资方', '金融机构', '金融产品', '担保方', '监管方',
      '拟融资金额（元）', '放款金额（元）', '融资利率', '融资起息日', '融资到期日',
      '货押资产编号', '质押数量', '数量单位', '质押重量', '重量单位',
      '评估单价（元/千克）', '质押货值（元）', '状态'
    ];

    // 3. 状态机 → 文本映射
    const statusLabel = {
      'pending': '未提交',
      'pending_supervisor_eval': '待监管方评估货值',
      'pending_owner_confirm': '待融资方确认货值',
      'pending_owner_seal_2': '待融资方盖章',
      'pending_supervisor': '待监管方盖章',
      'pending_guarantor': '待担保方审核',
      'pending_guarantor_seal': '待担保方盖章',
      'pending_funding': '待资金方审核',
      'pending_disbursement': '待放款',
      'released': '已放款',
      'rejected': '驳回',
      'voided': '作废',
    };

    // 4. 数据行
    const rows = list.map(f => [
      f.bizNo, f.applicant, f.bank || '', f.productName || '',
      f.guarantor || '', f.supervisor || '',
      f.applyAmount || 0, f.disbursedAmount || 0,
      f.interestRate ? (f.interestRate * 100).toFixed(2) + '%' : '',
      f.startDate || '', f.maturityDate || '',
      f.pledgeAssetNo || '',
      f.pledgeQty || 0, f.pledgeQty > 0 ? f.qtyUnit : '',
      f.pledgeWeight || 0, f.pledgeWeight > 0 ? f.weightUnit : '',
      f.unitPrice || 0, f.pledgeValue || 0,
      statusLabel[f.status] || f.status
    ]);

    // 5. 转 CSV 字符串（UTF-8 BOM 防止 Excel 中文乱码）
    const csv = [headers, ...rows].map(row =>
      row.map(cell => {
        const v = String(cell == null ? '' : cell);
        // 含逗号/引号/换行 → 加引号
        return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
      }).join(',')
    ).join('\n');

    const csvContent = '\uFEFF' + csv; // UTF-8 BOM
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);

    // 6. 下载
    const link = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    link.href = url;
    link.download = `融资申请列表_${tabLabel}_${date}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);

    Utils.toast(`已导出 ${list.length} 条记录（${tabLabel}）`, 'success');
  }

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '融资申请',
    currentPath: '/customer/financing',
    breadcrumb: [{ label: '融资管理', path: '/customer/financing' }, '融资申请'],
    extra: `<div class="flex items-center gap-2">
