<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>质物清单 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    /* tab 下划线 + 选中态 */
    .pledge-tab { position: relative; padding: 10px 16px; cursor: pointer; color: #475569; font-size: 13px; white-space: nowrap; transition: color .15s; border-bottom: 2px solid transparent; }
    .pledge-tab:hover { color: #2563eb; }
    .pledge-tab.active { color: #2563eb; font-weight: 600; border-bottom-color: #2563eb; }
    .pledge-tab .count { margin-left: 4px; color: #94a3b8; font-weight: 400; }
    .pledge-tab.active .count { color: #2563eb; }
    .pledge-tab-divider { width: 1px; background: #e2e8f0; align-self: stretch; margin: 6px 0; }
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.22 质物清单（按用户图1重设计） ============
  // 顶部 9 筛选（3×3 行） / 状态机 tab 6 个（全部/待监管/待资方/待担保/已完成/驳回）
  // 14 列数据表格 / 数据导出 / 共 400 条 / 第 1/80 页 / 跳至 5

  const filters = {
    pledgeNo: '',     // 质物清单编号
    warehouse: '',    // 库点
    position: '',     // 仓房-货位
    product: '',      // 金融产品
    category: '',     // 货物品类
    pledgeFinancingNo: '',  // 货押融资编号
    bank: '',         // 金融机构
    regulator: '',    // 监管方
    guarantor: '',    // 担保方
  };
  let activeTab = 'all';  // all / pending_regulator / pending_bank / pending_guarantor / completed / rejected

  const STATUS_LABEL = {
    pending_regulator: '待监管方盖章',
    pending_bank:      '待融资方盖章',
    pending_guarantor: '待担保方盖章',
    completed:         '已完成',
    rejected:          '驳回',
  };
  const TAB_ORDER = [
    'all', 'pending_regulator', 'pending_bank', 'pending_guarantor', 'completed', 'rejected',
  ];

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '质物清单',
    currentPath: '/customer/pledge-list',
    breadcrumb: [
      { label: '融资管理', path: '/customer/financing' },
      { label: '质物清单', path: '/customer/pledge-list' },
    ],
    extra: ``,
    content: render(),
  });

  function render() {
    return `
      ${Components.filterBar({
        filters: filters,
        fields: [
          { label: '质物清单编号', key: 'pledgeNo', type: 'text', placeholder: '请输入质物清单编号', suggest: { primaryKey: 'pledgeNo', secondaryKey: 'warehouse' } },
          { label: '库点', key: 'warehouse', type: 'select', placeholder: '库点', options: [{ value: '', label: '请选择' }, ...uniqueValues('warehouse').map(v => ({ value: v, label: v }))] },
          { label: '仓房-货位', key: 'position', type: 'select', placeholder: '仓房-货位', options: [{ value: '', label: '请选择' }, ...uniqueValues('position').map(v => ({ value: v, label: v }))] },
          { label: '金融产品', key: 'product', type: 'select', placeholder: '金融产品', options: [{ value: '', label: '请选择' }, ...uniqueValues('product').map(v => ({ value: v, label: v }))] },
          { label: '货物品类', key: 'category', type: 'select', placeholder: '货物品类', options: [{ value: '', label: '请选择' }, ...uniqueValues('category').map(v => ({ value: v, label: v }))] },
          { label: '货押融资编号', key: 'pledgeFinancingNo', type: 'text', placeholder: '请输入货押融资编号' },
          { label: '金融机构', key: 'bank', type: 'select', placeholder: '金融机构', options: [{ value: '', label: '请选择' }, ...uniqueValues('bank').map(v => ({ value: v, label: v }))] },
          { label: '监管方', key: 'regulator', type: 'select', placeholder: '监管方', options: [{ value: '', label: '请选择' }, ...uniqueValues('regulator').map(v => ({ value: v, label: v }))] },
          { label: '担保方', key: 'guarantor', type: 'select', placeholder: '担保方', options: [{ value: '', label: '请选择' }, ...uniqueValues('guarantor').map(v => ({ value: v, label: v }))] },
        ],
        dataSource: MockData.pledgeList,
        onChange: 'refresh',
        hasExport: true,
        exportCSV: 'exportData',
      })}

      <!-- 状态机 tab 行 + 数据导出按钮（右上角） -->
      <div class="bg-white border border-slate-200 rounded-t-xl flex items-center justify-between" style="border-bottom: 0;">
        <div class="flex items-center overflow-x-auto">
          ${renderTabs()}
        </div>
        <button onclick="exportData()" class="px-4 py-1.5 mx-5 my-2 text-xs text-slate-600 hover:text-blue-600 hover:bg-slate-50 border border-slate-200 rounded flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          数据导出
        </button>
      </div>

      <!-- 14 列表格 -->
      <div class="bg-white border border-slate-200 rounded-b-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[1280px]">
            <thead class="bg-slate-50 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-3 whitespace-nowrap">质物清单编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">库点</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">仓房-货位</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">金融产品</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">货押融资编号</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">货物品类</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">质押数量</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">质押重量</th>
                <th class="text-right px-3 py-3 whitespace-nowrap">质押货值（元）</th>
                <th class="text-center px-3 py-3 whitespace-nowrap">数量单位</th>
                <th class="text-center px-3 py-3 whitespace-nowrap">质量单位</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">监管方</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">金融机构</th>
                <th class="text-left px-3 py-3 whitespace-nowrap">担保方</th>
              </tr>
            </thead>
            <tbody>${renderRows(applyFilters())}</tbody>
          </table>
        </div>
        ${renderPagination(applyFilters().length)}
      </div>
    `;
  }

  // ===== 数据过滤 / tab / pagination =====
  function uniqueValues(field) {
    const set = new Set();
    (MockData.pledgeList || []).forEach(p => p[field] && set.add(p[field]));
    return Array.from(set);
  }

  function applyFilters() {
    let list = (MockData.pledgeList || []);
    if (activeTab !== 'all') list = list.filter(p => p.status === activeTab);
    if (filters.pledgeNo)         list = list.filter(p => (p.pledgeNo || '').includes(filters.pledgeNo));
    if (filters.warehouse)        list = list.filter(p => p.warehouse === filters.warehouse);
    if (filters.position)         list = list.filter(p => p.position === filters.position);
    if (filters.product)          list = list.filter(p => p.product === filters.product);
    if (filters.category)         list = list.filter(p => p.category === filters.category);
    if (filters.pledgeFinancingNo) list = list.filter(p => (p.pledgeFinancingNo || '').includes(filters.pledgeFinancingNo));
    if (filters.bank)             list = list.filter(p => p.bank === filters.bank);
    if (filters.regulator)        list = list.filter(p => p.regulator === filters.regulator);
    if (filters.guarantor)        list = list.filter(p => p.guarantor === filters.guarantor);
    return list;
  }

  function tabCounts() {
    const all = MockData.pledgeList || [];
    const c = { all: all.length };
    Object.keys(STATUS_LABEL).forEach(k => c[k] = all.filter(p => p.status === k).length);
    return c;
  }

  function renderTabs() {
    const counts = tabCounts();
    return TAB_ORDER.map((k, i) => {
      // 在「已完成」和「驳回」之间插分隔线
      const divider = (k === 'rejected') ? '' : '';
      // 把"已完成"和"驳回"中间加一条线 → 简化实现：所有 tab 都连续
      const label = k === 'all' ? '全部' : STATUS_LABEL[k];
      const isActive = k === activeTab;
      const countText = `(${counts[k]})`;
      return `
        <div class="flex items-stretch">
          <div class="pledge-tab ${isActive ? 'active' : ''}" onclick="switchTab('${k}')">
            ${label}<span class="count">${counts[k] || 0 > 0 ? countText : ''}</span>
          </div>
          ${i === 4 ? '<div class="pledge-tab-divider"></div>' : ''}
        </div>
      `;
    }).join('');
  }

  function renderRows(list) {
    if (!list.length) return `<tr><td colspan="14" class="py-12 text-center text-slate-400 text-sm">📭 当前筛选条件下无质物清单</td></tr>`;
    return list.map(p => `
      <tr class="border-t border-slate-100 hover:bg-blue-50/30 cursor-pointer" onclick="goDetail('${p.id}')">
        <td class="px-3 py-3 font-mono text-xs text-slate-700 whitespace-nowrap">${p.pledgeNo}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.warehouse}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.position}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.product}</td>
        <td class="px-3 py-3 text-blue-600 font-mono text-xs whitespace-nowrap hover:underline">${p.pledgeFinancingNo}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${p.category}</td>
        <td class="px-3 py-3 text-right text-slate-700 num-focus text-xs whitespace-nowrap">${p.pledgeQty.toLocaleString()}</td>
        <td class="px-3 py-3 text-right text-slate-700 num-focus text-xs whitespace-nowrap">${p.pledgeWeight.toLocaleString()}</td>
        <td class="px-3 py-3 text-right num-focus font-medium text-slate-800 text-xs whitespace-nowrap">${Utils.fmtMoney(p.pledgeValue)}</td>
        <td class="px-3 py-3 text-center text-slate-500 text-xs">${p.qtyUnit}</td>
        <td class="px-3 py-3 text-center text-slate-500 text-xs">${p.weightUnit}</td>
        <td class="px-3 py-3 text-slate-700 text-xs">${p.regulator}</td>
        <td class="px-3 py-3 text-slate-700 text-xs">${p.bank}</td>
        <td class="px-3 py-3 text-slate-700 text-xs">${p.guarantor}</td>
      </tr>
    `).join('');
  }

  function renderPagination(total) {
    return Components.pagination({ total: total || 0, page: 1, pageSize: 10, onChange: 'window.__noop', onPageSize: 'window.__noop', onJump: 'window.__noop' });
  }

  // ============ Events ============
  window.updateFilter = (k, v) => { filters[k] = v; };
  window.switchTab = (k) => { activeTab = k; refresh(); };
  window.removeTag = (k, isDate) => { if (isDate) { /* */ } else { filters[k] = ''; const i = document.getElementById('filterInput_' + k); if (i) i.value = ''; } refresh(); };
  window.resetAllFilters = () => {
    Object.keys(filters).forEach(k => filters[k] = '');
    refresh();
  };
  window.exportData = () => Utils.toast('已导出当前筛选数据（占位）', 'success');
  window.goDetail = (id) => {
    window.location.href = `${Utils.nav('/customer/pledge-detail')}?id=${id}`;
  };

  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '质物清单',
      currentPath: '/customer/pledge-list',
      breadcrumb: [
        { label: '融资管理', path: '/customer/financing' },
        { label: '质物清单', path: '/customer/pledge-list' },
      ],
      extra: '',
      content: render(),
    });
  }
</script>
</body>
</html>
