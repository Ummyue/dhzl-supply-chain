                  <svg class="w-8 h-8 mx-auto text-slate-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                  <div class="text-xs text-slate-600">点击上传印章 PNG/JPG</div>
                  <div class="text-xs text-slate-400 mt-1">建议尺寸 200×200，透明背景</div>
                  <input type="file" accept="image/png,image/jpeg" class="hidden" id="sealUpload" onchange="uploadSeal(event)">
                </label>

                <div class="mt-3 text-xs text-slate-500 mb-2">或选择预设印章：</div>
                <div class="grid grid-cols-2 gap-2" id="sealList">
                  ${MockData.seals.filter(s => user.sealScope?.includes(s.id)).map(s => `
                    <div class="seal-draggable p-3 border border-slate-200 rounded-lg hover:border-amber-400 hover:bg-amber-50 text-center"

                         ondragstart="dragSeal(event, '${s.id}', '${s.preview}', '${s.color}')"
                         onclick="usePresetSeal('${s.id}', '${s.preview}', '${s.color}')">
                      <div class="w-12 h-12 mx-auto rounded-full border-2 border-${s.color === 'red' ? 'red' : 'blue'}-500 flex items-center justify-center text-${s.color === 'red' ? 'red' : 'blue'}-700 font-bold text-xs mb-1" style="background: ${s.color === 'red' ? 'rgba(220,38,38,0.1)' : 'rgba(37,99,235,0.1)'}">
                        ${s.preview.substring(0, 2)}

              </div>

              <!-- 签章操作 -->

                  还未放置印章
                </div>
                <label class="flex items-start gap-2 text-xs text-slate-600 mb-3">
                  <input type="checkbox" id="confirmCheck" class="mt-0.5">
                  <span>我确认上述签章位置准确无误，本次图片盖章具备法律效力（首期功能）</span>

                <div class="flex gap-2">
                  <button onclick="cancelSeal()" class="flex-1 px-3 py-2 border border-slate-300 rounded-md text-sm hover:bg-slate-50">取消</button>
                  <button onclick="confirmSeal()" class="flex-1 px-3 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-md text-sm font-medium">确认签章</button>
                </div>
              </div>

              <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-800">
                💡 提示：点击或拖拽印章至左侧"盖章区域"即可放置
              </div>

  // 印章数据存储
  let currentSeal = null;

  function uploadSeal(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const sealImg = e.target.result;
      currentSeal = { src: sealImg, name: file.name };
      placeSeal(sealImg, '上传印章');
      Utils.toast('✓ 印章已上传，请拖拽至单据盖章区', 'success');
    };
    reader.readAsDataURL(file);
  }

  function usePresetSeal(id, preview, color) {
    // 模拟预设印章（实际是 SVG 生成的图片）
    const sealImg = generateSealImage(preview, color);
    currentSeal = { src: sealImg, name: preview, isPreset: true };
    placeSeal(sealImg, preview);
    Utils.toast(`✓ 已选择"${preview}"印章`, 'success');
  }

  function dragSeal(event, id, preview, color) {
    const sealImg = generateSealImage(preview, color);
    event.dataTransfer.setData('text/plain', sealImg);
    event.dataTransfer.setData('seal-name', preview);
  }

  function generateSealImage(text, color) {
    // 简化：用 canvas 生成圆形印章
    const canvas = document.createElement('canvas');
    canvas.width = 200;
    canvas.height = 200;
    const ctx = canvas.getContext('2d');
    const c = color === 'red' ? '#dc2626' : '#2563eb';

    // 外圈
    ctx.strokeStyle = c;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(100, 100, 90, 0, 2 * Math.PI);
    ctx.stroke();

    // 内圈
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(100, 100, 75, 0, 2 * Math.PI);
    ctx.stroke();

    // 中心五角星
    ctx.fillStyle = c;
    drawStar(ctx, 100, 100, 5, 25, 12);

    // 文字
    ctx.fillStyle = c;
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(text, 100, 155);

    return canvas.toDataURL('image/png');
  }

  function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
    let rot = Math.PI / 2 * 3;
    let x = cx;
    let y = cy;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outerRadius);
    for (let i = 0; i < spikes; i++) {
      x = cx + Math.cos(rot) * outerRadius;
      y = cy + Math.sin(rot) * outerRadius;
      ctx.lineTo(x, y);
      rot += step;
      x = cx + Math.cos(rot) * innerRadius;
      y = cy + Math.sin(rot) * innerRadius;
      ctx.lineTo(x, y);
      rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
    ctx.fill();
  }

  function placeSeal(src, name) {
    const img = document.getElementById('placedSeal');
    img.src = src;
    img.style.display = 'block';
    document.getElementById('sealPlaceholder').style.display = 'none';
    document.getElementById('sealStatus').innerHTML = `✓ 已放置印章：<span class="text-amber-700 font-medium">${name}</span>`;
  }

  // 盖章区域支持拖拽接收
  document.addEventListener('DOMContentLoaded', () => {
    const sealZone = document.getElementById('sealZone');
    if (sealZone) {
      sealZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        sealZone.style.borderColor = '#f59e0b';
        sealZone.style.background = '#fef3c7';
      });
      sealZone.addEventListener('dragleave', () => {
        sealZone.style.borderColor = '#cbd5e1';
        sealZone.style.background = 'transparent';
      });
      sealZone.addEventListener('drop', (e) => {
        e.preventDefault();
        sealZone.style.borderColor = '#cbd5e1';
        sealZone.style.background = 'transparent';
        const src = e.dataTransfer.getData('text/plain');
        const name = e.dataTransfer.getData('seal-name');
        if (src) {
          currentSeal = { src, name };
          placeSeal(src, name);
          Utils.toast('✓ 印章已放置', 'success');
        }
      });
    }
  });

  function cancelSeal() {
    if (confirm('确认取消签章？取消后申请将保存为草稿。')) {
      Utils.toast('已取消签章，申请保存为草稿', 'info');
      setTimeout(() => window.location.href = '/customer/admission', 1000);
    }
  }

  function confirmSeal() {
    if (!currentSeal) {
      Utils.toast('⚠ 请先上传或选择印章', 'error');
      return;
    }
    const checked = document.getElementById('confirmCheck').checked;
    if (!checked) {
      Utils.toast('⚠ 请勾选确认声明', 'error');
      return;
    }
    Utils.toast('✓ 签章完成！准入申请已提交至监管方审核', 'success');
    setTimeout(() => {
      window.location.href = '/customer/admission-detail?id=adm_001';
    }, 1500);
  }
</script>
