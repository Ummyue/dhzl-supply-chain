<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>准入详情 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.21 准入详情（按用户图2重做） ============
  // 5 大区块：申请企业基本信息 / 法人信息 / 股权结构说明 / 其他信息 / 附件
  // 底部：[取消] [提交]

  const urlId = new URLSearchParams(window.location.search).get('id') || 'adm_001';

  // 优先从 admissionDetail 取数据；回退到 admissionList 的基础字段
  const detail = (MockData.admissionDetail && MockData.admissionDetail[urlId]) || null;
  const summary = (MockData.admissionList || []).find(a => a.id === urlId) || {};
  const data = { ...summary, ...(detail || {}) };

  // 编辑表单数据
  const form = {
    companyName: data.companyName || data.customer || '',
    creditCode: data.creditCode || '',
    shortName: data.shortName || '',
    shortNamePinyin: data.shortNamePinyin || '',
    established: data.established || '',
    nature: data.nature || '',
    businessDeadline: data.businessDeadline || '',
    registeredAddress: data.registeredAddress || '',
    industry: data.industry || '',
    registeredCapital: data.registeredCapital || '',
    inRenewal: data.inRenewal !== undefined ? data.inRenewal : true,
    contactPhone: data.contactPhone || '',
    contactAddress: data.contactAddress || '',
    businessScope: data.businessScope || '',
    legalName: data.legalName || data.legalRep || '',
    legalIdCard: data.legalIdCard || '',
    legalPhone: data.legalPhone || '',
    legalIdValidFrom: data.legalIdValidFrom || '',
    legalIdValidTo: data.legalIdValidTo || '',
    shareholders: data.shareholders || [],
    otherInfo: {
      history: data.otherInfo?.history || '',
      relatedEnterprises: data.otherInfo?.relatedEnterprises || '',
    },
    attachments: data.attachments || [
      { type: '* 营业执照', required: true,  files: [] },
      { type: '* 法人身份证复印件', required: true,  files: [] },
      { type: '最近一年财务报表', required: false, files: [] },
      { type: '完税证明', required: false, files: [] },
      { type: '三个月内业务购销合同复印件、发票复印件', required: false, files: [] },
      { type: '其他附件', required: false, files: [] },
    ],
  };

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '准入详情',
    currentPath: '/customer/admission',
    breadcrumb: [
      { label: '客户准入', path: '/customer/admission' },
      { label: '准入申请', path: '/customer/admission' },
      { label: '准入详情', path: '/customer/admission-detail' },
    ],
    extra: '',
    content: render(),
  });

  function render() {
    return `
      <!-- 顶部 header -->
      <div class="flex items-center justify-between mb-4 bg-white border border-slate-200 rounded-xl px-5 py-3">
        <div class="flex items-center gap-3">
          <a href="${Utils.nav('/customer/admission')}" class="flex items-center gap-1 text-slate-600 hover:text-blue-600 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回准入申请
          </a>
          <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-medium">准</div>
          <div>
            <h2 class="text-base font-bold text-slate-800">${form.companyName || '新建准入申请'}</h2>
            <p class="text-xs text-slate-500 font-mono">业务编号 ${urlId.toUpperCase()} · 当前阶段：${data.progress || '基础材料收集'}</p>
          </div>
          <span class="px-2 py-0.5 bg-amber-100 text-amber-700 text-xs rounded">${data.applyResult || '审核中'}</span>
        </div>
      </div>

      <!-- 1. 申请企业基本信息（图2 行 1：3 列网格，13+ 字段）-->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-4">
        <div class="px-6 py-3 border-b border-slate-200 flex items-center gap-2">
          <span class="w-1 h-4 bg-blue-500 rounded"></span>
          <h3 class="font-bold text-slate-800">申请企业基本信息</h3>
          <span class="text-xs text-slate-400">带 <span class="text-red-500">*</span> 为必填项</span>
        </div>
        <div class="px-6 py-5">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-x-6 gap-y-4">
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">企业名称</span></dt><dd><input type="text" value="${form.companyName}" onchange="updateForm('companyName', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">社会统一信用代码</span></dt><dd><input type="text" value="${form.creditCode}" onchange="updateForm('creditCode', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm font-mono focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5"><span class="text-slate-700">企业简称</span></dt><dd><input type="text" value="${form.shortName}" onchange="updateForm('shortName', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>

            <div><dt class="text-xs text-slate-500 mb-1.5"><span class="text-slate-700">企业简称首字母</span></dt><dd><input type="text" value="${form.shortNamePinyin}" onchange="updateForm('shortNamePinyin', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm uppercase focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">成立日期</span></dt><dd><input type="date" value="${form.established}" onchange="updateForm('established', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">企业性质</span></dt><dd>
              <select onchange="updateForm('nature', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none">
                <option value="">请选择</option>
                ${['上市公司','有限责任公司','股份有限公司','国有企业','民营企业','外商投资企业','个体工商户'].map(s => `<option ${form.nature === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </dd></div>

            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">营业期限止</span></dt><dd><input type="text" value="${form.businessDeadline}" placeholder="如：长期有效 或 2030-12-31" onchange="updateForm('businessDeadline', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div class="md:col-span-2"><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">注册地址</span></dt><dd><input type="text" value="${form.registeredAddress}" onchange="updateForm('registeredAddress', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>

            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">所属行业</span></dt><dd><input type="text" value="${form.industry}" placeholder="输入内容" onchange="updateForm('industry', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">注册资本</span></dt><dd><input type="text" value="${form.registeredCapital}" placeholder="输入内容（万元）" onchange="updateForm('registeredCapital', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">是否在续续期</span></dt><dd>
              <select onchange="updateForm('inRenewal', this.value === 'true')" class="w-full px-3 py-2 border border-slate-300 rounded text-sm bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none">
                <option value="true" ${form.inRenewal ? 'selected' : ''}>是</option>
                <option value="false" ${!form.inRenewal ? 'selected' : ''}>否</option>
              </select>
            </dd></div>

            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">联系电话</span></dt><dd><input type="text" value="${form.contactPhone}" placeholder="输入内容" onchange="updateForm('contactPhone', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">联系地址</span></dt><dd><input type="text" value="${form.contactAddress}" placeholder="输入内容" onchange="updateForm('contactAddress', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div></div>

            <div class="md:col-span-3">
              <dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">经营范围</span></dt>
              <dd class="relative">
                <textarea id="bizScope" oninput="onScopeInput()" maxlength="100" placeholder="输入内容" class="w-full px-3 py-2 border border-slate-300 rounded text-sm h-24 resize-y focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none">${form.businessScope}</textarea>
                <div class="text-xs text-slate-400 mt-1 text-right">${(form.businessScope || '').length}/100</div>
              </dd>
            </div>
          </div>
        </div>
      </section>

      <!-- 2. 法人信息（3 列 5 字段） -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-4">
        <div class="px-6 py-3 border-b border-slate-200 flex items-center gap-2">
          <span class="w-1 h-4 bg-blue-500 rounded"></span>
          <h3 class="font-bold text-slate-800">法人信息</h3>
        </div>
        <div class="px-6 py-5">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-x-6 gap-y-4">
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">法人姓名</span></dt><dd><input type="text" value="${form.legalName}" onchange="updateForm('legalName', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">法人身份证号码</span></dt><dd><input type="text" value="${form.legalIdCard}" onchange="updateForm('legalIdCard', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm font-mono focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">法人手机号</span></dt><dd><input type="text" value="${form.legalPhone}" onchange="updateForm('legalPhone', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>

            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">身份证有效期起</span></dt><dd><input type="date" value="${form.legalIdValidFrom}" onchange="updateForm('legalIdValidFrom', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div><dt class="text-xs text-slate-500 mb-1.5">* <span class="text-slate-700">身份证有效期止</span></dt><dd><input type="date" value="${form.legalIdValidTo}" onchange="updateForm('legalIdValidTo', this.value)" class="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none"></dd></div>
            <div></div>
          </div>
        </div>
      </section>

      <!-- 3. 股权结构说明（添加一行 + 5 列表） -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-4">
        <div class="px-6 py-3 border-b border-slate-200 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="font-bold text-slate-800">股权结构说明</h3>
          </div>
          <button onclick="addShareholderRow()" class="px-3 py-1.5 text-xs border border-blue-500 text-blue-600 rounded hover:bg-blue-50 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            添加一行
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-2.5 whitespace-nowrap">股东名称</th>
                <th class="text-left px-3 py-2.5 whitespace-nowrap">出资方式</th>
                <th class="text-right px-3 py-2.5 whitespace-nowrap">认缴出资额</th>
                <th class="text-right px-3 py-2.5 whitespace-nowrap">持股比例</th>
                <th class="text-left px-3 py-2.5 whitespace-nowrap">认缴出资时间</th>
                <th class="text-center px-3 py-2.5 w-16 whitespace-nowrap">操作</th>
              </tr>
            </thead>
            <tbody id="shareholdersBody">${renderShareholders()}</tbody>
          </table>
        </div>
      </section>

      <!-- 4. 其他信息（2 个 textarea） -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-4">
        <div class="px-6 py-3 border-b border-slate-200">
          <div class="flex items-center gap-2">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="font-bold text-slate-800">其他信息</h3>
          </div>
        </div>
        <div class="px-6 py-5 space-y-5">
          <div>
            <label class="text-xs text-slate-700 mb-1.5 block">客商的历史沿革和其他需要说明的重大事项</label>
            <div class="relative">
              <textarea oninput="onOtherInput('history', this)" maxlength="100" class="w-full px-3 py-2 border border-slate-300 rounded text-sm h-24 resize-y focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none">${form.otherInfo.history}</textarea>
              <div class="text-xs text-slate-400 mt-1 text-right">${(form.otherInfo.history || '').length}/100</div>
            </div>
          </div>
          <div>
            <label class="text-xs text-slate-700 mb-1.5 block">关联企业情况</label>
            <div class="relative">
              <textarea oninput="onOtherInput('relatedEnterprises', this)" maxlength="100" class="w-full px-3 py-2 border border-slate-300 rounded text-sm h-24 resize-y focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none">${form.otherInfo.relatedEnterprises}</textarea>
              <div class="text-xs text-slate-400 mt-1 text-right">${(form.otherInfo.relatedEnterprises || '').length}/100</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 5. 附件（6 类 + 上传时间常驻） -->
      <section class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-6">
        <div class="px-6 py-3 border-b border-slate-200 flex items-center gap-2">
          <span class="w-1 h-4 bg-blue-500 rounded"></span>
          <h3 class="font-bold text-slate-800">附件</h3>
          <span class="text-xs text-slate-400 ml-2">支持 jpg / jpeg / png / pdf，单个 ≤ 100MB</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="text-slate-600 text-xs">
              <tr class="border-b border-slate-200">
                <th class="text-left py-2.5 px-4 w-48">资料名称</th>
                <th class="text-center py-2.5 px-4 w-28">操作</th>
                <th class="text-left py-2.5 px-4">文件名（📅 上传时间常驻显示）</th>
              </tr>
            </thead>
            <tbody id="attachmentsBody">${renderAttachments()}</tbody>
          </table>
        </div>
      </section>

      <!-- 底部 -->
      <div class="flex justify-center gap-3 pb-8">
        <button onclick="cancelEdit()" class="px-12 py-2 border border-slate-300 rounded text-sm text-slate-700 hover:bg-slate-50">取消</button>
        <button onclick="submitAdmission()" class="px-12 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">提交</button>
      </div>
    `;
  }

  function renderShareholders() {
    if (!form.shareholders.length) {
      return `<tr><td colspan="6" class="py-8 text-center text-slate-400 text-sm">📭 暂无股东信息，请点击右上角「添加一行」</td></tr>`;
    }
    return form.shareholders.map((s, i) => `
      <tr class="border-t border-slate-100">
        <td class="px-3 py-2"><input type="text" value="${s.name}" onchange="updateShareholder(${i}, 'name', this.value)" class="w-full px-2 py-1 border border-slate-200 rounded text-xs"></td>
        <td class="px-3 py-2">
          <select onchange="updateShareholder(${i}, 'type', this.value)" class="w-full px-2 py-1 border border-slate-200 rounded text-xs bg-white">
            ${['货币出资','技术入股','实物出资','债权转股权','土地出资'].map(t => `<option ${s.type === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
        </td>
        <td class="px-3 py-2 text-right"><input type="number" value="${s.amount}" onchange="updateShareholder(${i}, 'amount', Number(this.value))" class="w-full px-2 py-1 border border-slate-200 rounded text-xs text-right num-focus"></td>
        <td class="px-3 py-2 text-right">
          <div class="flex items-center justify-end gap-1">
            <input type="number" value="${s.ratio}" step="0.01" onchange="updateShareholder(${i}, 'ratio', Number(this.value))" class="w-16 px-2 py-1 border border-slate-200 rounded text-xs text-right num-focus">
            <span class="text-xs text-slate-400">%</span>
          </div>
        </td>
        <td class="px-3 py-2"><input type="date" value="${s.date}" onchange="updateShareholder(${i}, 'date', this.value)" class="w-full px-2 py-1 border border-slate-200 rounded text-xs"></td>
        <td class="px-3 py-2 text-center">
          <button onclick="removeShareholder(${i})" class="text-rose-500 hover:text-rose-700 text-xs">删除</button>
        </td>
      </tr>
    `).join('');
  }

  function renderAttachments() {
    return form.attachments.map((a, i) => {
      const isRequired = a.type.includes('*');
      return `
        <tr class="border-t border-slate-100">
          <td class="py-3 px-4 align-top">
            <span class="${isRequired ? 'text-rose-500' : 'text-slate-700'} text-sm">${a.type}</span>
          </td>
          <td class="py-3 px-4 align-top text-center">
            <button onclick="uploadAttachment(${i})" class="px-2.5 py-1 text-xs border border-blue-500 text-blue-600 rounded hover:bg-blue-50">+ 选择文件</button>
          </td>
          <td class="py-3 px-4 align-top">
            <div id="att_${i}" class="flex flex-wrap gap-1.5">${renderAttachmentFiles(a, i)}</div>
          </td>
        </tr>
      `;
    }).join('');
  }

  function renderAttachmentFiles(a, i) {
    if (!a.files || !a.files.length) return '<span class="text-slate-300 text-xs">（暂无文件）</span>';
    return a.files.map((f, j) => `
      <div class="inline-flex items-center gap-1.5 px-2 py-1 bg-blue-50 rounded text-xs">
        <svg class="w-3 h-3 text-blue-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
        <span class="text-blue-700">${f.name}</span>
        <span class="text-slate-400 text-[11px] whitespace-nowrap">📅 ${f.time}</span>
        <button onclick="removeAttachmentFile(${i}, ${j})" class="ml-1 -mr-1 w-3.5 h-3.5 rounded-full bg-slate-400 hover:bg-rose-500 text-white text-[10px] flex items-center justify-center">×</button>
      </div>
    `).join('');
  }

  // ============ Events ============
  window.updateForm = (k, v) => { form[k] = v; };

  window.onScopeInput = () => {
    form.businessScope = document.getElementById('bizScope').value;
    refresh();
  };

  window.onOtherInput = (k, el) => {
    form.otherInfo[k] = el.value;
    // 仅更新字数提示（不重渲染整个页面避免失焦）
    const counter = el.parentElement.querySelector('.text-right');
    if (counter) counter.textContent = `${el.value.length}/100`;
  };

  window.addShareholderRow = () => {
    const nextNo = (form.shareholders.length || 0) + 1;
    form.shareholders.push({ name: '', type: '货币出资', amount: 0, ratio: 0, date: '' });
    refresh();
  };
  window.updateShareholder = (i, k, v) => {
    form.shareholders[i][k] = v;
  };
  window.removeShareholder = (i) => {
    form.shareholders.splice(i, 1);
    refresh();
  };

  window.uploadAttachment = (i) => {
    const now = new Date().toISOString().replace('T', ' ').slice(0, 19);
    const shortNow = now.slice(5);
    const f = { name: '最新设计稿.pdf', time: shortNow };
    if (!form.attachments[i].files) form.attachments[i].files = [];
    form.attachments[i].files.push(f);
    const wrap = document.getElementById('att_' + i);
    if (wrap) wrap.innerHTML = renderAttachmentFiles(form.attachments[i]);
    Utils.toast('已选择文件（占位）', 'success');
  };
  window.removeAttachmentFile = (i, j) => {
    form.attachments[i].files.splice(j, 1);
    const wrap = document.getElementById('att_' + i);
    if (wrap) wrap.innerHTML = renderAttachmentFiles(form.attachments[i]);
  };

  window.cancelEdit = () => {
    if (confirm('确认取消？未保存的内容将丢失。')) history.back();
  };

  window.submitAdmission = () => {
    // 校验必填
    const missing = [];
    if (!form.companyName) missing.push('企业名称');
    if (!form.creditCode) missing.push('社会统一信用代码');
    if (!form.established) missing.push('成立日期');
    if (!form.nature) missing.push('企业性质');
    if (!form.businessDeadline) missing.push('营业期限止');
    if (!form.registeredAddress) missing.push('注册地址');
    if (!form.industry) missing.push('所属行业');
    if (!form.registeredCapital) missing.push('注册资本');
    if (!form.contactPhone) missing.push('联系电话');
    if (!form.contactAddress) missing.push('联系地址');
    if (!form.businessScope) missing.push('经营范围');
    if (!form.legalName) missing.push('法人姓名');
    if (!form.legalIdCard) missing.push('法人身份证号码');
    if (!form.legalPhone) missing.push('法人手机号');
    if (!form.legalIdValidFrom) missing.push('身份证有效期起');
    if (!form.legalIdValidTo) missing.push('身份证有效期止');
    if (missing.length) return Utils.toast('请填写：' + missing.join('、'), 'error');
    // 附件必传（营业执照 + 法人身份证）
    const lic = form.attachments[0].files?.length || 0;
    const idCard = form.attachments[1].files?.length || 0;
    if (lic === 0) return Utils.toast('请上传「营业执照」（必传）', 'error');
    if (idCard === 0) return Utils.toast('请上传「法人身份证复印件」（必传）', 'error');
    Utils.toast('准入申请已提交，进入「基础材料收集」阶段', 'success');
    setTimeout(() => history.back(), 1000);
  };

  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '准入详情',
      currentPath: '/customer/admission',
      breadcrumb: [
        { label: '客户准入', path: '/customer/admission' },
        { label: '准入申请', path: '/customer/admission' },
        { label: '准入详情', path: '/customer/admission-detail' },
      ],
      extra: '',
      content: render(),
    });
  }
</script>
</body>
</html>
