<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>准入详情 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    /* v1.7.42 驳回状态底部固定操作栏 */
    .footer-actions {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 16px 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
    }
    .footer-spacer { height: 80px; }
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.35 准入详情 - 5 步审批 tab 模式 ============
  // 5 个状态机（tab）：基础信息收集 / 资质审核 / 现场考察 / 风险评估 / 办结
  // URL 参数：?id=adm_001&tab=qualification  默认 tab=基础信息收集

  const urlId = new URLSearchParams(window.location.search).get('id') || 'adm_001';
  const urlTab = new URLSearchParams(window.location.search).get('tab') || 'basic';

  // v1.7.43: 恢复 5 步 tab 配置（办结 tab 独立）
  // - 办结 tab 仅显示「办结时间」+「操作人」
  // - 风险评估 tab 4 卡 → 2 卡（去建议信用评级/建议授信额度）+ 去掉「后续动作」区块
  const TABS = [
    { id: 'basic',          name: '基础信息收集', step: 1 },
    { id: 'qualification',  name: '资质审核',     step: 2 },
    { id: 'siteInspection', name: '现场考察',     step: 3 },
    { id: 'riskAssessment', name: '风险评估',     step: 4 },
    { id: 'completion',     name: '办结',         step: 5 },
  ];

  // 数据回填
  const detail = (MockData.admissionDetail && MockData.admissionDetail[urlId]) || null;
  const summary = (MockData.admissionList || []).find(a => a.id === urlId) || {};
  const data = { ...summary, ...(detail || {}) };

  // 根据数据是否齐全判断 tab 是否可点
  function isTabEnabled(tabId) {
    if (tabId === 'qualification') return !!(detail && detail.qualification);
    if (tabId === 'siteInspection') return !!(detail && detail.siteInspection);
    if (tabId === 'riskAssessment') return !!(detail && detail.riskAssessment);
    if (tabId === 'completion') return !!(detail && detail.completion);
    return true;  // basic 永远可点
  }

  // 当前 tab 状态
  let currentTab = TABS.find(t => t.id === urlTab) ? urlTab : 'basic';

  // ============ 渲染函数 ============

  // 步骤条（顶部固定）
  function renderStepBar() {
    return `
      <div class="bg-white border border-slate-200 rounded-xl px-8 py-6 mb-4">
        <div class="flex items-center justify-between max-w-4xl mx-auto">
          ${TABS.map((t, i) => {
            const active = t.id === currentTab;
            return `
              <div class="flex items-center ${i < TABS.length - 1 ? 'flex-1' : ''}">
                <div class="flex flex-col items-center">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium ${active ? 'bg-blue-600 text-white' : 'bg-blue-100 text-blue-600'}">
                    ${t.step}
                  </div>
                  <div class="text-xs mt-2 ${active ? 'text-blue-600 font-medium' : 'text-slate-500'}">${t.name}</div>
                </div>
                ${i < TABS.length - 1 ? `<div class="flex-1 h-0.5 mx-2 mb-6 ${t.step < (TABS.find(x => x.id === currentTab)?.step || 0) ? 'bg-blue-300' : 'bg-slate-200'}"></div>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // Tab 切换
  function renderTabs() {
    return `
      <div class="bg-white border border-slate-200 rounded-xl mb-3 px-4 overflow-x-auto">
        <div class="flex items-center gap-1">
          ${TABS.map(t => {
            const active = t.id === currentTab;
            const enabled = isTabEnabled(t.id);
            return `
              <button
                onclick="switchTab('${t.id}')"
                class="px-4 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition ${active ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-700'} ${!enabled ? 'opacity-40 cursor-not-allowed' : ''}"
                ${!enabled ? 'disabled' : ''}
                title="${!enabled ? '该步骤数据待录入' : ''}"
              >
                ${t.step}. ${t.name}
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // ============ 5 个 tab 内容渲染器 ============

  // Tab 1：基础信息收集（图1）
  function renderBasicTab() {
    const s = data.shareholders || [];
    const atts = data.attachments || [];
    return `
      <div class="space-y-4">
        <!-- 企业基本信息 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业基本信息</h3>
          </div>
          <div class="grid grid-cols-3 gap-x-6 gap-y-3 text-sm">
            <div><span class="text-slate-500">企业名称：</span><span class="text-slate-800">${data.companyName || data.customer || '-'}</span></div>
            <div><span class="text-slate-500">社会统一信用代码：</span><span class="text-slate-800 font-mono">${data.creditCode || '-'}</span></div>
            <div><span class="text-slate-500">企业简称：</span><span class="text-slate-800">${data.shortName || '-'}</span></div>
            <div><span class="text-slate-500">企业简称首字母：</span><span class="text-slate-800">${data.shortNamePinyin || '-'}</span></div>
            <div><span class="text-slate-500">成立日期：</span><span class="text-slate-800">${data.established || '-'}</span></div>
            <div><span class="text-slate-500">企业性质：</span><span class="text-slate-800">${data.nature || '-'}</span></div>
            <div><span class="text-slate-500">营业期限：</span><span class="text-slate-800">${data.businessDeadline || '-'}</span></div>
            <div class="col-span-2"><span class="text-slate-500">注册地址：</span><span class="text-slate-800">${data.registeredAddress || '-'}</span></div>
            <div><span class="text-slate-500">所属行业：</span><span class="text-slate-800">${data.industry || '-'}</span></div>
            <div><span class="text-slate-500">注册资本：</span><span class="text-slate-800">${data.registeredCapital || '-'}</span></div>
            <div><span class="text-slate-500">是否在续期：</span><span class="text-slate-800">${data.inRenewal ? '是' : '否'}</span></div>
            <div><span class="text-slate-500">联系电话：</span><span class="text-slate-800">${data.contactPhone || '-'}</span></div>
            <div class="col-span-3"><span class="text-slate-500">联系地址：</span><span class="text-slate-800">${data.contactAddress || '-'}</span></div>
            <div class="col-span-3"><span class="text-slate-500">经营范围：</span><span class="text-slate-800">${data.businessScope || '-'}</span></div>
          </div>
        </div>

        <!-- 法人信息 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">法人信息</h3>
          </div>
          <div class="grid grid-cols-3 gap-x-6 gap-y-3 text-sm">
            <div><span class="text-slate-500">法人姓名：</span><span class="text-slate-800">${data.legalName || data.legalRep || '-'}</span></div>
            <div><span class="text-slate-500">法人身份证号码：</span><span class="text-slate-800 font-mono">${data.legalIdCard || '-'}</span></div>
            <div><span class="text-slate-500">法人手机号码：</span><span class="text-slate-800">${data.legalPhone || '-'}</span></div>
            <div><span class="text-slate-500">身份证有效期起：</span><span class="text-slate-800">${data.legalIdValidFrom || '-'}</span></div>
            <div class="col-span-2"><span class="text-slate-500">身份证有效期止：</span><span class="text-slate-800">${data.legalIdValidTo || '-'}</span></div>
          </div>
        </div>

        <!-- 股权结构说明 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">股权结构说明</h3>
          </div>
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-2 whitespace-nowrap">股东名称</th>
                <th class="text-left px-3 py-2 whitespace-nowrap">出资方式</th>
                <th class="text-right px-3 py-2 whitespace-nowrap">认缴出资额</th>
                <th class="text-right px-3 py-2 whitespace-nowrap">持股比例</th>
                <th class="text-left px-3 py-2 whitespace-nowrap">认缴出资时间</th>
              </tr>
            </thead>
            <tbody>
              ${s.length ? s.map(sh => `
                <tr class="border-t border-slate-100">
                  <td class="px-3 py-2.5 text-slate-800">${sh.name || '-'}</td>
                  <td class="px-3 py-2.5 text-slate-700">${sh.type || '-'}</td>
                  <td class="px-3 py-2.5 text-right num-focus">${sh.amount ? sh.amount.toLocaleString() : '-'}</td>
                  <td class="px-3 py-2.5 text-right num-focus">${sh.ratio ? sh.ratio + '%' : '-'}</td>
                  <td class="px-3 py-2.5 text-slate-600">${sh.date || '-'}</td>
                </tr>
              `).join('') : `<tr><td colspan="5" class="py-8 text-center text-slate-400 text-xs">📭 暂无股东信息</td></tr>`}
            </tbody>
          </table>
        </div>

        <!-- 其他信息 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">其他信息</h3>
          </div>
          <div class="space-y-3 text-sm">
            <div>
              <div class="flex items-start gap-2 mb-1">
                <span class="text-slate-500 whitespace-nowrap">客商的历史沿革和其他需要说明的重大事项：</span>
              </div>
              <div class="border border-slate-200 rounded p-3 min-h-[80px] text-slate-700">
                ${data.otherInfo?.history || '（暂无录入）'}
              </div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="flex items-start gap-2 mb-1">
                <span class="text-slate-500 whitespace-nowrap">关联企业情况：</span>
              </div>
              <div class="border border-slate-200 rounded p-3 min-h-[80px] text-slate-700">
                ${data.otherInfo?.relatedEnterprises || '（暂无录入）'}
              </div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
          </div>
        </div>

        <!-- 附件（图1 的 6 类） -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600 text-xs">
                <tr>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/4">附件名称</th>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/3">文件名称</th>
                  <th class="text-right px-3 py-2 whitespace-nowrap w-1/6">操作</th>
                </tr>
              </thead>
              <tbody>
                ${atts.map(a => `
                  <tr class="border-t border-slate-100">
                    <td class="px-3 py-2.5 text-slate-700">${a.required ? '<span class="text-rose-500">*</span> ' : ''}${a.type}</td>
                    <td class="px-3 py-2.5">
                      ${a.files && a.files.length ? a.files.map(f => `
                        <div class="flex items-center gap-2 mb-1">
                          <a href="javascript:void(0)" onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs">${f.name}</a>
                        </div>
                      `).join('') : '<span class="text-slate-400 text-xs">（未上传）</span>'}
                    </td>
                    <td class="px-3 py-2.5 text-right whitespace-nowrap">
                      <button onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs mr-2">查看</button>
                      <button onclick="Utils.toast('文件下载（待对接）','info')" class="text-blue-600 hover:underline text-xs">下载</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  // Tab 2：资质审核（图2）
  function renderQualificationTab() {
    const q = data.qualification;
    if (!q) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 资质审核数据待录入</div>`;
    }
    return `
      <div class="space-y-4">
        <!-- 企业资信情况 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业资信情况</h3>
          </div>
          <div class="space-y-4 text-sm">
            <div>
              <div class="text-slate-500 mb-1">企业涉罚、涉诉、涉法分析：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${q.lawsuitSituation}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="text-slate-500 mb-1">生产经营模式：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${q.businessModel}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="text-slate-500 mb-1">资金结算方式：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${q.fundSettlement}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
          </div>
        </div>

        <!-- 企业资产负债状况 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业资产负债状况（企业最近一期及当期资产负债表（单位：万元））</h3>
          </div>
          ${q.balanceSheet ? `
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-600 text-xs">
                  <tr>
                    <th class="text-left px-3 py-2 whitespace-nowrap w-1/6">科目</th>
                    ${q.balanceSheet.periods.map(p => `<th class="text-left px-3 py-2 whitespace-nowrap w-1/4">${p.start} ~ ${p.end}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>
                  ${q.balanceSheet.rows.map(r => `
                    <tr class="border-t border-slate-100 ${r.isTotal ? 'bg-slate-50 font-semibold' : ''}">
                      <td class="px-3 py-2 text-slate-700">${r.key}</td>
                      ${r.items.map((v, idx) => `<td class="px-3 py-2 num-focus text-slate-700">${v}</td>`).join('')}
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          ` : `
            <div class="border border-dashed border-slate-300 rounded p-8 text-center text-slate-400 text-sm">
              📭 资产负债表暂未提供<br>
              <span class="text-xs">企业尚未补充财务数据 / 监管方正在审核中</span>
            </div>
          `}
        </div>

        <!-- 企业收入及利润状况分析 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业收入及利润状况分析（单位：万元）</h3>
          </div>
          ${q.revenueAnalysis ? `
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-slate-50 text-slate-600 text-xs">
                  <tr>
                    <th class="text-left px-3 py-2 whitespace-nowrap w-1/6">指标</th>
                    ${q.revenueAnalysis.periods.map(p => `<th class="text-left px-3 py-2 whitespace-nowrap w-1/4">${p.start} ~ ${p.end}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>
                  ${q.revenueAnalysis.rows.map(r => `
                    <tr class="border-t border-slate-100">
                      <td class="px-3 py-2 text-slate-700">${r.key}</td>
                      ${r.items.map((v, idx) => `<td class="px-3 py-2 num-focus text-slate-700">${v}</td>`).join('')}
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          ` : `
            <div class="border border-dashed border-slate-300 rounded p-8 text-center text-slate-400 text-sm">
              📭 收入及利润分析暂未提供
            </div>
          `}
        </div>
      </div>
    `;
  }

  // Tab 3：现场考察（图3）
  function renderSiteInspectionTab() {
    const s = data.siteInspection;
    if (!s) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 现场考察数据待录入</div>`;
    }
    return `
      <div class="space-y-4">
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">现场考核情况</h3>
          </div>
          <div>
            <div class="text-slate-500 mb-1">* 现场考核情况说明：</div>
            <div class="border border-slate-200 rounded p-3 min-h-[160px] text-slate-700">${s.situation}</div>
            <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600 text-xs">
                <tr>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/4">附件</th>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/3">文件名称</th>
                  <th class="text-right px-3 py-2 whitespace-nowrap w-1/6">操作</th>
                </tr>
              </thead>
              <tbody>
                ${(s.attachments || []).map(a => `
                  <tr class="border-t border-slate-100">
                    <td class="px-3 py-2.5 text-slate-700">${a.type}</td>
                    <td class="px-3 py-2.5">
                      <a href="javascript:void(0)" onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs">${a.name}</a>
                    </td>
                    <td class="px-3 py-2.5 text-right whitespace-nowrap">
                      <button onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs mr-2">查看</button>
                      <button onclick="Utils.toast('文件下载（待对接）','info')" class="text-blue-600 hover:underline text-xs">下载</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  // Tab 4：风险评估（v1.7.41 重构：结论放顶部 + 准入决议合并）
  // 结构：① 结论 banner（通过/不通过/评估中 + 备注 + 准入决议）→ ② 风险分析 4 块
  function renderRiskAssessmentTab() {
    const r = data.riskAssessment;
    if (!r) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 风险评估数据待录入</div>`;
    }
    // 3 态：pass（绿）/ reject（红）/ pending（蓝，评估中）
    const state = r.conclusion === 'pass' ? 'pass' : (r.conclusion === 'reject' ? 'reject' : 'pending');
    const stateStyle = {
      pass:    { bg: 'bg-gradient-to-r from-emerald-50 to-emerald-100 border-emerald-200', icon: 'bg-emerald-500', text: 'text-emerald-700', textSub: 'text-emerald-600', card: 'text-emerald-700' },
      reject:  { bg: 'bg-gradient-to-r from-rose-50 to-rose-100 border-rose-200',           icon: 'bg-rose-500',    text: 'text-rose-700',    textSub: 'text-rose-600',    card: 'text-rose-700' },
      pending: { bg: 'bg-gradient-to-r from-blue-50 to-blue-100 border-blue-200',            icon: 'bg-blue-500',     text: 'text-blue-700',    textSub: 'text-blue-600',    card: 'text-blue-700' },
    }[state];
    const stateLabel = { pass: '准入通过', reject: '准入驳回', pending: '评估中' }[state];
    const stateIcon  = { pass: '✓', reject: '✕', pending: '◐' }[state];
    // 准入决议数据（从 data.completion 兜底，没有则显示「—」）
    const c = data.completion || {};
    return `
      <div class="space-y-4">
        <!-- 1. 结论 banner（顶部突出） -->
        <div class="rounded-xl p-5 ${stateStyle.bg}">
          <div class="flex items-start gap-4">
            <!-- 大徽章 -->
            <div class="flex-shrink-0 w-20 h-20 rounded-2xl flex flex-col items-center justify-center ${stateStyle.icon} text-white shadow-lg">
              <div class="text-2xl">${stateIcon}</div>
              <div class="text-xs font-semibold mt-0.5">${state === 'pass' ? '通过' : (state === 'reject' ? '不通过' : '评估中')}</div>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-base font-bold ${stateStyle.text}">${stateLabel}</span>
                <span class="text-xs text-slate-500">· 风险评估结论</span>
              </div>
              <!-- 备注 -->
              <div class="text-sm ${stateStyle.text} leading-relaxed mb-3">${r.remark || (state === 'pending' ? '（监管方正在评估，预计 2 个工作日内出具结论）' : '（无备注）')}</div>
              <!-- 准入决议 2 卡（v1.7.43 简化：去建议信用评级/建议授信额度） -->
              <div class="grid grid-cols-2 gap-3 mt-3 max-w-md">
                <div class="bg-white/70 backdrop-blur rounded p-2.5">
                  <div class="text-xs ${stateStyle.textSub} mb-0.5">办结时间</div>
                  <div class="text-sm font-mono ${stateStyle.card}">${c.completionTime || '—'}</div>
                </div>
                <div class="bg-white/70 backdrop-blur rounded p-2.5">
                  <div class="text-xs ${stateStyle.textSub} mb-0.5">操作人</div>
                  <div class="text-sm ${stateStyle.card} truncate">${c.operator || '—'}</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 2. 风险综合分析及揭示 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">风险综合分析及揭示</h3>
          </div>
          <div class="space-y-4 text-sm">
            <div>
              <div class="text-rose-500 mb-1">* 合规风险分析：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700 whitespace-pre-wrap">${r.complianceAnalysis || '（待录入）'}</div>
            </div>
            <div>
              <div class="text-rose-500 mb-1">* 财务风险分析：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700 whitespace-pre-wrap">${r.financialAnalysis || '（待录入）'}</div>
            </div>
          </div>
        </div>

        <!-- 3. 综合性评价和建议 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">综合性评价和建议</h3>
          </div>
          <div class="space-y-4 text-sm">
            <div>
              <div class="text-rose-500 mb-1">* 客商信用的综合评价：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700 whitespace-pre-wrap">${r.creditEvaluation || '（待录入）'}</div>
            </div>
            <div>
              <div class="text-rose-500 mb-1">* 其他：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700 whitespace-pre-wrap">${r.otherNotes || '（待录入）'}</div>
            </div>
          </div>
        </div>

        ${state === 'reject' ? `
        <!-- 4. 补充说明（仅驳回状态可填 - 重新提交时附给监管方） -->
        <div class="bg-rose-50 border border-rose-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-rose-500 rounded"></span>
            <h3 class="text-sm font-semibold text-rose-700">补充说明（重新提交时必填）</h3>
            <span class="ml-auto text-xs text-rose-500">说明您对驳回意见的回应、补充材料或调整措施</span>
          </div>
          <textarea id="resubmit-remark" class="w-full border border-rose-300 rounded p-3 text-sm text-slate-800 min-h-[120px] focus:border-rose-500 focus:ring-2 focus:ring-rose-100 outline-none" placeholder="例如：已增加注册资本至 1500 万元（附件为新营业执照扫描件）；诉讼案件已和解结案（附件为和解协议）；请重新评估。" maxlength="500" oninput="enableResubmit()"></textarea>
          <div class="flex items-center justify-between text-xs mt-1">
            <span class="text-rose-600">⚠ 修改本页内容后，底部「重新提交」按钮将自动启用</span>
            <span class="text-slate-400"><span id="resubmit-remark-count">0</span>/500</span>
          </div>
        </div>
        ` : ''}
      </div>
    `;
  }

  // v1.7.43: 办结 tab 恢复（独立展示），简化字段：办结时间 + 操作人
  // 顶部突出"办结完成"绿色 banner（与风险评估 tab 的结论 banner 风格一致）
  function renderCompletionTab() {
    if (!detail || !detail.completion) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 办结数据待录入</div>`;
    }
    const c = detail.completion || {};
    return `
      <div class="space-y-4">
        <!-- 顶部突出 banner（绿色：办结完成） -->
        <div class="rounded-xl p-6 bg-gradient-to-r from-emerald-50 to-emerald-100 border border-emerald-200">
          <div class="flex items-start gap-4">
            <div class="flex-shrink-0 w-20 h-20 rounded-2xl flex flex-col items-center justify-center bg-emerald-500 text-white shadow-lg">
              <div class="text-2xl">✓</div>
              <div class="text-xs font-semibold mt-0.5">已完成</div>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-base font-bold text-emerald-700">办结完成</span>
                <span class="text-xs text-slate-500">· 准入流程已全部走完</span>
              </div>
              <div class="text-sm text-emerald-700 leading-relaxed mb-4">该客户已完成全部 5 步准入审批流程，准入结论为「通过」。</div>
              <div class="grid grid-cols-2 gap-3 max-w-md">
                <div class="bg-white/70 backdrop-blur rounded p-3">
                  <div class="text-xs text-emerald-600 mb-1">办结时间</div>
                  <div class="text-sm font-mono text-emerald-700">${c.completionTime || '—'}</div>
                </div>
                <div class="bg-white/70 backdrop-blur rounded p-3">
                  <div class="text-xs text-emerald-600 mb-1">操作人</div>
                  <div class="text-sm text-emerald-700 truncate">${c.operator || '—'}</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 流程时间线回顾（v1.7.43 简化版：5 步状态卡片，避免依赖未结构化字段） -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">准入流程回顾</h3>
          </div>
          <div class="grid grid-cols-5 gap-2 text-center text-xs">
            ${[
              { step: 1, name: '基础信息收集' },
              { step: 2, name: '资质审核' },
              { step: 3, name: '现场考察' },
              { step: 4, name: '风险评估' },
              { step: 5, name: '办结' },
            ].map(s => `
              <div class="bg-emerald-50 border border-emerald-200 rounded p-2">
                <div class="w-6 h-6 rounded-full bg-emerald-500 text-white text-xs font-medium inline-flex items-center justify-center mb-1">${s.step}</div>
                <div class="text-slate-700">${s.name}</div>
                <div class="text-emerald-600 text-[10px] mt-0.5">已完成</div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- 准入决议回看（指向风险评估 tab 的链接） -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">准入决议</h3>
          </div>
          <div class="text-sm text-slate-700 leading-relaxed mb-3">${detail.riskAssessment?.remark || '（无备注）'}</div>
          <button onclick="switchTab('riskAssessment')" class="text-sm text-blue-600 hover:underline">查看风险评估详情 →</button>
        </div>
      </div>
    `;
  }
  // ============ 底部固定操作栏（v1.7.42：仅驳回状态显示，含"重新提交"+"返回"） ============
  const isRejected = data.status === 'rejected' || data.applyResult === '不通过';
  function renderFooter() {
    if (!isRejected) return '';
    return `
      <div class="footer-spacer"></div>
      <div class="footer-actions">
        <div class="max-w-[1280px] mx-auto px-6 flex items-center justify-center gap-4">
          <button id="btn-resubmit" onclick="submitResubmit()" disabled class="px-12 py-2.5 bg-rose-600 text-white rounded text-sm font-medium opacity-50 cursor-not-allowed flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            重新提交
          </button>
          <button onclick="cancelResubmit()" class="px-12 py-2.5 border border-slate-300 text-slate-700 hover:bg-slate-50 rounded text-sm font-medium">返回列表</button>
        </div>
      </div>
    `;
  }
  // 兼容 footer 样式（admission-create 已有 .footer-actions + .footer-spacer）

  // ============ 主渲染 ============
  function render() {
    let tabContent = '';
    if (currentTab === 'basic')           tabContent = renderBasicTab();
    else if (currentTab === 'qualification')  tabContent = renderQualificationTab();
    else if (currentTab === 'siteInspection') tabContent = renderSiteInspectionTab();
    else if (currentTab === 'riskAssessment') tabContent = renderRiskAssessmentTab();
    else if (currentTab === 'completion')     tabContent = renderCompletionTab();

    return `
      ${renderStepBar()}
      ${renderTabs()}
      <div class="transition-all">${tabContent}</div>
      ${renderFooter()}
    `;
  }

  // v1.7.40: 不通过状态时顶部加红色"驳回原因"banner
  function renderHeader() {
    const isRejected = data.status === 'rejected' || data.applyResult === '不通过';
    return `
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <a href="${Utils.nav('/customer/admission')}" class="flex items-center gap-1 text-slate-600 hover:text-blue-600 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回准入申请
          </a>
          <div class="w-8 h-8 rounded-full ${isRejected ? 'bg-rose-100 text-rose-600' : 'bg-blue-100 text-blue-600'} flex items-center justify-center font-medium">${isRejected ? '驳' : '准'}</div>
          <div>
            <h2 class="text-base font-bold text-slate-800">${data.companyName || data.customer || urlId.toUpperCase()}</h2>
            <p class="text-xs text-slate-500 font-mono">业务编号 ${urlId.toUpperCase()} · 当前节点：${TABS.find(t => t.id === currentTab)?.name || '基础信息收集'}</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="px-2 py-0.5 ${
            isRejected ? 'bg-rose-100 text-rose-700' :
            (data.status === 'approved' || data.completion ? 'bg-emerald-100 text-emerald-700' :
            'bg-amber-100 text-amber-700')
          } text-xs rounded">${
            isRejected ? '不通过' :
            (data.completion ? '已完成' : (data.applyResult || '审核中'))
          }</span>
        </div>
      </div>
      ${isRejected && data.rejectReason ? `
        <div class="bg-rose-50 border border-rose-200 rounded-xl p-4 mb-4 flex items-start gap-3">
          <svg class="w-5 h-5 text-rose-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          <div class="flex-1">
            <div class="text-sm font-semibold text-rose-700 mb-1">驳回原因（监管方）</div>
            <div class="text-sm text-rose-700">${data.rejectReason}</div>
            ${data.riskAssessment && data.riskAssessment.remark ? `
              <div class="text-xs text-rose-600 mt-2 pt-2 border-t border-rose-200">
                <span class="font-medium">风险评估备注：</span>${data.riskAssessment.remark}
              </div>
            ` : ''}
          </div>
        </div>
      ` : ''}
    `;
  }

  // ============ 全局事件 ============
  window.switchTab = function(tabId) {
    if (!isTabEnabled(tabId)) {
      Utils.toast('该步骤数据暂未录入', 'warning');
      return;
    }
    currentTab = tabId;
    // 更新 URL（便于刷新保留）
    const u = new URL(window.location.href);
    u.searchParams.set('tab', tabId);
    window.history.replaceState({}, '', u.toString());
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '准入详情 - ' + (TABS.find(t => t.id === tabId)?.name || ''),
      currentPath: '/customer/admission',
      breadcrumb: [
        { label: '客户准入', path: '/customer/admission' },
        { label: '准入申请', path: '/customer/admission' },
        { label: '准入详情', path: '/customer/admission-detail' },
      ],
      extra: '',
      content: renderHeader() + render(),
    });
  };

  // ============ v1.7.42 重新提交相关全局事件 ============
  // 监听 textarea 输入 → 启用「重新提交」按钮 + 字数计数
  window.enableResubmit = function() {
    const ta = document.getElementById('resubmit-remark');
    const btn = document.getElementById('btn-resubmit');
    const counter = document.getElementById('resubmit-remark-count');
    if (counter && ta) counter.textContent = ta.value.length;
    if (btn) {
      const hasContent = ta && ta.value.trim().length > 0;
      if (hasContent) {
        btn.disabled = false;
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
      } else {
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
      }
    }
  };

  // 提交重新申请
  window.submitResubmit = function() {
    const ta = document.getElementById('resubmit-remark');
    const remark = ta ? ta.value.trim() : '';
    if (!remark) {
      Utils.toast('请先在「补充说明」中填写本次重新提交的理由 / 调整措施', 'warning');
      if (ta) ta.focus();
      return;
    }
    Utils.toast('重新提交成功！已附补充说明发送至监管方重新审核（mock）', 'success', 2500);
    setTimeout(() => {
      window.location.href = Utils.nav('/customer/admission');
    }, 1500);
  };

  // 返回列表
  window.cancelResubmit = function() {
    if (confirm('确定要返回列表吗？已修改的内容将不会保存。')) {
      window.location.href = Utils.nav('/customer/admission');
    }
  };

  // ============ 初始化 ============
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '准入详情 - ' + (TABS.find(t => t.id === currentTab)?.name || ''),
    currentPath: '/customer/admission',
    breadcrumb: [
      { label: '客户准入', path: '/customer/admission' },
      { label: '准入申请', path: '/customer/admission' },
      { label: '准入详情', path: '/customer/admission-detail' },
    ],
    extra: '',
    content: renderHeader() + render(),
  });
</script>
</body>
</html>
