<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>准入详情 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.35 准入详情 - 5 步审批 tab 模式 ============
  // 5 个状态机（tab）：基础信息收集 / 资质审核 / 现场考察 / 风险评估 / 办结
  // URL 参数：?id=adm_001&tab=qualification  默认 tab=基础信息收集

  const urlId = new URLSearchParams(window.location.search).get('id') || 'adm_001';
  const urlTab = new URLSearchParams(window.location.search).get('tab') || 'basic';

  // 5 步 tab 配置
  const TABS = [
    { id: 'basic',          name: '基础信息收集', step: 1 },
    { id: 'qualification',  name: '资质审核',     step: 2 },
    { id: 'siteInspection', name: '现场考察',     step: 3 },
    { id: 'riskAssessment', name: '风险评估',     step: 4 },
    { id: 'completion',     name: '办结',         step: 5 },
  ];

  // 数据回填
  const detail = (MockData.admissionDetail && MockData.admissionDetail[urlId]) || null;
  const summary = (MockData.admissionList || []).find(a => a.id === urlId) || {};
  const data = { ...summary, ...(detail || {}) };

  // 根据数据是否齐全判断 tab 是否可点（基础 tab 永远可点；办结 tab 需有 completion 数据）
  function isTabEnabled(tabId) {
    if (tabId === 'completion') return !!data.completion;
    if (tabId === 'qualification') return !!(detail && detail.qualification);
    if (tabId === 'siteInspection') return !!(detail && detail.siteInspection);
    if (tabId === 'riskAssessment') return !!(detail && detail.riskAssessment);
    return true;  // basic 永远可点
  }

  // 当前 tab 状态
  let currentTab = TABS.find(t => t.id === urlTab) ? urlTab : 'basic';

  // ============ 渲染函数 ============

  // 步骤条（顶部固定）
  function renderStepBar() {
    return `
      <div class="bg-white border border-slate-200 rounded-xl px-8 py-6 mb-4">
        <div class="flex items-center justify-between max-w-4xl mx-auto">
          ${TABS.map((t, i) => {
            const active = t.id === currentTab;
            return `
              <div class="flex items-center ${i < TABS.length - 1 ? 'flex-1' : ''}">
                <div class="flex flex-col items-center">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-medium ${active ? 'bg-blue-600 text-white' : 'bg-blue-100 text-blue-600'}">
                    ${t.step}
                  </div>
                  <div class="text-xs mt-2 ${active ? 'text-blue-600 font-medium' : 'text-slate-500'}">${t.name}</div>
                </div>
                ${i < TABS.length - 1 ? `<div class="flex-1 h-0.5 mx-2 mb-6 ${t.step < (TABS.find(x => x.id === currentTab)?.step || 0) ? 'bg-blue-300' : 'bg-slate-200'}"></div>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // Tab 切换
  function renderTabs() {
    return `
      <div class="bg-white border border-slate-200 rounded-xl mb-3 px-4 overflow-x-auto">
        <div class="flex items-center gap-1">
          ${TABS.map(t => {
            const active = t.id === currentTab;
            const enabled = isTabEnabled(t.id);
            return `
              <button
                onclick="switchTab('${t.id}')"
                class="px-4 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition ${active ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-700'} ${!enabled ? 'opacity-40 cursor-not-allowed' : ''}"
                ${!enabled ? 'disabled' : ''}
                title="${!enabled ? '该步骤数据待录入' : ''}"
              >
                ${t.step}. ${t.name}
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // ============ 5 个 tab 内容渲染器 ============

  // Tab 1：基础信息收集（图1）
  function renderBasicTab() {
    const s = data.shareholders || [];
    const atts = data.attachments || [];
    return `
      <div class="space-y-4">
        <!-- 企业基本信息 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业基本信息</h3>
          </div>
          <div class="grid grid-cols-3 gap-x-6 gap-y-3 text-sm">
            <div><span class="text-slate-500">企业名称：</span><span class="text-slate-800">${data.companyName || data.customer || '-'}</span></div>
            <div><span class="text-slate-500">社会统一信用代码：</span><span class="text-slate-800 font-mono">${data.creditCode || '-'}</span></div>
            <div><span class="text-slate-500">企业简称：</span><span class="text-slate-800">${data.shortName || '-'}</span></div>
            <div><span class="text-slate-500">企业简称首字母：</span><span class="text-slate-800">${data.shortNamePinyin || '-'}</span></div>
            <div><span class="text-slate-500">成立日期：</span><span class="text-slate-800">${data.established || '-'}</span></div>
            <div><span class="text-slate-500">企业性质：</span><span class="text-slate-800">${data.nature || '-'}</span></div>
            <div><span class="text-slate-500">营业期限：</span><span class="text-slate-800">${data.businessDeadline || '-'}</span></div>
            <div class="col-span-2"><span class="text-slate-500">注册地址：</span><span class="text-slate-800">${data.registeredAddress || '-'}</span></div>
            <div><span class="text-slate-500">所属行业：</span><span class="text-slate-800">${data.industry || '-'}</span></div>
            <div><span class="text-slate-500">注册资本：</span><span class="text-slate-800">${data.registeredCapital || '-'}</span></div>
            <div><span class="text-slate-500">是否在续期：</span><span class="text-slate-800">${data.inRenewal ? '是' : '否'}</span></div>
            <div><span class="text-slate-500">联系电话：</span><span class="text-slate-800">${data.contactPhone || '-'}</span></div>
            <div class="col-span-3"><span class="text-slate-500">联系地址：</span><span class="text-slate-800">${data.contactAddress || '-'}</span></div>
            <div class="col-span-3"><span class="text-slate-500">经营范围：</span><span class="text-slate-800">${data.businessScope || '-'}</span></div>
          </div>
        </div>

        <!-- 法人信息 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">法人信息</h3>
          </div>
          <div class="grid grid-cols-3 gap-x-6 gap-y-3 text-sm">
            <div><span class="text-slate-500">法人姓名：</span><span class="text-slate-800">${data.legalName || data.legalRep || '-'}</span></div>
            <div><span class="text-slate-500">法人身份证号码：</span><span class="text-slate-800 font-mono">${data.legalIdCard || '-'}</span></div>
            <div><span class="text-slate-500">法人手机号码：</span><span class="text-slate-800">${data.legalPhone || '-'}</span></div>
            <div><span class="text-slate-500">身份证有效期起：</span><span class="text-slate-800">${data.legalIdValidFrom || '-'}</span></div>
            <div class="col-span-2"><span class="text-slate-500">身份证有效期止：</span><span class="text-slate-800">${data.legalIdValidTo || '-'}</span></div>
          </div>
        </div>

        <!-- 股权结构说明 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">股权结构说明</h3>
          </div>
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-600 text-xs">
              <tr>
                <th class="text-left px-3 py-2 whitespace-nowrap">股东名称</th>
                <th class="text-left px-3 py-2 whitespace-nowrap">出资方式</th>
                <th class="text-right px-3 py-2 whitespace-nowrap">认缴出资额</th>
                <th class="text-right px-3 py-2 whitespace-nowrap">持股比例</th>
                <th class="text-left px-3 py-2 whitespace-nowrap">认缴出资时间</th>
              </tr>
            </thead>
            <tbody>
              ${s.length ? s.map(sh => `
                <tr class="border-t border-slate-100">
                  <td class="px-3 py-2.5 text-slate-800">${sh.name || '-'}</td>
                  <td class="px-3 py-2.5 text-slate-700">${sh.type || '-'}</td>
                  <td class="px-3 py-2.5 text-right num-focus">${sh.amount ? sh.amount.toLocaleString() : '-'}</td>
                  <td class="px-3 py-2.5 text-right num-focus">${sh.ratio ? sh.ratio + '%' : '-'}</td>
                  <td class="px-3 py-2.5 text-slate-600">${sh.date || '-'}</td>
                </tr>
              `).join('') : `<tr><td colspan="5" class="py-8 text-center text-slate-400 text-xs">📭 暂无股东信息</td></tr>`}
            </tbody>
          </table>
        </div>

        <!-- 其他信息 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">其他信息</h3>
          </div>
          <div class="space-y-3 text-sm">
            <div>
              <div class="flex items-start gap-2 mb-1">
                <span class="text-slate-500 whitespace-nowrap">客商的历史沿革和其他需要说明的重大事项：</span>
              </div>
              <div class="border border-slate-200 rounded p-3 min-h-[80px] text-slate-700">
                ${data.otherInfo?.history || '（暂无录入）'}
              </div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="flex items-start gap-2 mb-1">
                <span class="text-slate-500 whitespace-nowrap">关联企业情况：</span>
              </div>
              <div class="border border-slate-200 rounded p-3 min-h-[80px] text-slate-700">
                ${data.otherInfo?.relatedEnterprises || '（暂无录入）'}
              </div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
          </div>
        </div>

        <!-- 附件（图1 的 6 类） -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600 text-xs">
                <tr>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/4">附件名称</th>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/3">文件名称</th>
                  <th class="text-right px-3 py-2 whitespace-nowrap w-1/6">操作</th>
                </tr>
              </thead>
              <tbody>
                ${atts.map(a => `
                  <tr class="border-t border-slate-100">
                    <td class="px-3 py-2.5 text-slate-700">${a.required ? '<span class="text-rose-500">*</span> ' : ''}${a.type}</td>
                    <td class="px-3 py-2.5">
                      ${a.files && a.files.length ? a.files.map(f => `
                        <div class="flex items-center gap-2 mb-1">
                          <a href="javascript:void(0)" onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs">${f.name}</a>
                        </div>
                      `).join('') : '<span class="text-slate-400 text-xs">（未上传）</span>'}
                    </td>
                    <td class="px-3 py-2.5 text-right whitespace-nowrap">
                      <button onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs mr-2">查看</button>
                      <button onclick="Utils.toast('文件下载（待对接）','info')" class="text-blue-600 hover:underline text-xs">下载</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  // Tab 2：资质审核（图2）
  function renderQualificationTab() {
    const q = data.qualification;
    if (!q) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 资质审核数据待录入</div>`;
    }
    return `
      <div class="space-y-4">
        <!-- 企业资信情况 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业资信情况</h3>
          </div>
          <div class="space-y-4 text-sm">
            <div>
              <div class="text-slate-500 mb-1">企业涉罚、涉诉、涉法分析：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${q.lawsuitSituation}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="text-slate-500 mb-1">生产经营模式：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${q.businessModel}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="text-slate-500 mb-1">资金结算方式：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${q.fundSettlement}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
          </div>
        </div>

        <!-- 企业资产负债状况 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业资产负债状况（企业最近一期及当期资产负债表（单位：万元））</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600 text-xs">
                <tr>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/6">科目</th>
                  ${q.balanceSheet.periods.map(p => `<th class="text-left px-3 py-2 whitespace-nowrap w-1/4">${p.start} ~ ${p.end}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${q.balanceSheet.rows.map(r => `
                  <tr class="border-t border-slate-100 ${r.isTotal ? 'bg-slate-50 font-semibold' : ''}">
                    <td class="px-3 py-2 text-slate-700">${r.key}</td>
                    ${r.items.map((v, idx) => `<td class="px-3 py-2 num-focus text-slate-700">${v}</td>`).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- 企业收入及利润状况分析 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">企业收入及利润状况分析（单位：万元）</h3>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600 text-xs">
                <tr>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/6">指标</th>
                  ${q.revenueAnalysis.periods.map(p => `<th class="text-left px-3 py-2 whitespace-nowrap w-1/4">${p.start} ~ ${p.end}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${q.revenueAnalysis.rows.map(r => `
                  <tr class="border-t border-slate-100">
                    <td class="px-3 py-2 text-slate-700">${r.key}</td>
                    ${r.items.map((v, idx) => `<td class="px-3 py-2 num-focus text-slate-700">${v}</td>`).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  // Tab 3：现场考察（图3）
  function renderSiteInspectionTab() {
    const s = data.siteInspection;
    if (!s) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 现场考察数据待录入</div>`;
    }
    return `
      <div class="space-y-4">
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">现场考核情况</h3>
          </div>
          <div>
            <div class="text-slate-500 mb-1">* 现场考核情况说明：</div>
            <div class="border border-slate-200 rounded p-3 min-h-[160px] text-slate-700">${s.situation}</div>
            <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-600 text-xs">
                <tr>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/4">附件</th>
                  <th class="text-left px-3 py-2 whitespace-nowrap w-1/3">文件名称</th>
                  <th class="text-right px-3 py-2 whitespace-nowrap w-1/6">操作</th>
                </tr>
              </thead>
              <tbody>
                ${(s.attachments || []).map(a => `
                  <tr class="border-t border-slate-100">
                    <td class="px-3 py-2.5 text-slate-700">${a.type}</td>
                    <td class="px-3 py-2.5">
                      <a href="javascript:void(0)" onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs">${a.name}</a>
                    </td>
                    <td class="px-3 py-2.5 text-right whitespace-nowrap">
                      <button onclick="Utils.toast('文件预览（待对接）','info')" class="text-blue-600 hover:underline text-xs mr-2">查看</button>
                      <button onclick="Utils.toast('文件下载（待对接）','info')" class="text-blue-600 hover:underline text-xs">下载</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  // Tab 4：风险评估（图4）
  function renderRiskAssessmentTab() {
    const r = data.riskAssessment;
    if (!r) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 风险评估数据待录入</div>`;
    }
    return `
      <div class="space-y-4">
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">风险综合分析及揭示</h3>
          </div>
          <div class="space-y-4 text-sm">
            <div>
              <div class="text-rose-500 mb-1">* 合规风险分析：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${r.complianceAnalysis}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="text-rose-500 mb-1">* 财务风险分析：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${r.financialAnalysis}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">综合性评价和建议</h3>
          </div>
          <div class="space-y-4 text-sm">
            <div>
              <div class="text-rose-500 mb-1">* 客商信用的综合评价：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${r.creditEvaluation}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
            <div>
              <div class="text-rose-500 mb-1">* 其他：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${r.otherNotes}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">结论</h3>
          </div>
          <div class="text-sm space-y-3">
            <div class="flex items-center gap-6">
              <span class="text-rose-500">* 是否通过：</span>
              <label class="flex items-center gap-1">
                <input type="radio" name="conclusion" ${r.conclusion === 'pass' ? 'checked' : ''} disabled class="text-blue-600">
                <span class="${r.conclusion === 'pass' ? 'text-blue-700 font-medium' : 'text-slate-700'}">通过</span>
              </label>
              <label class="flex items-center gap-1">
                <input type="radio" name="conclusion" ${r.conclusion === 'reject' ? 'checked' : ''} disabled class="text-blue-600">
                <span class="${r.conclusion === 'reject' ? 'text-rose-700 font-medium' : 'text-slate-700'}">不通过</span>
              </label>
            </div>
            <div>
              <div class="text-slate-500 mb-1">备注：</div>
              <div class="border border-slate-200 rounded p-3 min-h-[100px] text-slate-700">${r.remark}</div>
              <div class="text-right text-xs text-slate-400 mt-1">已输入 0/100</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  // Tab 5：办结（v1.7.35 新增总结页，按用户要求自行设计）
  // 结构：申请概览 → 4 步结果 → 审核时间线 → 准入决议 → 后续动作
  function renderCompletionTab() {
    const c = data.completion;
    if (!c) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-500">📭 办结数据待录入</div>`;
    }

    // 4 步结果（按 data 是否齐全 + 风险评估的 conclusion 推算）
    const stepResults = [
      { step: 1, name: '基础信息收集', sub: '企业基本信息 + 法人 + 股东 + 6 类附件', pass: true,
        operator: '陈志强（操作人）', time: '2025-01-04 10:23' },
      { step: 2, name: '资质审核',     sub: '涉诉分析 + 资产负债 24 行 + 收入分析 8 行', pass: !!(data.qualification),
        operator: '李雪（监管方审核）', time: '2025-01-08 14:15' },
      { step: 3, name: '现场考察',     sub: '现场考核情况说明 + 1 份考察报告', pass: !!(data.siteInspection),
        operator: '张文（监管方现场）', time: '2025-01-15 17:30' },
      { step: 4, name: '风险评估',     sub: '合规/财务分析 + 综合评价 + 结论', pass: (data.riskAssessment && data.riskAssessment.conclusion === 'pass'),
        operator: '王芳（监管方风控）', time: '2025-01-19 11:20' },
    ];

    return `
      <div class="space-y-4">
        <!-- 1. 申请概览 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-4">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">准入申请概览</h3>
            <span class="ml-auto px-2 py-0.5 ${c.conclusion === '通过' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'} text-xs rounded">最终结论：${c.conclusion}</span>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <div>
              <div class="text-xs text-slate-500 mb-1">业务编号</div>
              <div class="text-slate-800 font-mono">${urlId.toUpperCase()}</div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">申请企业</div>
              <div class="text-slate-800">${data.companyName || data.customer || '-'}</div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">申请人 / 操作人</div>
              <div class="text-slate-800">${data.drafter || '陈志强'}</div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">盖章人</div>
              <div class="text-slate-800">${data.sealUser || '李雪'}</div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">申请日期</div>
              <div class="text-slate-800 font-mono">${data.applyDate || '2025-01-04'}</div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">办结日期</div>
              <div class="text-slate-800 font-mono">${(c.completionTime || '').slice(0, 10) || '2025-01-20'}</div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">办结操作人</div>
              <div class="text-slate-800">${c.operator || '-'}</div>
            </div>
            <div>
              <div class="text-xs text-slate-500 mb-1">流程时长</div>
              <div class="text-slate-800">16 天</div>
            </div>
          </div>
        </div>

        <!-- 2. 4 步结果汇总 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-4">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">4 步审核结果</h3>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${stepResults.map(s => `
              <div class="border ${s.pass ? 'border-emerald-200 bg-emerald-50/30' : 'border-slate-200 bg-slate-50'} rounded p-3">
                <div class="flex items-center gap-2 mb-1">
                  <span class="w-6 h-6 rounded-full ${s.pass ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'} text-xs flex items-center justify-center font-medium">${s.step}</span>
                  <span class="text-sm font-medium ${s.pass ? 'text-emerald-700' : 'text-slate-600'}">${s.name}</span>
                  <span class="ml-auto text-xs ${s.pass ? 'text-emerald-600' : 'text-slate-500'} font-medium">${s.pass ? '✓ 已通过' : '⏳ 未通过'}</span>
                </div>
                <div class="text-xs text-slate-500 ml-8">${s.sub}</div>
                <div class="flex items-center gap-3 text-xs text-slate-500 mt-2 ml-8">
                  <span>审核人：${s.operator}</span>
                  <span>·</span>
                  <span class="font-mono">${s.time}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- 3. 审核时间线 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-4">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">审核时间线</h3>
          </div>
          <div class="relative pl-6">
            <div class="absolute left-2 top-2 bottom-2 w-0.5 bg-slate-200"></div>
            ${stepResults.map((s, i) => `
              <div class="relative pb-5 ${i === stepResults.length - 1 ? '' : ''}">
                <div class="absolute -left-[18px] top-1 w-4 h-4 rounded-full ${s.pass ? 'bg-emerald-500' : 'bg-slate-300'} border-2 border-white"></div>
                <div class="text-sm">
                  <span class="font-medium text-slate-800">第 ${s.step} 步：${s.name}</span>
                  <span class="ml-2 text-xs ${s.pass ? 'text-emerald-600' : 'text-slate-500'}">${s.pass ? '通过' : '未通过'}</span>
                </div>
                <div class="text-xs text-slate-500 mt-0.5">
                  <span class="font-mono">${s.time}</span>
                  <span class="mx-1">·</span>
                  <span>${s.operator}</span>
                </div>
                <div class="text-xs text-slate-600 mt-1">${s.sub}</div>
              </div>
            `).join('')}
            <!-- 办结节点 -->
            <div class="relative">
              <div class="absolute -left-[18px] top-1 w-4 h-4 rounded-full ${c.conclusion === '通过' ? 'bg-blue-500' : 'bg-rose-500'} border-2 border-white"></div>
              <div class="text-sm">
                <span class="font-medium text-slate-800">办结：${c.conclusion === '通过' ? '准入通过' : '准入驳回'}</span>
                <span class="ml-2 text-xs ${c.conclusion === '通过' ? 'text-blue-600' : 'text-rose-600'}">${c.conclusion}</span>
              </div>
              <div class="text-xs text-slate-500 mt-0.5">
                <span class="font-mono">${c.completionTime || '2025-01-20 16:45:00'}</span>
                <span class="mx-1">·</span>
                <span>${c.operator || '王芳（监管方风控经理）'}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 4. 准入决议 -->
        <div class="bg-white border border-slate-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-4">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-slate-700">准入决议</h3>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
            <div class="border border-slate-200 rounded p-3">
              <div class="text-xs text-slate-500 mb-1">最终结论</div>
              <div class="text-lg ${c.conclusion === '通过' ? 'text-emerald-600' : 'text-rose-600'} font-bold">${c.conclusion}</div>
            </div>
            <div class="border border-slate-200 rounded p-3">
              <div class="text-xs text-slate-500 mb-1">建议信用评级</div>
              <div class="text-lg text-slate-800 font-bold">${c.creditRating || '-'}</div>
            </div>
            <div class="border border-slate-200 rounded p-3">
              <div class="text-xs text-slate-500 mb-1">建议授信额度</div>
              <div class="text-lg text-slate-800 font-bold">${c.suggestedLimit || '-'}</div>
            </div>
            <div class="border border-slate-200 rounded p-3">
              <div class="text-xs text-slate-500 mb-1">办结时间</div>
              <div class="text-sm text-slate-800 font-mono">${c.completionTime || '-'}</div>
            </div>
          </div>
        </div>

        <!-- 5. 后续动作（蓝底） -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-5">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-1 h-4 bg-blue-500 rounded"></span>
            <h3 class="text-sm font-semibold text-blue-700">后续动作</h3>
          </div>
          <div class="text-sm text-slate-700 leading-relaxed">${c.nextSteps || '-'}</div>
        </div>
      </div>
    `;
  }

  // ============ 主渲染 ============
  function render() {
    let tabContent = '';
    if (currentTab === 'basic')           tabContent = renderBasicTab();
    else if (currentTab === 'qualification')  tabContent = renderQualificationTab();
    else if (currentTab === 'siteInspection') tabContent = renderSiteInspectionTab();
    else if (currentTab === 'riskAssessment') tabContent = renderRiskAssessmentTab();
    else if (currentTab === 'completion')     tabContent = renderCompletionTab();

    return `
      ${renderStepBar()}
      ${renderTabs()}
      <div class="transition-all">${tabContent}</div>
    `;
  }

  // ============ 顶部 header（始终显示当前 tab 名 + 状态） ============
  function renderHeader() {
    return `
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <a href="${Utils.nav('/customer/admission')}" class="flex items-center gap-1 text-slate-600 hover:text-blue-600 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回准入申请
          </a>
          <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-medium">准</div>
          <div>
            <h2 class="text-base font-bold text-slate-800">${data.companyName || data.customer || urlId.toUpperCase()}</h2>
            <p class="text-xs text-slate-500 font-mono">业务编号 ${urlId.toUpperCase()} · 当前节点：${TABS.find(t => t.id === currentTab)?.name || '基础信息收集'}</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <span class="px-2 py-0.5 ${data.status === 'approved' || data.completion ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'} text-xs rounded">${data.completion ? '已完成' : (data.applyResult || '审核中')}</span>
        </div>
      </div>
    `;
  }

  // ============ 全局事件 ============
  window.switchTab = function(tabId) {
    if (!isTabEnabled(tabId)) {
      Utils.toast('该步骤数据暂未录入', 'warning');
      return;
    }
    currentTab = tabId;
    // 更新 URL（便于刷新保留）
    const u = new URL(window.location.href);
    u.searchParams.set('tab', tabId);
    window.history.replaceState({}, '', u.toString());
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '准入详情 - ' + (TABS.find(t => t.id === tabId)?.name || ''),
      currentPath: '/customer/admission',
      breadcrumb: [
        { label: '客户准入', path: '/customer/admission' },
        { label: '准入申请', path: '/customer/admission' },
        { label: '准入详情', path: '/customer/admission-detail' },
      ],
      extra: '',
      content: renderHeader() + render(),
    });
  };

  // ============ 初始化 ============
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '准入详情 - ' + (TABS.find(t => t.id === currentTab)?.name || ''),
    currentPath: '/customer/admission',
    breadcrumb: [
      { label: '客户准入', path: '/customer/admission' },
      { label: '准入申请', path: '/customer/admission' },
      { label: '准入详情', path: '/customer/admission-detail' },
    ],
    extra: '',
    content: renderHeader() + render(),
  });
</script>
</body>
</html>
