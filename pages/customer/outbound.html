<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  // GitHub Pages 子路径部署 vs Vercel 根路径部署
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解押/出库申请 - 大河智链</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
<link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();
  document.getElementById('app').innerHTML = Components.pageShell({
    title: '解押 / 出库申请',
    currentPath: '/customer/outbound',
    breadcrumb: [{ label: '出库与还款', path: '/customer/outbound' }, '解押/出库'],
    extra: `<div class="flex gap-2">
      <button onclick="createRepayment()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-md text-sm font-medium flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        阶段A：还款登记
      </button>
      <button onclick="createRelease()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md text-sm font-medium flex items-center gap-1" disabled title="需先完成还款登记">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        阶段B：解押申请
      </button>
    </div>`,
    content: `
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6 text-sm text-amber-800">
        <span class="font-medium">⚠ v1.7 重大调整（按甲方 drawio）：</span>解押流程拆为<strong>两个独立阶段</strong>，顺序不可颠倒：<br>
        <strong>阶段 A · 还款登记（货主方 + 资金方）</strong>：试算 → 线下还款 → 货主上传电子回单 → 资金方确认<br>
        <strong>阶段 B · 解押申请（货主方 + 监管方 + 担保方）</strong>：新增申请 → 货主盖章① → 监管方审核 → 货主盖章② → 担保方审核<br>
        <span class="text-xs text-amber-700">💡 阴需：系统无实际扣款能力，所有"资金流转"都是线下完成+系统流程化登记</span>
      </div>

      <!-- 步骤进度（v1.7 两阶段） -->
      <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
        <div class="grid grid-cols-2 gap-4">
          <div class="border-2 border-emerald-200 rounded-lg p-4 bg-emerald-50/30">
            <div class="text-xs font-semibold text-emerald-700 mb-2">📌 阶段 A · 还款登记（货主方+资金方）</div>
            <div class="flex items-center gap-1 text-xs text-slate-600">
              <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded">1.试算</span>→
              <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded">2.线下还款</span>→
              <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded">3.上传回单</span>→
              <span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded">4.资金方确认</span>
            </div>
          </div>
          <div class="border-2 border-blue-200 rounded-lg p-4 bg-blue-50/30">
            <div class="text-xs font-semibold text-blue-700 mb-2">📌 阶段 B · 解押申请（货主方+监管方+担保方）</div>
            <div class="flex items-center gap-1 text-xs text-slate-600">
              <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded">1.新增申请</span>→
              <span class="px-2 py-0.5 bg-amber-100 text-amber-700 rounded">2.货主盖章①</span>→
              <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded">3.监管审核</span>→
              <span class="px-2 py-0.5 bg-amber-100 text-amber-700 rounded">4.货主盖章②</span>→
              <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded">5.担保审核</span>→
              <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded">6.出库</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 阶段A 还款登记列表 -->
      <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
        <span class="w-1 h-4 bg-emerald-500 rounded"></span>
        阶段A · 还款登记记录
      </h3>
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden mb-6">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">登记编号</th>
              <th class="text-left px-4 py-3">业务编号</th>
              <th class="text-left px-4 py-3">货品</th>
              <th class="text-right px-4 py-3">线下还款金额</th>
              <th class="text-left px-4 py-3">线下方式</th>
              <th class="text-center px-4 py-3">资金方确认</th>
              <th class="text-center px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            ${MockData.repaymentRecords.map(r => `
              <tr class="border-t border-slate-100">
                <td class="px-4 py-3 font-mono text-xs">${r.id}</td>
                <td class="px-4 py-3 font-mono text-xs text-blue-600">${r.bizNo}</td>
                <td class="px-4 py-3">${r.product}</td>
                <td class="px-4 py-3 text-right num-focus font-bold text-emerald-600">${Utils.fmtMoney(r.offLineAmount)}</td>
                <td class="px-4 py-3 text-xs">${r.offLineMethod}</td>
                <td class="px-4 py-3 text-center">${r.fundingConfirmed ? '<span class="text-xs text-emerald-600">✓ 已确认</span>' : '<span class="text-xs text-amber-600">⏳ 待确认</span>'}</td>
                <td class="px-4 py-3 text-center">
                  <button class="text-blue-600 hover:underline text-xs mr-2">查看回单</button>
                  ${!r.fundingConfirmed ? '<button class="text-emerald-600 hover:underline text-xs">去解押申请 →</button>' : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <!-- 阶段B 解押申请列表 -->
      <h3 class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
        <span class="w-1 h-4 bg-blue-500 rounded"></span>
        阶段B · 解押申请记录
      </h3>
      <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th class="text-left px-4 py-3">解押单号</th>
              <th class="text-left px-4 py-3">业务编号</th>
              <th class="text-left px-4 py-3">货品</th>
              <th class="text-right px-4 py-3">解押重量</th>
              <th class="text-right px-4 py-3">应还本金</th>
              <th class="text-center px-4 py-3">货主方盖章进度</th>
              <th class="text-center px-4 py-3">状态</th>
              <th class="text-center px-4 py-3">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr class="border-t border-slate-100">
              <td class="px-4 py-3 font-mono text-xs">REL_20260708001</td>
              <td class="px-4 py-3 font-mono text-xs text-blue-600">DHZL_JMY_2026012701</td>
              <td class="px-4 py-3">冷冻带骨绵羊腰脊排</td>
              <td class="px-4 py-3 text-right num-focus">1,072.99 kg</td>
              <td class="px-4 py-3 text-right num-focus font-bold text-blue-600">¥32,082.40</td>
              <td class="px-4 py-3 text-center"><span class="text-xs text-amber-600">⏳ 待盖章①</span></td>
              <td class="px-4 py-3 text-center">${Components.badge('pending_owner_seal')}</td>
              <td class="px-4 py-3 text-center"><button class="text-amber-600 hover:underline text-xs font-medium">去盖章① →</button></td>
            </tr>
            <tr class="border-t border-slate-100">
              <td class="px-4 py-3 font-mono text-xs">REL_20260528001</td>
              <td class="px-4 py-3 font-mono text-xs text-blue-600">DHZL_JMY_2026050901</td>
              <td class="px-4 py-3">水煮山羊肉</td>
              <td class="px-4 py-3 text-right num-focus">3,900 kg</td>
              <td class="px-4 py-3 text-right num-focus">¥196,560.00</td>
              <td class="px-4 py-3 text-center"><span class="text-xs text-emerald-600">✓ 双章齐全</span></td>
              <td class="px-4 py-3 text-center">${Components.badge('repaid')}</td>
              <td class="px-4 py-3 text-center"><button class="text-emerald-600 hover:underline text-xs">已出库</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    `
  });

  function createRepayment() {
    const modal = document.createElement('div');
    modal.className = 'modal-backdrop';
    modal.innerHTML = `
      <div class="bg-white rounded-xl w-[700px] max-h-[90vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
        <div class="px-6 py-4 border-b border-slate-200 sticky top-0 bg-white">
          <h3 class="font-bold text-slate-800 text-lg">📌 阶段 A · 还款登记（独立子流程）</h3>
          <p class="text-xs text-slate-500 mt-1">系统无实际扣款能力，货主方线下完成还款后，登记实际金额+上传回单，等待资金方确认</p>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="block text-xs text-slate-600 mb-1">选择拟解押质押业务 <span class="text-red-500">*</span></label>
            <select class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
              ${MockData.pledgeLedger.map(b => `<option>${b.bizNo} | ${b.product} | 货值 ${Utils.fmtMoney(b.evaluateValue)} | 剩余债务 ${Utils.fmtMoney(b.remainingDebt)}</option>`).join('')}
            </select>
          </div>

          <div class="bg-blue-50 rounded-lg p-4 text-sm">
            <div class="font-semibold text-blue-800 mb-2">💰 系统试算应还款（仅供参考）</div>
            <div class="grid grid-cols-2 gap-2 text-xs">
              <div class="flex justify-between"><span class="text-slate-500">评估单价（入库时）：</span><span class="font-mono">¥63.00/kg</span></div>
              <div class="flex justify-between"><span class="text-slate-500">本次解押重量：</span><span class="font-mono">3,120 kg</span></div>
              <div class="flex justify-between"><span class="text-slate-500">试算应还本金：</span><span class="font-mono font-bold text-blue-700">¥196,560.00</span></div>
            </div>
            <div class="mt-2 text-xs text-amber-700">⚠ 实际还款金额由货主方与资金方线下约定，<strong>可与试算金额不同</strong></div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-xs text-slate-600 mb-1">线下实际还款金额 <span class="text-red-500">*</span></label>
              <input type="text" value="¥196,560.00" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm font-bold text-emerald-600 num-focus">
            </div>
            <div><label class="block text-xs text-slate-600 mb-1">还款方式 <span class="text-red-500">*</span></label>
              <select class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                <option>银行转账</option><option>银行汇票</option><option>商业汇票</option><option>现金</option>
              </select>
            </div>
            <div><label class="block text-xs text-slate-600 mb-1">还款日期</label>
              <input type="date" value="2026-07-08" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
            </div>
            <div><label class="block text-xs text-slate-600 mb-1">付款账户</label>
              <input type="text" value="6222 XXXX XXXX 1234 567" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm font-mono">
            </div>
          </div>

          <div>
            <label class="block text-xs text-slate-600 mb-1">上传还款电子回单（必须） <span class="text-red-500">*</span></label>
            <div class="border-2 border-dashed border-slate-300 rounded-lg p-4 text-center text-xs text-slate-500 hover:border-blue-400 cursor-pointer">
              📎 点击上传银行回单（PDF/JPG/PNG，最多 5 个文件，每个 ≤ 10MB）<br>
              <span class="text-emerald-600">✓ 已上传：民生银行回单20260708.pdf、电子签购单.png</span>
            </div>
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2 sticky bottom-0 bg-white">
          <button onclick="this.closest('.modal-backdrop').remove()" class="px-4 py-2 border border-slate-300 rounded-md text-sm hover:bg-slate-50">取消</button>
          <button onclick="Utils.toast('还款登记已提交，等待资金方确认后即可发起解押申请','success'); this.closest('.modal-backdrop').remove(); setTimeout(()=>location.reload(),800)" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-md text-sm font-medium">提交登记</button>
        </div>
      </div>
    `;
    modal.onclick = () => modal.remove();
    document.body.appendChild(modal);
  }

  function createRelease() {
    Utils.toast('请先完成阶段A（还款登记）并通过资金方确认，才能发起解押申请', 'warning');
  }
</script>
</body>
</html>
