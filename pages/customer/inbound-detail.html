                    <svg class="w-5 h-5 text-amber-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>

                  </h3>
                  <div class="flex items-center gap-2">
                    <span class="px-2 py-1 text-xs rounded bg-amber-200 text-amber-800 font-medium">当前盖章人</span>
                    <span class="font-medium text-amber-900">${_sealerName}（${_sealer.title}）</span>
                  </div>
                </div>

                ${i.status === 'rejected' ? `
                <!-- 驳回原因提示 -->
                <div class="mb-4 p-3 bg-red-50 border border-red-300 rounded-lg">
                  <div class="flex items-start gap-2">
                    <svg class="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                    <div class="flex-1">
                      <div class="text-sm font-bold text-red-700 mb-1">🔴 此入库申请已被驳回，请重新盖章提交</div>
                      <div class="text-xs text-red-600">驳回原因：${_rejectReason}</div>
                      <div class="text-xs text-red-500 mt-1">驳回方：监管方 · 驳回时间：${i.rejectTime || '2026-07-08 16:45'}</div>
                    </div>
                  </div>
                </div>
                ` : ''}

                ${_sealable ? `
                <!-- 印章选择 -->
                <div class="mb-4">
                  <label class="block text-sm font-semibold text-amber-900 mb-2">印章类型 <span class="text-red-500">*</span></label>
                  <div class="flex flex-wrap gap-3">
                    ${_availableSeals.map((s, idx) => `
                      <label class="cursor-pointer">
                        <input type="radio" name="sealType" value="${s.id}" class="peer sr-only" ${idx === 0 ? 'checked' : ''}>
                        <div class="px-4 py-3 border-2 border-amber-300 rounded-lg peer-checked:border-amber-600 peer-checked:bg-amber-100 hover:border-amber-400 transition">
                          <div class="flex items-center gap-2">
                            <div class="w-10 h-10 rounded-full border-2 border-${s.color === 'red' ? 'red' : 'blue'}-600 flex items-center justify-center text-${s.color === 'red' ? 'red' : 'blue'}-700 font-bold text-xs bg-white">印</div>
                            <div>
                              <div class="font-medium text-sm text-amber-900">${s.name}</div>
                              <div class="text-xs text-amber-700">${s.preview}</div>
                            </div>
                          </div>
                        </div>
                      </label>
                    `).join('')}
                  </div>
                </div>

                <!-- 单据预览 + 拖拽区 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                  <div class="bg-white border-2 border-slate-300 rounded-lg p-4 min-h-[280px]">
                    <div class="flex items-center justify-between mb-3 pb-2 border-b">
                      <div class="text-sm font-semibold text-slate-700">📄 单据预览</div>
                      <span class="text-xs text-slate-400">《入库申请单》${i.bizNo}</span>
                    </div>
                    <div class="text-xs text-slate-600 space-y-1">
                      <div class="font-bold text-center text-base text-slate-800 mb-2 pb-2 border-b">郑州军牧源贸易有限公司<br>入库申请单</div>
                      <div><span class="text-slate-400">入库单号：</span>${i.bizNo}</div>
                      <div><span class="text-slate-400">货品：</span>${i.products[0].name}</div>
                      <div><span class="text-slate-400">件数：</span>${Utils.fmtNum(i.products[0].pieces)} 件</div>
                      <div><span class="text-slate-400">净重：</span>${Utils.fmtNum(i.products[0].weight)} kg</div>
                      <div><span class="text-slate-400">评估货值：</span><span class="font-bold text-blue-700">${Utils.fmtMoney(i.totalValue)}</span></div>
                      <div><span class="text-slate-400">入库仓库：</span>${i.warehouse}</div>
                      <div><span class="text-slate-400">车牌号：</span>${i.vehicleNo}</div>
                      <div><span class="text-slate-400">司机：</span>${i.driver} · ${i.driverPhone}</div>
                      <div class="pt-2 mt-2 border-t text-center text-slate-500">—— 盖章位置 ——</div>
                      <div class="mt-8 mx-auto w-32 h-16 border-2 border-dashed border-amber-400 rounded flex items-center justify-center text-xs text-amber-600 bg-amber-50/50">拖拽印章到此处</div>
                    </div>
                  </div>
                  <div class="bg-gradient-to-br from-amber-50 to-yellow-50 border-2 border-amber-400 border-dashed rounded-lg p-4 min-h-[280px] flex flex-col">
                    <div class="text-sm font-semibold text-amber-800 mb-3 pb-2 border-b border-amber-300">🖱️ 盖章画布</div>
                    <div class="flex-1 flex items-center justify-center">
                      <div class="text-center">
                        <div class="text-5xl mb-3">📋</div>
                        <div class="text-sm text-amber-700">单据预览已就绪</div>
                        <div class="text-xs text-amber-600 mt-2">请在左侧选择印章类型</div>
                        <div class="mt-4 px-3 py-1 inline-block bg-amber-200 text-amber-900 rounded text-xs font-mono">印章已选中：<span id="selectedSealName">${_availableSeals[0]?.name || '—'}</span></div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- 法律声明 -->
                <div class="mb-4 p-4 bg-white border border-amber-300 rounded-lg">
                  <label class="flex items-start gap-2 cursor-pointer">
                    <input type="checkbox" id="legalDecl" class="mt-1 w-4 h-4 accent-amber-600">
                    <div class="flex-1 text-sm text-slate-700">
                      <div class="font-medium">本人确认本签章具有法律效力 <span class="text-red-500">*</span></div>
                      <div class="text-xs text-slate-500 mt-1">依据《电子签名法》第十四条，可靠的电子签名与手写签名或者盖章具有同等的法律效力。本人确认上述电子签章系本人真实意思表示，对本电子签章所涉全部法律文件承担相应法律责任。</div>
                    </div>
                  </label>
                </div>

                <!-- 按钮 -->
                <div class="flex items-center justify-between">
                  <div class="text-xs text-amber-700">💡 盖章完成后，状态将变更为「待担保方审核」，系统将自动站内信通知担保方</div>
                  <div class="flex gap-2">
                    <button onclick="history.back()" class="px-4 py-2 border border-slate-300 rounded-md text-sm hover:bg-slate-50">取消</button>
                    <button onclick="submitSeal('${i.id}', '${i.bizNo}')" class="px-5 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-md text-sm font-bold flex items-center gap-2 shadow-md">
                      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                      确认签章并提交
                    </button>
                  </div>
                </div>
                ` : `
                <div class="text-center py-8 text-amber-700 text-sm">
                  ${i.status === 'inbound' || i.status === 'inbound_completed' ? '✅ 此入库申请已完成盖章，无需再次操作' :
                    i.status === 'pending_guarantor' || i.status === 'pending_platform' ? '⏳ 此入库申请已进入担保/监管审核阶段，无需盖章' :
                    i.status === 'draft' ? '📝 此入库申请尚未提交盖章，无需盖章' :
                    '📌 此入库申请当前状态无需盖章'}
                </div>
                `}
              </div>
            </div>
            ` : ''}
          </div>
        </div>
      </main>
    </div>
  `;

  // v1.7.3 盖章提交函数（盖章人专用）
  function submitSeal(inboundId, bizNo) {
    if (!document.getElementById('legalDecl').checked) {
      Utils.toast('请勾选法律声明', 'warning');
      return;
    }
    const sealType = document.querySelector('input[name="sealType"]:checked')?.value;
    if (!sealType) {
      Utils.toast('请选择印章', 'warning');
      return;
    }
    if (!confirm(`确认使用「${document.getElementById('selectedSealName')?.textContent || sealType}」对 ${bizNo} 完成签章？\n提交后将推送至担保方审核，不可撤回。`)) return;
    Utils.toast('盖章完成，已推送至担保方审核', 'success');
    setTimeout(() => history.back(), 800);
  }
</script>
</body>
</html>
