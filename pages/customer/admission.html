<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>准入申请 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.21 准入申请列表（按用户图1重设计） ============
  // 6 列表头：企业名称 / 社会统一信用代码 / 企业法人 / 当前进度 / 申请日期 / 申请结果
  // 4 列筛选：企业名称 / 社会统一信用代码 / 申请日期范围 / 通过
  // + 1 行：基础材料收集下拉 + 查询 + 重置

  const filters = {
    companyName: '',
    creditCode: '',
    dateStart: '',
    dateEnd: '',
    applyResult: '',
    progress: '',
  };

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '准入申请',
    currentPath: '/customer/admission',
    breadcrumb: [
      { label: '客户准入', path: '/customer/admission' },
      { label: '准入申请', path: '/customer/admission' },
    ],
    extra: `
      <a href="${Utils.nav('/customer/admission-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        准入申请
      </a>
    `,
    content: render(),
  });

  // ============ v1.7.35 准入申请状态 → 详情 tab 映射 ============
  // draft/pending → 基础信息收集（刚提交，还在第 1 步）
  // reviewing    → 资质审核（监管方审完了基础信息，进入第 2 步）
  // approved     → 办结（走完全部 5 步）
  // rejected     → 基础信息收集（驳回到第 1 步重做）
  function mapStatusToTab(a) {
    if (a.applyResult === '通过' || a.status === 'approved' || a.progress === 5) return 'completion';
    if (a.status === 'reviewing' || a.progress === 2) return 'qualification';
    if (a.status === 'rejected') return 'basic';
    // draft / pending / progress 1 都算基础信息
    return 'basic';
  }

  // 用 list 里字段；如果某些字段没有（progress / applyResult 是新加的），做兼容回退
  function getProgressText(a) {
    if (a.progress && ['基础材料收集', '资质审核', '现场考察', '风险评估', '办结'].includes(a.progress)) return a.progress;
    // 从旧的 progress 整数 + status 推导出当前阶段文本
    const stageMap = ['', '基础材料收集', '资质审核', '现场考察', '风险评估', '办结'];
    if (a.progress && /^\d+$/.test(String(a.progress))) return stageMap[Number(a.progress)] || '基础材料收集';
    return '基础材料收集';
  }

  function getApplyResult(a) {
    if (a.applyResult) return a.applyResult;
    if (a.status === 'approved' || a.progress === 5) return '通过';
    if (a.status === 'rejected') return '不通过';
    return '—';
  }

  function applyFilters() {
    return (MockData.admissionList || []).filter(a => {
      if (filters.companyName && !a.customer.includes(filters.companyName)) return false;
      if (filters.creditCode && !(a.creditCode || '').includes(filters.creditCode)) return false;
      if (filters.dateStart && a.applyDate < filters.dateStart) return false;
      if (filters.dateEnd && a.applyDate > filters.dateEnd) return false;
      if (filters.applyResult && getApplyResult(a) !== filters.applyResult) return false;
      if (filters.progress && getProgressText(a) !== filters.progress) return false;
      return true;
    });
  }

  function renderProgressBadge(text) {
    const map = {
      '基础材料收集': 'bg-slate-100 text-slate-700',
      '资质审核':     'bg-blue-100 text-blue-700',
      '现场考察':     'bg-cyan-100 text-cyan-700',
      '风险评估':     'bg-amber-100 text-amber-700',
      '办结':         'bg-emerald-100 text-emerald-700',
    };
    const cls = map[text] || 'bg-slate-100 text-slate-700';
    return `<span class="px-2 py-0.5 text-xs ${cls} rounded whitespace-nowrap">${text}</span>`;
  }

  function renderResultBadge(text) {
    if (text === '通过') return '<span class="px-2 py-0.5 text-xs bg-emerald-100 text-emerald-700 rounded">通过</span>';
    if (text === '不通过') return '<span class="px-2 py-0.5 text-xs bg-rose-100 text-rose-700 rounded">不通过</span>';
    return '<span class="text-xs text-slate-400">—</span>';
  }

  function render() {
    const list = applyFilters();
    return `
      <!-- 4+1 筛选区（按用户图1） -->
      <div class="bg-white border border-slate-200 rounded-xl p-4 mb-3">
        <!-- 当前搜索 tag + 重置全部 -->
        <div class="flex items-center justify-between mb-3 text-sm">
          <div class="flex items-center flex-wrap gap-1.5 min-h-[24px]">
            <span class="text-slate-500">当前搜索：</span>
            ${renderActiveTags()}
            ${hasAnyFilter() ? `<button onclick="resetAllFilters()" class="text-xs text-rose-500 hover:text-rose-700 ml-2">清除全部</button>` : ''}
          </div>
        </div>

        <!-- 行 1：企业名称 / 统一信用代码 / 申请日期范围 / 申请结果（通过/不通过） -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end mb-3">
          <div>
            <input type="text" value="${filters.companyName}" oninput="updateFilter('companyName', this.value)" placeholder="输入企业名称" class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
          </div>
          <div>
            <input type="text" value="${filters.creditCode}" oninput="updateFilter('creditCode', this.value)" placeholder="输入社会统一信用代码" class="w-full px-3 py-2 border border-slate-200 rounded text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
          </div>
          <div>
            <div class="flex items-center gap-1">
              <input type="date" value="${filters.dateStart}" onchange="updateFilter('dateStart', this.value)" class="flex-1 min-w-0 px-2 py-1.5 border border-slate-200 rounded text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
              <button onclick="Utils.toast('打开日期范围选择器（占位）','info')" class="px-2 py-1.5 border border-slate-200 rounded hover:bg-slate-50" title="选择日期">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              </button>
            </div>
          </div>
          <div>
            <select onchange="updateFilter('applyResult', this.value)" class="w-full px-3 py-2 border border-slate-200 rounded text-sm bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
              <option value="">结果（全部）</option>
              <option value="通过" ${filters.applyResult === '通过' ? 'selected' : ''}>通过</option>
              <option value="不通过" ${filters.applyResult === '不通过' ? 'selected' : ''}>不通过</option>
            </select>
          </div>
        </div>

        <!-- 行 2：当前进度（基础材料收集）+ 查询 + 重置 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
          <div>
            <select onchange="updateFilter('progress', this.value)" class="w-full px-3 py-2 border border-slate-200 rounded text-sm bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
              <option value="">当前进度（全部）</option>
              <option value="基础材料收集" ${filters.progress === '基础材料收集' ? 'selected' : ''}>基础材料收集</option>
              <option value="资质审核" ${filters.progress === '资质审核' ? 'selected' : ''}>资质审核</option>
              <option value="现场考察" ${filters.progress === '现场考察' ? 'selected' : ''}>现场考察</option>
              <option value="风险评估" ${filters.progress === '风险评估' ? 'selected' : ''}>风险评估</option>
              <option value="办结" ${filters.progress === '办结' ? 'selected' : ''}>办结</option>
            </select>
          </div>
          <div class="md:col-span-2"></div>
          <div class="flex items-center gap-2 justify-end">
            <button onclick="resetFilters()" class="px-4 py-2 border border-slate-300 rounded text-sm hover:bg-slate-50">重置</button>
            <button onclick="refresh()" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35"/></svg>
              查询
            </button>
          </div>
        </div>
      </div>

      <!-- 6 列准入申请表格（按用户图1） -->
      <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[1100px]">
            <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
              <tr>
                <th class="text-left px-4 py-3 whitespace-nowrap">企业名称</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">社会统一信用代码</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">企业法人</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">当前进度</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">申请日期</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">申请结果</th>
              </tr>
            </thead>
            <tbody>${renderRows(list)}</tbody>
          </table>
        </div>
        ${renderPagination(list)}
      </div>
    `;
  }

  function renderRows(list) {
    if (!list.length) {
      return `<tr><td colspan="6" class="py-12 text-center text-slate-400 text-sm">📭 当前筛选条件下无准入申请</td></tr>`;
    }
    return list.map(a => {
      const progress = getProgressText(a);
      const result = getApplyResult(a);
      return `
        <tr class="border-t border-slate-100 hover:bg-blue-50/30 cursor-pointer" onclick="goDetail('${a.id}')">
          <td class="px-4 py-3 text-slate-800 font-medium whitespace-nowrap">${a.customer}</td>
          <td class="px-4 py-3 text-slate-600 font-mono text-xs whitespace-nowrap">${a.creditCode || '91XXXXXXXXMAXXXXXXXX'}</td>
          <td class="px-4 py-3 text-slate-700 text-xs whitespace-nowrap">${a.legalRep}</td>
          <td class="px-4 py-3 whitespace-nowrap">${renderProgressBadge(progress)}</td>
          <td class="px-4 py-3 text-slate-700 text-xs whitespace-nowrap font-mono">${a.applyDate}</td>
          <td class="px-4 py-3 whitespace-nowrap">${renderResultBadge(result)}</td>
        </tr>
      `;
    }).join('');
  }

  function renderPagination(list) {
    const total = list.length;
    const totalRecords = 400;
    const totalPages = Math.max(80, Math.ceil(totalRecords / 5));
    return `
      <div class="px-4 py-3 border-t border-slate-200 flex items-center justify-between text-xs text-slate-500">
        <span>共 <b class="text-slate-800">${totalRecords}</b> 条记录，第 1 / ${totalPages} 页</span>
        <div class="flex items-center gap-1">
          <button class="px-2 py-1 border border-slate-200 rounded hover:bg-slate-50 disabled:opacity-50" disabled>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="px-2 py-1 border ${n === 1 ? 'bg-blue-600 text-white border-blue-600' : 'border-slate-200 hover:bg-slate-50'} rounded">${n}</button>`).join('')}
          <button class="px-2 py-1 border border-slate-200 rounded hover:bg-slate-50">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
          <select class="ml-2 px-2 py-1 border border-slate-200 rounded text-xs">
            <option>5 条/页</option><option>10 条/页</option><option>20 条/页</option>
          </select>
          <span class="ml-2">跳至</span>
          <input type="number" value="1" class="w-12 px-2 py-1 border border-slate-200 rounded text-xs text-center">
          <span>页</span>
        </div>
      </div>
    `;
  }

  function hasAnyFilter() {
    return !!(filters.companyName || filters.creditCode || filters.dateStart || filters.dateEnd || filters.applyResult || filters.progress);
  }

  function renderActiveTags() {
    const tags = [];
    if (filters.companyName) tags.push({ key: 'companyName', label: `企业名称：${filters.companyName}` });
    if (filters.creditCode) tags.push({ key: 'creditCode', label: `信用代码：${filters.creditCode}` });
    if (filters.applyResult) tags.push({ key: 'applyResult', label: `结果：${filters.applyResult}` });
    if (filters.progress) tags.push({ key: 'progress', label: `进度：${filters.progress}` });
    if (filters.dateStart || filters.dateEnd) tags.push({ key: '_date', label: `日期 ${filters.dateStart || '不限'} ~ ${filters.dateEnd || '不限'}` });
    if (!tags.length) return '<span class="text-slate-400 text-xs">（无筛选条件 / 默认显示全部）</span>';
    return tags.map(t => `
      <span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs bg-slate-100 text-slate-700 rounded">
        ${t.label}<button onclick="removeTag('${t.key}')" class="text-slate-400 hover:text-slate-700">×</button>
      </span>
    `).join('');
  }

  // ============ Events ============
  window.updateFilter = (k, v) => { filters[k] = v; };
  window.refresh = () => refresh();
  window.resetFilters = () => {
    Object.keys(filters).forEach(k => filters[k] = '');
    refresh();
  };
  window.resetAllFilters = window.resetFilters;
  window.removeTag = (k) => {
    if (k === '_date') { filters.dateStart = ''; filters.dateEnd = ''; }
    else filters[k] = '';
    refresh();
  };
  window.goDetail = (id) => {
    // v1.7.35：按准入状态映射详情 tab，默认跳到当前进度对应节点
    const a = (MockData.admissionList || []).find(x => x.id === id);
    const tab = mapStatusToTab(a || {});
    window.location.href = `${Utils.nav('/customer/admission-detail')}?id=${id}&tab=${tab}`;
  };

  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '准入申请',
      currentPath: '/customer/admission',
      breadcrumb: [
        { label: '客户准入', path: '/customer/admission' },
        { label: '准入申请', path: '/customer/admission' },
      ],
      extra: `
        <a href="${Utils.nav('/customer/admission-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          准入申请
        </a>
      `,
      content: render(),
    });
  }
</script>
</body>
</html>
