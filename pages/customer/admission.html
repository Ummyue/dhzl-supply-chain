<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>准入申请 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.82 准入申请列表（按用户新筛选样式） ============
  // 样式：3 列 × 3 行 网格（参考入库申请新筛选样式）
  // - 顶部"当前搜索:"tag 行
  // - 实时刷新:oninput/onchange 直接触发,无查询/重置按钮
  // - 文本搜索:输入时弹抽屉式模糊搜索结果,用户精准选择后锁定精确值
  // - 底部右下角"数据导出"文字链接

  const filters = {
    companyName: '',
    creditCode: '',
    dateStart: '',
    dateEnd: '',
    applyResult: '',
    progress: '',
  };

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '准入申请',
    currentPath: '/customer/admission',
    breadcrumb: [
      { label: '客户准入', path: '/customer/admission' },
      { label: '准入申请', path: '/customer/admission' },
    ],
    extra: `
      <a href="${Utils.nav('/customer/admission-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        准入申请
      </a>
    `,
    content: render(),
  });

  // ============ v1.7.35 准入申请状态 → 详情 tab 映射 ============
  // draft/pending → 基础信息收集（刚提交，还在第 1 步）
  // reviewing    → 资质审核（监管方审完了基础信息，进入第 2 步）
  // approved     → 办结（走完全部 5 步）
  // rejected     → 基础信息收集（驳回到第 1 步重做）
  // v1.7.43: approved/办结 → completion tab（办结恢复独立 tab）
  function mapStatusToTab(a) {
    if (a.applyResult === '通过' || a.status === 'approved' || a.progress === 5) return 'completion';
    if (a.status === 'reviewing' || a.progress === 2) return 'qualification';
    if (a.status === 'rejected') return 'basic';
    // draft / pending / progress 1 都算基础信息
    return 'basic';
  }

  // 用 list 里字段；如果某些字段没有（progress / applyResult 是新加的），做兼容回退
  function getProgressText(a) {
    if (a.progress && ['基础材料收集', '资质审核', '现场考察', '风险评估', '办结'].includes(a.progress)) return a.progress;
    // 从旧的 progress 整数 + status 推导出当前阶段文本
    const stageMap = ['', '基础材料收集', '资质审核', '现场考察', '风险评估', '办结'];
    if (a.progress && /^\d+$/.test(String(a.progress))) return stageMap[Number(a.progress)] || '基础材料收集';
    return '基础材料收集';
  }

  function getApplyResult(a) {
    if (a.applyResult) return a.applyResult;
    if (a.status === 'approved' || a.progress === 5) return '通过';
    if (a.status === 'rejected') return '不通过';
    return '—';
  }

  function applyFilters() {
    return (MockData.admissionList || []).filter(a => {
      if (filters.companyName && !a.customer.includes(filters.companyName)) return false;
      if (filters.creditCode && !(a.creditCode || '').includes(filters.creditCode)) return false;
      if (filters.dateStart && a.applyDate < filters.dateStart) return false;
      if (filters.dateEnd && a.applyDate > filters.dateEnd) return false;
      if (filters.applyResult && getApplyResult(a) !== filters.applyResult) return false;
      if (filters.progress && getProgressText(a) !== filters.progress) return false;
      return true;
    });
  }

  function renderProgressBadge(text) {
    const map = {
      '基础材料收集': 'bg-slate-100 text-slate-700',
      '资质审核':     'bg-blue-100 text-blue-700',
      '现场考察':     'bg-cyan-100 text-cyan-700',
      '风险评估':     'bg-amber-100 text-amber-700',
      '办结':         'bg-emerald-100 text-emerald-700',
    };
    const cls = map[text] || 'bg-slate-100 text-slate-700';
    return `<span class="px-2 py-0.5 text-xs ${cls} rounded whitespace-nowrap">${text}</span>`;
  }

  function renderResultBadge(text) {
    if (text === '通过') return '<span class="px-2 py-0.5 text-xs bg-emerald-100 text-emerald-700 rounded">通过</span>';
    if (text === '不通过') return '<span class="px-2 py-0.5 text-xs bg-rose-100 text-rose-700 rounded">不通过</span>';
    return '<span class="text-xs text-slate-400">—</span>';
  }

  function render() {
    const list = applyFilters();
    return `
      <!-- v1.7.82 新筛选样式:3 列 × 3 行 + 顶部 tag + 右下数据导出 -->
      <div class="bg-white border border-slate-200 rounded-xl p-4 mb-3">
        <!-- 当前搜索 tag 行 -->
        <div class="flex items-center justify-between mb-3 text-sm">
          <div class="flex items-center flex-wrap gap-1.5 min-h-[24px]">
            <span class="text-slate-500">当前搜索:</span>
            ${renderActiveTags()}
          </div>
        </div>

        <!-- 3 列 × 3 行 筛选区 -->
        <div class="grid grid-cols-3 gap-x-6 gap-y-4">
          <!-- 行 1:企业名称(搜索) | 统一社会信用代码(搜索) | 申请日期范围 -->
          <div class="relative">
            <input id="companyNameInput" type="text" value="${escapeHtml(filters.companyName)}"
              oninput="onCompanyNameInput(this.value)"
              placeholder="请输入企业名称"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded text-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none placeholder:text-slate-300">
            <div id="companyNameSuggest" class="absolute z-20 left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded shadow-lg max-h-60 overflow-auto hidden"></div>
          </div>
          <div class="relative">
            <input id="creditCodeInput" type="text" value="${escapeHtml(filters.creditCode)}"
              oninput="onCreditCodeInput(this.value)"
              placeholder="请输入社会统一信用代码"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded text-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none placeholder:text-slate-300">
            <div id="creditCodeSuggest" class="absolute z-20 left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded shadow-lg max-h-60 overflow-auto hidden"></div>
          </div>
          <div class="flex items-center gap-2">
            <input type="date" value="${filters.dateStart}" onchange="updateFilter('dateStart', this.value); refresh()"
              class="flex-1 min-w-0 px-2 py-2 text-sm border border-slate-200 rounded text-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
            <span class="text-slate-400">-</span>
            <input type="date" value="${filters.dateEnd}" onchange="updateFilter('dateEnd', this.value); refresh()"
              class="flex-1 min-w-0 px-2 py-2 text-sm border border-slate-200 rounded text-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
          </div>

          <!-- 行 2:申请结果 | 当前进度 | (空) -->
          <div>
            <select onchange="updateFilter('applyResult', this.value); refresh()"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded bg-white text-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
              <option value="">请选择</option>
              <option value="通过" ${filters.applyResult === '通过' ? 'selected' : ''}>通过</option>
              <option value="不通过" ${filters.applyResult === '不通过' ? 'selected' : ''}>不通过</option>
            </select>
          </div>
          <div>
            <select onchange="updateFilter('progress', this.value); refresh()"
              class="w-full px-3 py-2 text-sm border border-slate-200 rounded bg-white text-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-100 outline-none">
              <option value="">请选择</option>
              <option value="基础材料收集" ${filters.progress === '基础材料收集' ? 'selected' : ''}>基础材料收集</option>
              <option value="资质审核" ${filters.progress === '资质审核' ? 'selected' : ''}>资质审核</option>
              <option value="现场考察" ${filters.progress === '现场考察' ? 'selected' : ''}>现场考察</option>
              <option value="风险评估" ${filters.progress === '风险评估' ? 'selected' : ''}>风险评估</option>
              <option value="办结" ${filters.progress === '办结' ? 'selected' : ''}>办结</option>
            </select>
          </div>
          <div></div>

          <!-- 行 3:第 3 列右下角 数据导出 -->
          <div></div>
          <div></div>
          <div class="flex items-end justify-end">
            <button onclick="exportCSV()" class="text-sm text-blue-600 hover:text-blue-800 inline-flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              数据导出
            </button>
          </div>
        </div>
      </div>

      <!-- 6 列准入申请表格 -->
      <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm min-w-[1100px]">
            <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
              <tr>
                <th class="text-left px-4 py-3 whitespace-nowrap">企业名称</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">社会统一信用代码</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">企业法人</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">当前进度</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">申请日期</th>
                <th class="text-left px-4 py-3 whitespace-nowrap">申请结果</th>
              </tr>
            </thead>
            <tbody>${renderRows(list)}</tbody>
          </table>
        </div>
        ${renderPagination(list.length)}
      </div>
    `;
  }

  function renderRows(list) {
    if (!list.length) {
      return `<tr><td colspan="6" class="py-12 text-center text-slate-400 text-sm">📭 当前筛选条件下无准入申请</td></tr>`;
    }
    return list.map(a => {
      const progress = getProgressText(a);
      const result = getApplyResult(a);
      return `
        <tr class="border-t border-slate-100 hover:bg-blue-50/30 cursor-pointer" onclick="goDetail('${a.id}')">
          <td class="px-4 py-3 text-slate-800 font-medium whitespace-nowrap">${a.customer}</td>
          <td class="px-4 py-3 text-slate-600 font-mono text-xs whitespace-nowrap">${a.creditCode || '91XXXXXXXXMAXXXXXXXX'}</td>
          <td class="px-4 py-3 text-slate-700 text-xs whitespace-nowrap">${a.legalRep}</td>
          <td class="px-4 py-3 whitespace-nowrap">${renderProgressBadge(progress)}</td>
          <td class="px-4 py-3 text-slate-700 text-xs whitespace-nowrap font-mono">${a.applyDate}</td>
          <td class="px-4 py-3 whitespace-nowrap">${renderResultBadge(result)}</td>
        </tr>
      `;
    }).join('');
  }

  function renderPagination(total) {
    return Components.pagination({ total: total || 0, page: 1, pageSize: 10, onChange: 'window.__noop', onPageSize: 'window.__noop', onJump: 'window.__noop' });
  }

  function hasAnyFilter() {
    return !!(filters.companyName || filters.creditCode || filters.dateStart || filters.dateEnd || filters.applyResult || filters.progress);
  }

  function renderActiveTags() {
    const tags = [];
    if (filters.companyName) tags.push({ key: 'companyName', label: `企业名称:${filters.companyName}` });
    if (filters.creditCode) tags.push({ key: 'creditCode', label: `信用代码:${filters.creditCode}` });
    if (filters.applyResult) tags.push({ key: 'applyResult', label: `结果:${filters.applyResult}` });
    if (filters.progress) tags.push({ key: 'progress', label: `进度:${filters.progress}` });
    if (filters.dateStart || filters.dateEnd) tags.push({ key: '_date', label: `日期 ${filters.dateStart || '不限'} ~ ${filters.dateEnd || '不限'}` });
    if (!tags.length) return '<span class="text-slate-400 text-xs">（无筛选条件）</span>';
    return tags.map(t => `
      <span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs bg-slate-100 text-slate-700 rounded">
        ${t.label}<button onclick="removeTag('${t.key}')" class="text-slate-400 hover:text-slate-700">×</button>
      </span>
    `).join('');
  }

  // ============ v1.7.82 抽屉式模糊搜索 (企业名称 / 统一社会信用代码) ============
  function renderSuggest(targetId, items, primaryKey, secondaryKey) {
    const target = document.getElementById(targetId);
    if (!target) return;
    if (!items.length) {
      target.classList.add('hidden');
      target.innerHTML = '';
      return;
    }
    target.innerHTML = items.map(a => `
      <div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm border-b border-slate-100 last:border-0"
           onclick="selectSuggest('${targetId}', '${a.id}', '${primaryKey}', '${secondaryKey}')">
        <div class="text-slate-800 truncate">${highlightMatch(a[primaryKey] || '', targetId === 'companyNameSuggest' ? filters.companyName : filters.creditCode)}</div>
        <div class="text-xs text-slate-400 font-mono mt-0.5">${a[secondaryKey] || ''}</div>
      </div>
    `).join('');
    target.classList.remove('hidden');
  }

  // 搜索关键字高亮
  function highlightMatch(text, q) {
    if (!q) return escapeHtml(text);
    const i = text.indexOf(q);
    if (i < 0) return escapeHtml(text);
    return escapeHtml(text.slice(0, i)) + '<span class="text-blue-600 font-medium">' + escapeHtml(text.slice(i, i + q.length)) + '</span>' + escapeHtml(text.slice(i + q.length));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
  }

  window.onCompanyNameInput = (v) => {
    filters.companyName = v;
    refresh();
    const q = (v || '').trim();
    if (!q) {
      document.getElementById('companyNameSuggest')?.classList.add('hidden');
      return;
    }
    const matches = (MockData.admissionList || []).filter(a => (a.customer || '').includes(q)).slice(0, 8);
    renderSuggest('companyNameSuggest', matches, 'customer', 'creditCode');
  };

  window.onCreditCodeInput = (v) => {
    filters.creditCode = v;
    refresh();
    const q = (v || '').trim();
    if (!q) {
      document.getElementById('creditCodeSuggest')?.classList.add('hidden');
      return;
    }
    const matches = (MockData.admissionList || []).filter(a => (a.creditCode || '').includes(q)).slice(0, 8);
    renderSuggest('creditCodeSuggest', matches, 'creditCode', 'customer');
  };

  window.selectSuggest = (targetId, id, primaryKey, secondaryKey) => {
    const a = (MockData.admissionList || []).find(x => x.id === id);
    if (!a) return;
    if (targetId === 'companyNameSuggest') {
      filters.companyName = a.customer;
      document.getElementById('companyNameInput').value = a.customer;
    } else if (targetId === 'creditCodeSuggest') {
      filters.creditCode = a.creditCode;
      document.getElementById('creditCodeInput').value = a.creditCode;
    }
    document.getElementById(targetId)?.classList.add('hidden');
    refresh();
  };

  // 全局点击关闭抽屉
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#companyNameInput') && !e.target.closest('#companyNameSuggest')) {
      document.getElementById('companyNameSuggest')?.classList.add('hidden');
    }
    if (!e.target.closest('#creditCodeInput') && !e.target.closest('#creditCodeSuggest')) {
      document.getElementById('creditCodeSuggest')?.classList.add('hidden');
    }
  });

  // ============ 数据导出 ============
  window.exportCSV = () => {
    const list = applyFilters();
    if (!list.length) {
      Utils.toast('当前筛选条件下无数据可导出', 'info');
      return;
    }
    const headers = ['企业名称', '社会统一信用代码', '企业法人', '当前进度', '申请日期', '申请结果'];
    const rows = list.map(a => [
      a.customer || '',
      a.creditCode || '',
      a.legalRep || '',
      getProgressText(a),
      a.applyDate || '',
      getApplyResult(a),
    ]);
    const csv = '\uFEFF' + [headers, ...rows].map(r => r.map(c => `"${(c || '').replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `准入申请_${new Date().toISOString().slice(0, 10)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    Utils.toast(`已导出 ${list.length} 条数据`, 'success');
  };

  // ============ Events ============
  window.updateFilter = (k, v) => { filters[k] = v; };
  // 注: function refresh() 在文件末尾声明,本身就是 window.refresh,无需再赋值
  window.resetFilters = () => {
    Object.keys(filters).forEach(k => filters[k] = '');
    document.getElementById('companyNameInput') && (document.getElementById('companyNameInput').value = '');
    document.getElementById('creditCodeInput') && (document.getElementById('creditCodeInput').value = '');
    refresh();
  };
  window.resetAllFilters = window.resetFilters;
  window.removeTag = (k) => {
    if (k === '_date') { filters.dateStart = ''; filters.dateEnd = ''; }
    else if (k === 'companyName') { filters.companyName = ''; document.getElementById('companyNameInput') && (document.getElementById('companyNameInput').value = ''); }
    else if (k === 'creditCode') { filters.creditCode = ''; document.getElementById('creditCodeInput') && (document.getElementById('creditCodeInput').value = ''); }
    else filters[k] = '';
    refresh();
  };
  window.goDetail = (id) => {
    // v1.7.35：按准入状态映射详情 tab，默认跳到当前进度对应节点
    const a = (MockData.admissionList || []).find(x => x.id === id);
    const tab = mapStatusToTab(a || {});
    window.location.href = `${Utils.nav('/customer/admission-detail')}?id=${id}&tab=${tab}`;
  };

  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '准入申请',
      currentPath: '/customer/admission',
      breadcrumb: [
        { label: '客户准入', path: '/customer/admission' },
        { label: '准入申请', path: '/customer/admission' },
      ],
      extra: `
        <a href="${Utils.nav('/customer/admission-create')}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          准入申请
        </a>
      `,
      content: render(),
    });
    // refresh 后恢复当前 filter 值到 input (因为 pageShell 重新渲染了 DOM)
    if (filters.companyName) document.getElementById('companyNameInput') && (document.getElementById('companyNameInput').value = filters.companyName);
    if (filters.creditCode) document.getElementById('creditCodeInput') && (document.getElementById('creditCodeInput').value = filters.creditCode);
  }
</script>
</body>
</html>
