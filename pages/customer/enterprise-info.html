<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企业信息 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.37 企业信息（占位页 - 待客户确认字段后再充实） ============
  // v1.7.37 由「新增准入申请」法人信息卡片【信息有误？申请修改】按钮跳转而来
  // 当前为占位版：根据 currentUser.enterpriseProfile 展示只读企业档案 + 申请修改入口
  // 后续客户确认需要哪些可编辑字段（注册资金 / 经营范围 / 联系人等）后再升级为正式页

  const currentUser = MockData.users[Utils.getRole()] || MockData.users.customer;
  const e = currentUser.enterpriseProfile || {};

  function render() {
    return `
      <div class="bg-white border border-slate-200 rounded-xl p-5">
        <div class="flex items-center gap-2 mb-4">
          <span class="w-1 h-4 bg-blue-500 rounded"></span>
          <h3 class="text-sm font-semibold text-slate-700">当前操作人企业档案</h3>
          <span class="ml-auto px-2 py-0.5 bg-amber-100 text-amber-700 text-xs rounded">占位页（待客户确认字段）</span>
        </div>
        <div class="grid grid-cols-2 gap-4 text-sm">
          <div><span class="text-slate-500">企业名称：</span><span class="text-slate-800">${e.companyName || currentUser.company || '-'}</span></div>
          <div><span class="text-slate-500">社会统一信用代码：</span><span class="text-slate-800 font-mono">${e.creditCode || currentUser.creditCode || '-'}</span></div>
          <div><span class="text-slate-500">企业简称：</span><span class="text-slate-800">${e.shortName || '-'}</span></div>
          <div><span class="text-slate-500">企业简称首字母：</span><span class="text-slate-800">${e.shortNamePinyin || '-'}</span></div>
          <div><span class="text-slate-500">成立日期：</span><span class="text-slate-800">${e.established || '-'}</span></div>
          <div><span class="text-slate-500">企业性质：</span><span class="text-slate-800">${e.nature || '-'}</span></div>
          <div><span class="text-slate-500">营业期限：</span><span class="text-slate-800">${e.businessDeadline || '-'}</span></div>
          <div class="col-span-2"><span class="text-slate-500">注册地址：</span><span class="text-slate-800">${e.registeredAddress || '-'}</span></div>
          <div class="col-span-2 pt-3 border-t border-slate-100">
            <div class="text-xs text-slate-500 mb-2">法人信息</div>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div><span class="text-slate-500">法人姓名：</span><span class="text-slate-800">${e.legalName || currentUser.legalRep || '-'}</span></div>
              <div><span class="text-slate-500">法人手机号：</span><span class="text-slate-800">${e.legalPhone || currentUser.phone || '-'}</span></div>
              <div><span class="text-slate-500">法人身份证号码：</span><span class="text-slate-800 font-mono">${e.legalIdCard || '-'}</span></div>
              <div><span class="text-slate-500">身份证有效期：</span><span class="text-slate-800">${e.legalIdValidFrom || '-'} ~ ${e.legalIdValidTo || '-'}</span></div>
            </div>
          </div>
        </div>
        <div class="mt-5 pt-4 border-t border-slate-100 flex items-center justify-between">
          <div class="text-xs text-slate-500">如需修改以上信息，请提交申请并由平台运营审核</div>
          <button onclick="Utils.toast('修改申请已提交（mock），审核结果将通过站内消息通知', 'success')" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">申请修改</button>
        </div>
      </div>
    `;
  }

  function renderHeader() {
    return `
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <a href="${Utils.nav('/customer/admission')}" class="flex items-center gap-1 text-slate-600 hover:text-blue-600 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回准入申请
          </a>
          <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-medium">企</div>
          <div>
            <h2 class="text-base font-bold text-slate-800">企业信息</h2>
            <p class="text-xs text-slate-500">当前操作人「${currentUser.name}」所属企业 · 后续会按客户确认字段升级为正式页</p>
          </div>
        </div>
      </div>
    `;
  }

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '企业信息',
    currentPath: '/customer/admission',
    breadcrumb: [
      { label: '客户准入', path: '/customer/admission' },
      { label: '准入申请', path: '/customer/admission' },
      { label: '企业信息', path: '/customer/enterprise-info' },
    ],
    extra: '',
    content: renderHeader() + render(),
  });
</script>
</body>
</html>
