<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>质押资产详情 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
  <style>
    /* ========== v1.7.22 tab 控件：每个 tab = 文字时间 + 角标徽章，选中带绿色 ✓ 和蓝色下边框 ========== */
    .pd-tab {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 18px 10px;
      cursor: pointer;
      color: #475569;
      font-size: 14px;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .pd-tab:hover { color: #2563eb; }
    .pd-tab.active { color: #2563eb; font-weight: 600; border-bottom-color: #2563eb; }
    /* 选中态左上方绿色 ✓ */
    .pd-tab.active::before {
      content: "✓";
      position: absolute;
      top: 6px; left: 8px;
      width: 14px; height: 14px;
      background: #10b981;
      color: #fff;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 14px;
      text-align: center;
      box-shadow: 0 0 0 2px #fff;     /* 镂一圈白底，盖住 tab 边框 */
    }
    .pd-tab.active { padding-left: 28px; }
    /* 角标徽章（chip，靠近 tab 文字右侧，主视觉外） */
    .pd-badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 4px;
      line-height: 1.4;
    }
    .pd-badge-new    { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }   /* 新   = 绿色 */
    .pd-badge-out    { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }   /* 出库 = 红色 */
    .pd-badge-in     { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }   /* 入库 = 蓝色 */

    /* ========== 存货信息紫色虚线框 ========== */
    .pd-inv-frame {
      border: 1.5px dashed #a855f7;
      border-radius: 12px;
      overflow: hidden;
      background: #faf5ff;
    }
    .pd-inv-header {
      padding: 14px 20px;
      background: #f3e8ff;
      border-bottom: 1px dashed #d8b4fe;
    }
    /* 数字单位列（数量/质量单位）虚线分隔 */
    .pd-col-divider {
      border-left: 1.5px dashed #c084fc;
    }

    /* ========== 附件卡片上传时间气泡（特殊列 header 位置） ========== */
    .pd-time-bubble {
      position: relative;
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      background: #4c1d95;
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      box-shadow: 0 2px 6px rgba(76, 29, 149, 0.25);
    }
    .pd-time-bubble::after {
      content: "";
      position: absolute;
      bottom: -6px; left: 30px;
      border: 6px solid transparent;
      border-top-color: #4c1d95;
      border-right-width: 0;
    }

    /* 字段下划线复制 */
    .copy-link { color: #2563eb; cursor: pointer; font-family: monospace; }
    .copy-link:hover { text-decoration: underline; }

    /* 紫色竖条 title */
    .pd-title-bar { display: inline-block; width: 4px; height: 18px; background: #2563eb; border-radius: 1px; margin-right: 8px; vertical-align: middle; }
  </style>
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.22 质押资产详情（按用户图2重设计） ============
  // 5 大区块：标题/编号 / 9 字段信息网格 / 出入库 tab 控件（含徽标）
  //  / 存货信息 summary + 11 列表格（紫色虚线框）/ 附件

  const urlId = new URLSearchParams(window.location.search).get('id') || 'pl_001';
  const detail = (MockData.pledgeDetail && MockData.pledgeDetail[urlId]) || (MockData.pledgeDetail && MockData.pledgeDetail['pl_001']) || null;
  const summaryRow = (MockData.pledgeList || []).find(p => p.id === urlId);
  const data = detail || {};

  // 当前选中的 snapshot tab
  let activeSnapshot = (data.snapshots || []).find(s => s.selected)?.id || (data.snapshots?.[0]?.id) || 'current';

  document.getElementById('app').innerHTML = Components.pageShell({
    title: '质押资产详情',
    currentPath: '/customer/pledge-list',
    breadcrumb: [
      { label: '资产管理',  path: '' },
      { label: '质押资产',  path: '/customer/pledge-list' },
      { label: '质押资产详情', path: '/customer/pledge-detail' },
    ],
    extra: ``,
    content: render(),
  });

  function render() {
    if (!detail) {
      return `<div class="bg-white border border-slate-200 rounded-xl p-12 text-center text-slate-400">📭 找不到质押资产详情（id=${urlId}）</div>`;
    }
    return `
      <!-- 标题 + 编号 + 复制 -->
      <div class="bg-white border border-slate-200 rounded-xl px-6 py-5 mb-4">
        <h2 class="text-lg font-bold text-slate-800 mb-3"><span class="pd-title-bar"></span>质押资产详情</h2>
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-bold flex-shrink-0">押</span>
          <span class="text-sm text-slate-600 font-medium">质押资产编号：</span>
          <span class="font-mono text-base font-bold text-slate-800">${data.pledgeNo}</span>
          <button onclick="copyText('${data.pledgeNo}', '质押资产编号')" class="text-blue-500 hover:text-blue-700" title="复制">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/><path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>

        <!-- 9 字段信息网格 -->
        <div class="mt-5 grid grid-cols-1 md:grid-cols-3 gap-x-8 gap-y-4">
          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">融资编号：</dt><dd class="text-sm">
            <span class="copy-link">${data.financingNo}</span>
            <button onclick="copyText('${data.financingNo}', '融资编号')" class="ml-1 text-blue-500 hover:text-blue-700" title="复制"><svg class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/><path stroke-width="2" d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
          </dd></div>
          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">出质方：</dt><dd class="text-sm text-slate-800 font-medium">${data.pledgor}</dd></div>
          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">质权方：</dt><dd class="text-sm text-slate-800 font-medium">${data.pledgee}</dd></div>

          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">金融产品：</dt><dd class="text-sm text-slate-800">${data.product}</dd></div>
          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">金融机构：</dt><dd class="text-sm text-slate-800">${data.bank}</dd></div>
          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">监管方：</dt><dd class="text-sm text-slate-800">${data.regulator}</dd></div>

          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">放款金额（元）：</dt><dd class="text-sm text-rose-600 font-bold num-focus">${Utils.fmtMoney(data.loanAmount)}</dd></div>
          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">创建人：</dt><dd class="text-sm text-slate-800">${data.creator}</dd></div>
          <div class="flex"><dt class="w-24 text-xs text-slate-500 flex-shrink-0 pt-0.5">创建时间：</dt><dd class="text-sm text-slate-800 font-mono">${data.createdAt}</dd></div>
        </div>
      </div>

      <!-- 出入库 tab 控件 -->
      <div class="bg-white border border-slate-200 rounded-xl mb-4">
        <div class="flex items-center gap-0 border-b border-slate-200 overflow-x-auto">
          ${renderTabs()}
        </div>

        <!-- 存货信息 summary（紫色背景 + 紫色虚线框） -->
        <div class="p-5 pb-3">
          <div class="pd-inv-header rounded-t-lg flex items-center justify-between">
            <div class="text-sm font-bold text-purple-900 flex items-center gap-2">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
              存货信息
            </div>
            <div class="text-xs text-purple-900">
              已选：<b class="text-purple-800">${data.inventorySummary?.totalCount || 0}</b> 笔货物，<span class="ml-2">总质押数量：<b class="text-purple-800">${data.inventorySummary?.totalQty || '-'}</b></span>，<span class="ml-2">总质押重量：<b class="text-purple-800">${data.inventorySummary?.totalWeight || '-'}</b></span>，<span class="ml-2">总质押货值：<b class="text-purple-800 num-focus">${data.inventorySummary?.totalValue || '-'}</b></span>
            </div>
          </div>
          <div class="pd-inv-frame rounded-b-lg">
            <table class="w-full text-sm">
              <thead class="text-slate-600 text-xs">
                <tr class="bg-purple-50">
                  <th class="text-left px-3 py-2.5 whitespace-nowrap">库点</th>
                  <th class="text-left px-3 py-2.5 whitespace-nowrap">仓房-货位</th>
                  <th class="text-left px-3 py-2.5 whitespace-nowrap">入库单号</th>
                  <th class="text-left px-3 py-2.5 whitespace-nowrap">入库时间</th>
                  <th class="text-left px-3 py-2.5 whitespace-nowrap">货品名称</th>
                  <th class="text-right px-3 py-2.5 whitespace-nowrap">入库数量</th>
                  <th class="text-right px-3 py-2.5 whitespace-nowrap">可用数量</th>
                  <th class="text-center px-3 py-2.5 whitespace-nowrap pd-col-divider">数量单位</th>
                  <th class="text-right px-3 py-2.5 whitespace-nowrap">入库重量</th>
                  <th class="text-right px-3 py-2.5 whitespace-nowrap">可用重量</th>
                  <th class="text-center px-3 py-2.5 whitespace-nowrap pd-col-divider">重量单位</th>
                </tr>
              </thead>
              <tbody>${renderInventory(data.inventory || [])}</tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 附件 -->
      <div class="bg-white border border-slate-200 rounded-xl px-6 py-5 mb-8">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-base font-bold text-slate-800">附件</h3>
          <button onclick="Utils.toast('一键打包下载（占位）','success')" class="text-sm text-blue-600 hover:text-blue-700 hover:underline">一键下载</button>
        </div>
        <div class="border-t border-slate-200 pt-3">
          <div class="grid grid-cols-12 gap-2 py-2 text-xs text-slate-500 border-b border-slate-100">
            <div class="col-span-3 text-left">单据类型</div>
            <div class="col-span-3 text-left"></div>
            <div class="col-span-4 text-left">文件名</div>
            <div class="col-span-2 text-left">操作</div>
          </div>
          ${renderAttachments(data.attachments || [])}
        </div>
      </div>
    `;
  }

  // ============ Tab 渲染（重点：主视觉 = 文字+时间，角标 = 辅助徽章） ============
  function renderTabs() {
    return (data.snapshots || []).map(s => {
      const isActive = s.id === activeSnapshot;
      return `
        <div class="pd-tab ${isActive ? 'active' : ''}" onclick="switchSnapshot('${s.id}')">
          <span>${s.label}</span>
          ${s.tag ? `<span class="pd-badge ${s.tagType}">${s.tag}</span>` : ''}
        </div>
      `;
    }).join('');
  }

  function renderInventory(items) {
    if (!items.length) return `<tr><td colspan="11" class="py-8 text-center text-slate-400 text-sm">📭 暂无存货信息</td></tr>`;
    return items.map((row, i) => `
      <tr class="border-t border-purple-100">
        <td class="px-3 py-3 text-slate-800 text-xs whitespace-nowrap">${row.warehouse}</td>
        <td class="px-3 py-3 text-slate-700 text-xs whitespace-nowrap">${row.position}</td>
        <td class="px-3 py-3 text-blue-600 font-mono text-xs whitespace-nowrap hover:underline">${row.inboundNo}</td>
        <td class="px-3 py-3 text-slate-700 text-xs font-mono whitespace-nowrap">${row.inboundAt}</td>
        <td class="px-3 py-3 text-slate-800 text-xs whitespace-nowrap">${row.productName}</td>
        <td class="px-3 py-3 text-right text-slate-700 num-focus text-xs whitespace-nowrap">${row.inboundQty}</td>
        <td class="px-3 py-3 text-right text-slate-700 num-focus text-xs whitespace-nowrap">${row.availableQty}</td>
        <td class="px-3 py-3 text-center text-slate-500 text-xs pd-col-divider">${row.qtyUnit}</td>
        <td class="px-3 py-3 text-right text-slate-700 num-focus text-xs whitespace-nowrap">${row.inboundWeight.toLocaleString()}</td>
        <td class="px-3 py-3 text-right text-slate-700 num-focus text-xs whitespace-nowrap">${row.availableWeight.toLocaleString()}</td>
        <td class="px-3 py-3 text-center text-slate-500 text-xs pd-col-divider">${row.weightUnit}</td>
      </tr>
    `).join('');
  }

  function renderAttachments(atts) {
    if (!atts.length) return `<div class="py-6 text-center text-sm text-slate-400">（暂无附件）</div>`;
    return atts.map((a, i) => `
      <div class="grid grid-cols-12 gap-2 py-3 border-b border-slate-100 items-center">
        <div class="col-span-3 text-sm text-slate-700">${a.type}</div>
        <div class="col-span-3 text-sm">
          <span class="pd-time-bubble">
            <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            上传时间：${a.uploadedAt}
          </span>
        </div>
        <div class="col-span-4 text-sm text-blue-700 font-mono">${a.filename}</div>
        <div class="col-span-2">
          <button onclick="Utils.toast('下载 ${a.filename}（占位）','success')" class="text-blue-600 hover:text-blue-700 hover:underline text-sm">下载</button>
        </div>
      </div>
    `).join('');
  }

  // ============ Events ============
  window.switchSnapshot = (id) => {
    activeSnapshot = id;
    refresh();
    window.scrollTo({ top: 200, behavior: 'smooth' });
  };

  window.copyText = async (text, label) => {
    try {
      await navigator.clipboard.writeText(text);
      Utils.toast(`已复制${label}：${text}`, 'success');
    } catch (e) {
      Utils.toast('复制失败，请手动选择', 'error');
    }
  };

  function refresh() {
    document.getElementById('app').innerHTML = Components.pageShell({
      title: '质押资产详情',
      currentPath: '/customer/pledge-list',
      breadcrumb: [
        { label: '资产管理',  path: '' },
        { label: '质押资产',  path: '/customer/pledge-list' },
        { label: '质押资产详情', path: '/customer/pledge-detail' },
      ],
      extra: '',
      content: render(),
    });
  }
</script>
</body>
</html>
