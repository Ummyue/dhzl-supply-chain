<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>
(function() {
  var p = window.location.pathname;
  var base = p.indexOf('/dhzl-supply-chain/') === 0 ? '/dhzl-supply-chain/' : '/';
  document.write('<base href="' + base + '">');
})();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据管理 - 大河智链</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'] } } } } }</script>
  <link rel="stylesheet" href="/shared/css/style.css">
</head>
<body class="bg-slate-50">
<div id="app"></div>
<script src="/shared/js/utils.js"></script>
<script src="/shared/js/mockData.js"></script>
<script src="/shared/js/components.js"></script>
<script>
  Components.bindGlobalClose();

  // ============ v1.7.28.2 数据管理列表页 ============
  // 归属：运营管理中心 / 企业信息管理 / 企业概览 / 数据管理
  // UI 按 user 2026-07-10 17:38 截图：
  //   - 5 个筛选控件（企业类型/企业名称/企业状态/材料是否收取/认证渠道） + 2 按钮（查询/重置）
  //   - 6 列表格（企业名称/社会统一信用代码/企业简称/企业法人/企业管理员/操作）
  //   - 行操作：查看详情（启用）/ 服务配置（⚡待启用）/ 材料收取（⚡待启用）/ 冻结（启用）
  //   - 分页：共 400 条记录 第 1 / 80 页（10 条/页）+ 跳页

  // 切到 enterprise 子产品，保证 sidebar 正确显示「企业概览 / 数据管理」组
  if (Utils.getProductLine() !== 'enterprise') {
    Utils.setProductLine('enterprise');
  }

  // ============ 状态 ============
  const STATUS_TOTAL = 400;          // 模拟总数
  const STATUS_TOTAL_PAGES = 80;     // 模拟总页数
  const PAGE_SIZE = 10;
  let currentPage = 1;
  const filters = { type: '', name: '', status: '', materialsReceived: '', authChannel: '' };

  // ============ 字典 ============
  const dict = MockData.enterpriseDict;
  const STATUS_BADGE = {
    normal:    { text: '正常',   cls: 'bg-emerald-50 text-emerald-700 border-emerald-200' },
    pending:   { text: '待审核', cls: 'bg-amber-50 text-amber-700 border-amber-200' },
    frozen:    { text: '冻结',   cls: 'bg-rose-50 text-rose-700 border-rose-200' },
    cancelled: { text: '已注销', cls: 'bg-slate-100 text-slate-500 border-slate-200' },
  };
  const MAT_BADGE = {
    received: { text: '已收取',   cls: 'bg-emerald-50 text-emerald-700' },
    partial:  { text: '部分收取', cls: 'bg-amber-50 text-amber-700' },
    none:     { text: '未收取',   cls: 'bg-rose-50 text-rose-700' },
  };

  // ============ 渲染：筛选区 ============
  function renderFilters() {
    return `
      <div class="bg-white border border-slate-200 rounded-xl p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
          <div>
            <label class="block text-xs text-slate-500 mb-1">企业类型</label>
            <div class="relative">
              <select id="f-type" class="w-full appearance-none px-3 py-2 pr-9 border border-slate-200 rounded-md text-sm bg-white text-slate-400 focus:outline-none focus:border-blue-400 focus:text-slate-700">
                <option value="">选择企业类型</option>
                ${dict.type.map(t => `<option value="${t}">${t}</option>`).join('')}
              </select>
              <span class="absolute right-2 top-1/2 -translate-y-1/2 inline-flex items-center justify-center w-5 h-5 text-slate-300 border border-slate-200 rounded text-[10px] font-medium">?</span>
            </div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">企业名称</label>
            <input id="f-name" type="text" placeholder="输入企业名称" class="w-full px-3 py-2 border border-slate-200 rounded-md text-sm bg-white text-slate-700 placeholder-slate-300 focus:outline-none focus:border-blue-400" />
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">企业状态</label>
            <div class="relative">
              <select id="f-status" class="w-full appearance-none px-3 py-2 pr-9 border border-slate-200 rounded-md text-sm bg-white text-slate-400 focus:outline-none focus:border-blue-400 focus:text-slate-700">
                <option value="">选择企业状态</option>
                ${dict.status.map(s => `<option value="${s.value}">${s.label}</option>`).join('')}
              </select>
              <span class="absolute right-2 top-1/2 -translate-y-1/2 inline-flex items-center justify-center w-5 h-5 text-slate-300 border border-slate-200 rounded text-[10px] font-medium">?</span>
            </div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">材料是否收取</label>
            <div class="relative">
              <select id="f-materials" class="w-full appearance-none px-3 py-2 pr-9 border border-slate-200 rounded-md text-sm bg-white text-slate-400 focus:outline-none focus:border-blue-400 focus:text-slate-700">
                <option value="">选择材料是否收取</option>
                ${dict.materialsReceived.map(m => `<option value="${m.value}">${m.label}</option>`).join('')}
              </select>
              <span class="absolute right-2 top-1/2 -translate-y-1/2 inline-flex items-center justify-center w-5 h-5 text-slate-300 border border-slate-200 rounded text-[10px] font-medium">?</span>
            </div>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">认证渠道</label>
            <div class="relative">
              <select id="f-auth" class="w-full appearance-none px-3 py-2 pr-9 border border-slate-200 rounded-md text-sm bg-white text-slate-400 focus:outline-none focus:border-blue-400 focus:text-slate-700">
                <option value="">选择认证渠道</option>
                ${dict.authChannel.map(a => `<option value="${a.value}">${a.label}</option>`).join('')}
              </select>
              <span class="absolute right-2 top-1/2 -translate-y-1/2 inline-flex items-center justify-center w-5 h-5 text-slate-300 border border-slate-200 rounded text-[10px] font-medium">?</span>
            </div>
          </div>
        </div>
        <div class="mt-4 flex items-center gap-2">
          <button id="btn-search" class="inline-flex items-center gap-1.5 px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
            <span>查询</span>
          </button>
          <button id="btn-reset" class="inline-flex items-center gap-1.5 px-4 py-1.5 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 rounded text-sm font-medium">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            <span>重置</span>
          </button>
        </div>
      </div>
    `;
  }

  // ============ 渲染：行操作 ============
  function renderRowActions(item) {
    // v1.7.28.4 全部 4 个操作启用：view → 详情页；service / materials / freeze → 弹窗
    const actions = [
      { key: 'view',      label: '查看详情', cls: 'text-blue-600 hover:text-blue-800' },
      { key: 'service',   label: '服务配置', cls: 'text-blue-600 hover:text-blue-800' },
      { key: 'materials', label: '材料收取', cls: 'text-blue-600 hover:text-blue-800' },
      { key: 'freeze',    label: '冻结',     cls: 'text-blue-600 hover:text-blue-800' },
    ];
    return actions.map((a, idx) => {
      const sep = idx > 0 ? '<span class="text-slate-200">|</span>' : '';
      const onClick = a.key === 'view'
        ? `window.location.href = Utils.nav('/enterprise/detail') + '?id=' + '${item.id}' + '&tab=basic'`
        : `openModal('${a.key}', '${item.id}')`;
      return `${sep}<a href="javascript:void(0)" onclick="${onClick}" class="text-xs ${a.cls}">${a.label}</a>`;
    }).join('');
  }

  // ============ 渲染：表格 ============
  function renderTable() {
    const rows = (MockData.enterpriseList || []).map(item => {
      const sBadge = STATUS_BADGE[item.status] || STATUS_BADGE.normal;
      return `
        <tr class="border-b border-slate-100 hover:bg-blue-50/30 transition">
          <td class="px-4 py-3 text-sm text-slate-700">${item.name}</td>
          <td class="px-4 py-3 text-sm text-slate-500 font-mono">${item.creditCode}</td>
          <td class="px-4 py-3 text-sm text-slate-700">${item.shortName}</td>
          <td class="px-4 py-3 text-sm text-slate-700">${item.legalPerson}</td>
          <td class="px-4 py-3 text-sm text-slate-700">${item.admin}</td>
          <td class="px-4 py-3 text-sm">
            <div class="flex items-center gap-2 flex-wrap">
              ${renderRowActions(item)}
            </div>
          </td>
        </tr>
      `;
    }).join('');

    return `
      <div class="bg-white border border-slate-200 rounded-xl overflow-hidden mb-4">
        <table class="w-full">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200">
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">企业名称</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">社会统一信用代码</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">企业简称</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">企业法人</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">企业管理员</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-slate-500">操作</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  // ============ 渲染：分页 ============
  function renderPagination() {
    // 渲染 1..9 + 跳页
    const pageNumbers = [];
    for (let i = 1; i <= 9; i++) pageNumbers.push(i);
    return `
      <div class="flex items-center justify-between mt-2">
        <div class="text-xs text-slate-500">共 ${STATUS_TOTAL} 条记录 第 ${currentPage} / ${STATUS_TOTAL_PAGES} 页</div>
        <div class="flex items-center gap-2">
          <button onclick="goPage(${currentPage - 1})" class="w-7 h-7 inline-flex items-center justify-center text-slate-500 hover:bg-slate-100 rounded ${currentPage <= 1 ? 'opacity-40 cursor-not-allowed' : ''}">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          </button>
          ${pageNumbers.map(p => `
            <button onclick="goPage(${p})" class="w-7 h-7 inline-flex items-center justify-center text-sm rounded ${
              p === currentPage
                ? 'bg-blue-600 text-white font-medium'
                : 'text-slate-700 hover:bg-slate-100 border border-slate-200'
            }">${p}</button>
          `).join('')}
          <button onclick="goPage(${currentPage + 1})" class="w-7 h-7 inline-flex items-center justify-center text-slate-500 hover:bg-slate-100 rounded ${currentPage >= STATUS_TOTAL_PAGES ? 'opacity-40 cursor-not-allowed' : ''}">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
          <select class="ml-2 px-2 py-1 text-xs border border-slate-200 rounded text-slate-700">
            <option>10条/页</option>
            <option>20条/页</option>
            <option>50条/页</option>
          </select>
          <span class="text-xs text-slate-500 ml-2">跳至</span>
          <input id="jump-page" type="number" min="1" max="${STATUS_TOTAL_PAGES}" value="${currentPage}" class="w-12 px-2 py-1 text-xs text-center border border-slate-200 rounded" />
          <span class="text-xs text-slate-500">页</span>
        </div>
      </div>
    `;
  }

  // ============ 行为 ============
  window.goPage = function(p) {
    if (p < 1 || p > STATUS_TOTAL_PAGES) return;
    currentPage = p;
    render();
  };

  function applyFilters() {
    filters.type             = document.getElementById('f-type').value;
    filters.name             = document.getElementById('f-name').value.trim();
    filters.status           = document.getElementById('f-status').value;
    filters.materialsReceived = document.getElementById('f-materials').value;
    filters.authChannel      = document.getElementById('f-auth').value;
    currentPage = 1;
    Utils.toast('查询条件已应用（共 ' + STATUS_TOTAL + ' 条记录）', 'success');
    render();
  }
  function resetFilters() {
    document.getElementById('f-type').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-status').value = '';
    document.getElementById('f-materials').value = '';
    document.getElementById('f-auth').value = '';
    Object.keys(filters).forEach(k => filters[k] = '');
    currentPage = 1;
    Utils.toast('已重置筛选', 'info');
    render();
  }

  // ============ 主渲染 ============
  function render() {
    document.getElementById('app').innerHTML = `
      ${Components.topbar('')}
      <div class="flex">
        ${Components.sidebar('/enterprise/data-management')}
        <main class="flex-1 overflow-y-auto bg-slate-50">
          <div class="p-6 page-enter">
            ${Components.breadcrumb(['企业信息管理', '企业概览', '数据管理'])}
            <div class="mb-4">
              <h1 class="text-xl font-bold text-slate-800">数据管理</h1>
              <p class="text-slate-500 text-sm mt-0.5">企业基础信息 / 资质证照 / 股东 / 关联关系 / 业务台账维护</p>
            </div>
            ${renderFilters()}
            ${renderTable()}
            ${renderPagination()}
          </div>
        </main>
      </div>
    `;
    document.getElementById('btn-search').onclick = applyFilters;
    document.getElementById('btn-reset').onclick  = resetFilters;
    document.getElementById('jump-page').onchange = (e) => goPage(parseInt(e.target.value || 1, 10));
  }

  // ============ v1.7.28.4 3 个弹窗（服务配置 / 材料收取 / 冻结）============
  // 当前行操作：view / service / materials / freeze
  // 弹窗独立于 #app 容器，fixed 定位；点遮罩/X/取消关闭
  let currentModal = null;     // 'service' | 'materials' | 'freeze' | null
  let currentTargetId = null;  // 当前操作的企业 id
  // 各弹窗独立状态
  const modalState = {
    service: { checked: new Set() },                                // 9 个 checkbox
    materials: { value: 'yes' },                                     // 'yes' | 'no'
    freeze: { reason: '' },                                          // textarea
  };

  function openModal(type, targetId) {
    currentModal = type;
    currentTargetId = targetId;
    renderModal();
  }
  function closeModal() {
    currentModal = null;
    currentTargetId = null;
    document.getElementById('modal-root').innerHTML = '';
  }
  window.openModal = openModal;
  window.closeModal = closeModal;

  // 服务配置弹窗 9 个 checkbox 项（v1.7.28.4 按 user 截图）
  const SERVICE_OPTIONS = [
    { key: 'coal_zzyh',    label: '煤炭供应链金融服务', suffix: '（类中原银行）', indent: 0 },
    { key: 'coal_smbl',    label: '煤炭供应链金融服务', suffix: '（类善美保理）', indent: 0 },
    { key: 'grain',        label: '粮食仓单服务',         suffix: '',             indent: 0 },
    { key: 'cinda',        label: '信达资产服务',         suffix: '',             indent: 0 },
    { key: 'steel_parent', label: '钢材供应链',           suffix: '',             indent: 0 },
    { key: 'steel',        label: '钢材供应链',           suffix: '',             indent: 1 },
    { key: 'chain_data',   label: '全业务链数据',         suffix: '',             indent: 1 },
    { key: 'bill',         label: '票据中心',             suffix: '',             indent: 0 },
    { key: 'view_all',     label: '全业务线查看',         suffix: '',             indent: 0 },
    { key: 'cargo',        label: '货物管理',             suffix: '',             indent: 0 },
  ];

  function renderModal() {
    if (!currentModal) {
      document.getElementById('modal-root').innerHTML = '';
      return;
    }
    const target = (MockData.enterpriseList || []).find(x => x.id === currentTargetId) || { name: '', type: '' };
    const root = document.getElementById('modal-root');
    root.innerHTML = `
      <div class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()">
        ${renderModalContent(target)}
      </div>
    `;
    bindModalEvents();
  }
  window.renderModal = renderModal;

  // 弹窗内容分发
  function renderModalContent(target) {
    if (currentModal === 'service')  return renderServiceModal(target);
    if (currentModal === 'materials') return renderMaterialsModal(target);
    if (currentModal === 'freeze')   return renderFreezeModal(target);
    return '';
  }
  window.renderModalContent = renderModalContent;

  // ========== Modal 1: 服务配置 ==========
  function renderServiceModal(target) {
    const optionsHtml = SERVICE_OPTIONS.map(o => {
      const checked = modalState.service.checked.has(o.key);
      const padding = o.indent > 0 ? 'pl-10' : 'pl-1';
      return `
        <label class="flex items-center gap-2 py-1.5 text-sm text-slate-700 cursor-pointer hover:bg-slate-50 px-2 rounded ${padding}">
          <input type="checkbox" data-svc="${o.key}" ${checked ? 'checked' : ''} class="w-3.5 h-3.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
          <span>${o.label}${o.suffix ? `<span class="text-slate-500"> ${o.suffix}</span>` : ''}</span>
        </label>
      `;
    }).join('');
    return `
      <div class="bg-white rounded-lg shadow-2xl w-full max-w-2xl" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
          <h3 class="text-lg font-semibold text-slate-800">服务配置</h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="px-6 py-5 space-y-3 max-h-[60vh] overflow-y-auto">
          <div class="grid grid-cols-3 gap-4 text-sm">
            <div class="text-slate-500">企业名称：</div>
            <div class="col-span-2 text-slate-700">${target.name}</div>
            <div class="text-slate-500">企业类型：</div>
            <div class="col-span-2 text-slate-700">${target.type || '—'}</div>
          </div>
          <div class="pt-3">
            <div class="flex items-center gap-2 mb-2">
              <span class="text-sm text-slate-700">开通功能服务：</span>
            </div>
            <div class="space-y-0.5">${optionsHtml}</div>
          </div>
        </div>
        <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-200">
          <button onclick="closeModal()" class="px-5 py-1.5 border border-slate-300 hover:bg-slate-50 text-slate-700 rounded text-sm">取 消</button>
          <button onclick="submitService()" class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">确 定</button>
        </div>
      </div>
    `;
  }
  window.renderServiceModal = renderServiceModal;

  function submitService() {
    const ids = Array.from(modalState.service.checked);
    if (ids.length === 0) {
      Utils.toast('请至少勾选一项功能服务', 'warn');
      return;
    }
    Utils.toast(`已为该企业开通 ${ids.length} 项功能服务`, 'success');
    closeModal();
  }
  window.submitService = submitService;

  // ========== Modal 2: 材料收取 ==========
  function renderMaterialsModal(target) {
    return `
      <div class="bg-white rounded-lg shadow-2xl w-full max-w-xl" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
          <h3 class="text-lg font-semibold text-slate-800">材料收取</h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="px-6 py-6 space-y-5">
          <div class="flex items-center gap-8 text-sm">
            <span class="text-slate-700">认证材料是否收到</span>
            <label class="flex items-center gap-1.5 cursor-pointer">
              <input type="radio" name="mat-received" value="yes" ${modalState.materials.value === 'yes' ? 'checked' : ''} onchange="modalState.materials.value='yes'; renderModal()" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500" />
              <span>是</span>
            </label>
            <label class="flex items-center gap-1.5 cursor-pointer">
              <input type="radio" name="mat-received" value="no" ${modalState.materials.value === 'no' ? 'checked' : ''} onchange="modalState.materials.value='no'; renderModal()" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500" />
              <span>否</span>
            </label>
          </div>
          <p class="text-sm text-slate-500 leading-relaxed">该功能仅用于系统标记是否线下收到企业认证等相关材料，不会对企业使用的功能有影响</p>
        </div>
        <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-200">
          <button onclick="closeModal()" class="px-5 py-1.5 border border-slate-300 hover:bg-slate-50 text-slate-700 rounded text-sm">取 消</button>
          <button onclick="submitMaterials()" class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">确 定</button>
        </div>
      </div>
    `;
  }
  window.renderMaterialsModal = renderMaterialsModal;

  function submitMaterials() {
    const v = modalState.materials.value;
    const label = v === 'yes' ? '已收到' : '未收到';
    Utils.toast(`材料状态已标记为：${label}`, 'success');
    closeModal();
  }
  window.submitMaterials = submitMaterials;

  // ========== Modal 3: 冻结 ==========
  function renderFreezeModal(target) {
    return `
      <div class="bg-white rounded-lg shadow-2xl w-full max-w-xl" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
          <h3 class="text-lg font-semibold text-slate-800">冻结企业</h3>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="px-6 py-6 space-y-3">
          <div class="text-base font-semibold text-slate-800">确定要冻结该企业吗？</div>
          <div class="text-sm text-slate-500">冻结后，该企业将无法使用系统，请谨慎操作</div>
          <div class="pt-2">
            <label class="block text-sm text-slate-700 mb-2">
              <span class="text-rose-500 mr-0.5">*</span>请输入冻结的理由：
            </label>
            <textarea id="freeze-reason" rows="5" placeholder="请输入内容" class="w-full px-3 py-2 border border-slate-200 rounded-md text-sm placeholder-slate-300 focus:outline-none focus:border-blue-400 resize-none" oninput="modalState.freeze.reason=this.value">${modalState.freeze.reason}</textarea>
          </div>
        </div>
        <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-200">
          <button onclick="closeModal()" class="px-5 py-1.5 border border-slate-300 hover:bg-slate-50 text-slate-700 rounded text-sm">取 消</button>
          <button onclick="submitFreeze()" class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-medium">确 定</button>
        </div>
      </div>
    `;
  }
  window.renderFreezeModal = renderFreezeModal;

  function submitFreeze() {
    const reason = (modalState.freeze.reason || '').trim();
    if (!reason) {
      Utils.toast('请输入冻结理由', 'warn');
      document.getElementById('freeze-reason').focus();
      return;
    }
    Utils.toast('企业已冻结', 'success');
    closeModal();
  }
  window.submitFreeze = submitFreeze;

  // 服务配置 checkbox change
  function bindModalEvents() {
    if (currentModal === 'service') {
      document.querySelectorAll('input[data-svc]').forEach(el => {
        el.addEventListener('change', (e) => {
          const k = e.target.getAttribute('data-svc');
          if (e.target.checked) modalState.service.checked.add(k);
          else modalState.service.checked.delete(k);
        });
      });
    }
  }

  // ============ 启动 ============
  // 在 body 末尾追加 modal 容器
  document.body.insertAdjacentHTML('beforeend', '<div id="modal-root"></div>');
  render();
</script>
</body>
</html>
